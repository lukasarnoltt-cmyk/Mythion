<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: Shadowlands Edition v6</title>
    <style>
        :root { 
            --gold: #c49642; 
            --mythic: #a335ee; 
            --void: #ff4444; 
            --bg-panel: rgba(10, 10, 15, 0.9);
        }
        
        body { 
            margin: 0; background: #020205; color: #f0ebe0; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
            /* HLUBOKÉ VESMÍRNÉ POZADÍ */
            background-color: #050508;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
        }

        .layout-wrapper { display: flex; flex-direction: column; align-items: center; gap: 0; z-index: 10; transition: transform 0.05s; }
        
        .guild-header { 
            font-size: 55px; font-weight: 900; letter-spacing: 25px; text-transform: uppercase; margin: 0 0 15px 0;
            background: linear-gradient(to bottom, #fff, var(--gold), #8a6526);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(196, 150, 66, 0.4));
        }

        /* CHAT BOX NAHOŘE */
        .chat-container {
            width: 506px; height: 120px; background: var(--bg-panel);
            border: 2px solid var(--gold); border-bottom: none;
            border-radius: 12px 12px 0 0; padding: 12px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: flex-end;
            backdrop-filter: blur(10px); align-self: flex-start;
        }
        .chat-msg { font-size: 13px; margin-bottom: 4px; line-height: 1.2; animation: chatIn 0.3s; }
        .chat-guild { color: #40ff40; font-weight: bold; }
        .chat-system { color: #ffff40; font-style: italic; }

        .game-container { display: flex; gap: 20px; align-items: flex-start; }

        .canvas-area { 
            position: relative; border: 3px solid var(--gold); border-radius: 0 0 12px 12px; 
            overflow: hidden; background: #000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        canvas { display: block; cursor: none; background: rgba(0,0,0,0.85); }

        /* SIDEBAR */
        .sidebar { width: 220px; display: flex; flex-direction: column; gap: 12px; }
        .panel { 
            background: var(--bg-panel); border: 1px solid rgba(196, 150, 66, 0.3); 
            border-radius: 8px; padding: 15px; border-left: 5px solid var(--gold);
            backdrop-filter: blur(10px);
        }
        .panel-title { color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; font-weight: bold; }
        .score-val { font-size: 30px; font-weight: 800; }

        .overlay { 
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.92);
            flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
        .btn-restart { 
            background: var(--gold); color: black; border: none; padding: 12px 30px; 
            font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 20px;
            text-transform: uppercase;
        }

        @keyframes chatIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="layout-wrapper" id="gameUI">
        <h1 class="guild-header">Mythion</h1>

        <div class="game-container">
            <div style="display: flex; flex-direction: column;">
                <div class="chat-container" id="gameChat"></div>
                <div class="canvas-area">
                    <canvas id="gameCanvas"></canvas>
                    <div id="gameOverScreen" class="overlay">
                        <h1 style="color:var(--void); font-size: 45px; margin:0; letter-spacing: 5px;">RAID WIPE</h1>
                        <div class="score-val" id="finalScore" style="color:var(--gold); margin: 10px 0;">0 yd</div>
                        <button class="btn-restart" onclick="restartGame()">RE-PULL BOSS</button>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="panel-title">M+ Score</div>
                    <div class="score-val" id="height">0</div>
                </div>
                <div class="panel" style="border-left-color: var(--mythic);">
                    <div class="panel-title">Personal Best</div>
                    <div id="bestScore" style="font-size: 20px; font-weight: bold;">0 yd</div>
                </div>
                <div class="panel" style="border-left-color: #3498db;">
                    <div class="panel-title">Active Affix</div>
                    <div style="font-weight: bold; color: #3498db; font-size: 14px;">BOLSTERING</div>
                </div>
            </div>
        </div>
    </div>

            if (chatBox.childNodes.length > 5) chatBox.removeChild(chatBox.firstChild);
        }
