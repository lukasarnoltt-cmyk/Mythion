<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: M+ Season Overdrive</title>
    <style>
        :root { --gold: #c49642; --dark: #050508; --panel: rgba(10, 10, 20, 0.85); --mythic: #a335ee; }
        body { 
            margin: 0; background: #020205; color: #f0ebe0; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
            /* EPIC DUNGEON POZADÍ */
            background-image: url('https://i.imgur.com/3Z4Q6Qz.png'); /* Nahraď odkaz vlastním obrázkem */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .layout-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        /* EPIC LOGO */
        .guild-header { 
            font-size: 55px; font-weight: 900; letter-spacing: 18px; text-transform: uppercase; 
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff 20%, #c49642 50%, #8a6526 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(196, 150, 66, 0.6));
            animation: glow 3s infinite alternate;
        }
        @keyframes glow { from { filter: drop-shadow(0 0 10px rgba(196, 150, 66, 0.4)); } to { filter: drop-shadow(0 0 25px rgba(196, 150, 66, 0.8)); } }

        .game-horizontal { display: flex; gap: 25px; align-items: flex-start; }

        /* CANVAS AREA */
        .canvas-area { position: relative; border: 3px solid var(--gold); border-radius: 12px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        canvas { background: rgba(0,0,0,0.5); /* Ztmavení za plátnem */ cursor: none; display: block; }

        /* SIDEBAR */
        .sidebar { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        .panel { 
            background: var(--panel); border: 1px solid rgba(196,150,66,0.4); border-radius: 8px; 
            padding: 18px; border-left: 6px solid var(--gold); backdrop-filter: blur(5px);
        }
        .panel-title { color: var(--gold); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: bold; }
        .score-val { font-size: 32px; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        /* EPIC CHAT OKNO - ZAROVNÁNO DOLEVA */
        .chat-container {
            width: 506px; /* Šířka canvasu + border */
            height: 140px; background: rgba(5, 5, 15, 0.9);
            border: 2px solid var(--gold); border-top: none;
            border-radius: 0 0 10px 10px; padding: 12px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: flex-end;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 0 20px #000;
            backdrop-filter: blur(10px);
            align-self: flex-start; /* Zarovnání na začátek (doleva) */
        }
        .chat-msg { font-size: 13px; margin-bottom: 5px; line-height: 1.4; animation: chatIn 0.3s ease-out; }
        .chat-guild { color: #40ff40; font-weight: bold; }
        .chat-system { color: #ffff40; font-style: italic; }

        .overlay { 
            display: none; position: absolute; inset: 0;
            background: rgba(0,0,0,0.9); flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100;
        }
        .overlay h1 { color: #ff4444; font-size: 48px; margin: 0; text-shadow: 0 0 30px #f00; letter-spacing: 5px; }
        .btn-restart { 
            background: linear-gradient(to bottom, #d4a755, #c49642); color: black; border: none; 
            padding: 15px 40px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 25px;
            box-shadow: 0 0 15px rgba(196,150,66,0.4); text-transform: uppercase;
        }

        @keyframes chatIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <div class="guild-header">Mythion</div>

        <div class="game-horizontal">
            <div class="canvas-area">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOverScreen" class="overlay">
                    <h1>RAID WIPE</h1>
                    <div class="score-val" id="finalScoreDisplay" style="margin-top: 10px; color: var(--gold);">0 yd</div>
                    <button class="btn-restart" onclick="restartGame()">Re-Pull Boss</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="panel-title">M+ Rating</div>
                    <div class="score-val" id="height">0</div>
                </div>
                <div class="panel" style="border-left-color: var(--mythic);">
                    <div class="panel-title">Personal Best</div>
                    <div id="best" style="font-size: 22px; font-weight: bold;">0 yd</div>
                </div>
                <div class="panel" style="border-left-color: #3498db;">
                    <div class="panel-title">Affix</div>
                    <div id="affix" style="font-size: 13px; font-weight: bold; color: #3498db;">BOLSTERING</div>
                </div>
            </div>
        </div>

        <div class="chat-container" id="gameChat"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 600;

        const imgOrc = new Image(); imgOrc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';
        
        let score = 0, bestScore = localStorage.getItem('mythion_vUltimate_best') || 0;
        document.getElementById('best').innerText = bestScore + " yd";

        let gameActive = true, started = false, spacePressed = false, jumpPower = 0, cameraY = 0;
        const maxJumpPower = 22, keys = {}, platforms = [];
        let player = { x: 230, y: 500, w: 42, h: 42, dx: 0, dy: 0, grounded: false };
        
        let consecutiveVoid = 0;

        const members = [
            {n: "Arny", m: ["Makej, nebo ti Jefoma máma nedá oběd!", "To je dps jak u tanka...", "Uhni z toho ohně!"]},
            {n: "Mimi", m: ["Tebe bych si vzal do parády k nám do armády!", "Mimi vidí všechno!", "V armádě bys už dělal kliky!"]},
            {n: "Suzu", m: ["Suzu tě healovat nebude!", "Mám low manu, nepadni.", "Kdo to zase pullnul?"]},
            {n: "Exsqueez", m: ["Solidní wipe v přímém přenosu.", "Máš zapnutý monitor?", "Půjč mi na opravu."]}
        ];

        function addChatMessage(name, msg, type = 'guild') {
            const chatBox = document.getElementById('gameChat');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            if (type === 'guild') div.innerHTML = `[<span class="chat-guild">Guild</span>] <b>${name}:</b> ${msg}`;
            else if (type === 'system') div.innerHTML = `<span class="chat-system">${msg}</span>`;
            chatBox.appendChild(div);
            if (chatBox.childNodes.length > 5) chatBox.removeChild(chatBox.firstChild);
        }

        function restartGame() {
            score = 0; cameraY = 0; gameActive = true; started = false; jumpPower = 0; consecutiveVoid = 0;
            player = { x: 230, y: 500, w: 42, h: 42, dx: 0, dy: 0, grounded: false };
            platforms.length = 0;
            platforms.push({x: 0, y: 560, w: 500, h: 100, type: 'start', alpha: 1});
            for(let i=1; i<15; i++) addPlatform(560 - i*140);
            document.getElementById('gameOverScreen').style.display = 'none';
            addChatMessage(null, "--- NOVÝ PULL: LOK'TAR OGAR! ---", "system");
        }

        function addPlatform(y) {
            const w = Math.max(75, 150 - Math.abs(y)/600);
            let type = 'normal';
            if (Math.abs(y) > 800 && consecutiveVoid < 2 && Math.random() > 0.6) {
                type = 'void';
                consecutiveVoid++;
            } else {
                type = 'normal';
                consecutiveVoid = 0;
            }
            platforms.push({ x: Math.random()*(canvas.width-w), y: y, w: w, h: 20, type: type, alpha: 1 });
        }

        function update() {
            if (!gameActive) return;
            if (keys['KeyA'] || keys['ArrowLeft']) player.dx = -7.5;
            else if (keys['KeyD'] || keys['ArrowRight']) player.dx = 7.5;
            else player.dx *= 0.85;

            player.dy += 0.55; player.x += player.dx; player.y += player.dy;

            if (spacePressed && player.grounded) {
                jumpPower += 0.9; if (jumpPower > maxJumpPower) jumpPower = maxJumpPower;
            }

            if (player.x < 0) player.x = 0; if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

            player.grounded = false;
            for (let p of platforms) {
                if (player.dy > 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.dy) {
                    player.y = p.y - player.h; player.dy = 0; player.grounded = true;
                    if (p.type === 'void' && started) p.alpha -= 0.18;
                }
            }
            for(let i=platforms.length-1; i>=0; i--) { if(platforms[i].alpha <= 0) platforms.splice(i,1); }

            if (started) {
                let targetCam = player.y - 300;
                if (targetCam < cameraY) cameraY += (targetCam - cameraY) * 0.12;
            }

            let topY = platforms[platforms.length - 1].y;
            if (player.y < topY + 800) addPlatform(topY - 142);

            let curH = Math.floor(Math.abs(player.y - 500) / 10);
            if (curH > score) {
                score = curH;
                document.getElementById('height').innerText = score;
                if (score > bestScore) {
                    bestScore = score; localStorage.setItem('mythion_vUltimate_best', score);
                    document.getElementById('best').innerText = bestScore + " yd";
                }
            }

            if (started && player.y > cameraY + canvas.height + 100) {
                gameActive = false;
                document.getElementById('finalScoreDisplay').innerText = score + " yd";
                document.getElementById('gameOverScreen').style.display = 'flex';
                addChatMessage("Mimi", "Armáda tě nepříjme, jsi dole!", "guild");
            }
        }

        function draw() {
            // Průhlednější pozadí canvasu, aby vyniklo pozadí těla body
            ctx.fillStyle = "rgba(10, 10, 20, 0.4)"; ctx.fillRect(0,0,500,600);
            
            // Nebula / Space effect - jemnější
            let grd = ctx.createRadialGradient(250, 300 - cameraY*0.1, 100, 250, 300, 500);
            grd.addColorStop(0, "rgba(40, 20, 80, 0.1)");
            grd.addColorStop(1, "transparent");
            ctx.fillStyle = grd; ctx.fillRect(0,0,500,600);

            ctx.save(); ctx.translate(0, -cameraY);

            platforms.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = p.type === 'void' ? 20 : 15;
                ctx.shadowColor = p.type === 'void' ? "#ff0000" : "#c49642";
                
                ctx.fillStyle = p.type === 'void' ? "#500" : "#1a1a2e";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = p.type === 'void' ? "#ff4444" : "#c49642";
                ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
            });

            ctx.globalAlpha = 1; ctx.shadowBlur = 15; ctx.shadowColor = "#000";
            ctx.drawImage(imgOrc, player.x, player.y, player.w, player.h);
            
            if (spacePressed && player.grounded) {
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
                ctx.strokeRect(player.x-4, player.y-4, player.w+8, player.h+8);
            }
            ctx.restore();
            requestAnimationFrame(() => { update(); draw(); });
        }

        setInterval(() => {
            if (gameActive && started) {
                const mem = members[Math.floor(Math.random()*members.length)];
                addChatMessage(mem.n, mem.m[Math.floor(Math.random()*mem.m.length)]);
            }
        }, 8500);

        window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') { e.preventDefault(); spacePressed = true; }});
        window.addEventListener('keyup', e => { 
            keys[e.code] = false; 
            if (e.code === 'Space' && gameActive) { 
                if (player.grounded) { player.dy = -Math.max(10, jumpPower); player.grounded = false; started = true; }
                spacePressed = false; jumpPower = 0;
            }
        });

        restartGame(); draw();
    </script>
</body>
</html>
