<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: Fixed & Epic</title>
    <style>
        :root { --gold: #c49642; --mythic: #a335ee; --void: #ff4444; }
        body { 
            margin: 0; background: #050508; color: #f0ebe0; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
        }
        
        .layout { display: flex; gap: 20px; align-items: flex-start; }
        .main-column { display: flex; flex-direction: column; gap: 10px; }

        canvas { 
            border: 3px solid var(--gold); background: #0a0a1a; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8); border-radius: 8px; cursor: crosshair;
        }

        .chat-window {
            width: 506px; height: 130px; background: rgba(0,0,0,0.8);
            border: 1px solid rgba(196, 150, 66, 0.4); border-radius: 6px;
            padding: 10px; box-sizing: border-box; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        .chat-msg { font-size: 13px; margin-bottom: 3px; }
        .chat-guild { color: #40ff40; font-weight: bold; }

        .sidebar { width: 200px; display: flex; flex-direction: column; gap: 10px; }
        .panel { background: rgba(20, 20, 30, 0.9); border: 1px solid var(--gold); border-left: 5px solid var(--gold); padding: 12px; border-radius: 4px; }
        .score { font-size: 28px; font-weight: bold; color: #fff; }

        .overlay { 
            display: none; position: absolute; top: 0; left: 0; width: 506px; height: 606px; 
            background: rgba(0,0,0,0.85); flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        button { background: var(--gold); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 15px; color: var(--gold); text-transform: uppercase;">Mythion</h1>

    <div class="layout">
        <div class="main-column">
            <div style="position: relative;">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOver" class="overlay">
                    <h2 style="color:var(--void)">RAID WIPE</h2>
                    <div id="finalScore" class="score">0</div>
                    <button onclick="reset()">Zkusit znovu (Re-pull)</button>
                </div>
            </div>
            <div class="chat-window" id="chat"></div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <div style="font-size: 10px; color: var(--gold)">M+ RATING</div>
                <div id="score" class="score">0</div>
            </div>
            <div class="panel" style="border-left-color: var(--mythic)">
                <div style="font-size: 10px; color: var(--mythic)">BEST RUN</div>
                <div id="best" style="font-size: 20px; font-weight: bold;">0</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 600;

        const img = new Image(); img.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';

        let p, platforms, score, best, active, started, camY, keys = {};
        best = localStorage.getItem('myth_best') || 0;
        document.getElementById('best').innerText = best + " yd";

        function reset() {
            p = { x: 230, y: 500, w: 40, h: 40, dy: 0, dx: 0, grounded: false };
            platforms = [{x: 0, y: 570, w: 500, h: 100, type: 'start', alpha: 1}];
            for(let i=1; i<15; i++) spawnPlat(570 - i*140);
            score = 0; camY = 0; active = true; started = false;
            document.getElementById('gameOver').style.display = 'none';
            msg("System", "Boj začíná! Mezerník = skok, šipky = pohyb.", "chat-system");
        }

        function spawnPlat(y) {
            const w = 100 + Math.random()*50;
            const type = (Math.random() > 0.8 && y < 200) ? 'void' : 'normal';
            platforms.push({ x: Math.random()*(canvas.width-w), y: y, w: w, h: 15, type, alpha: 1 });
        }

        function msg(name, text, cls="chat-guild") {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = 'chat-msg';
            d.innerHTML = `<span class="${cls}">[${name}]:</span> ${text}`;
            c.appendChild(d);
            if(c.childNodes.length > 5) c.removeChild(c.firstChild);
        }

        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => {
            keys[e.code] = false;
            if(e.code === 'Space' && p.grounded && active) {
                p.dy = -16; // Fixní síla skoku pro jistotu
                p.grounded = false;
                started = true;
            }
        };

        function loop() {
            if(active) {
                // Movement
                if(keys['ArrowLeft'] || keys['KeyA']) p.dx = -7;
                else if(keys['ArrowRight'] || keys['KeyD']) p.dx = 7;
                else p.dx *= 0.8;

                p.dy += 0.6; p.x += p.dx; p.y += p.dy;

                // Screen wrap
                if(p.x > canvas.width) p.x = -p.w;
                if(p.x < -p.w) p.x = canvas.width;

                // Collision
                p.grounded = false;
                platforms.forEach(plat => {
                    if(p.dy > 0 && p.x + p.w > plat.x && p.x < plat.x + plat.w &&
                       p.y + p.h > plat.y && p.y + p.h < plat.y + plat.h + p.dy) {
                        p.y = plat.y - p.h; p.dy = 0; p.grounded = true;
                        if(plat.type === 'void' && started) plat.alpha -= 0.1;
                    }
                });

                if(started) {
                    if(p.y < camY + 250) camY = p.y - 250;
                    score = Math.max(score, Math.floor(Math.abs(p.y - 500)/10));
                    document.getElementById('score').innerText = score;
                }

                if(platforms[platforms.length-1].y > camY - 100) spawnPlat(platforms[platforms.length-1].y - 140);
                if(p.y > camY + canvas.height + 50 && started) {
                    active = false;
                    document.getElementById('gameOver').style.display = 'flex';
                    document.getElementById('finalScore').innerText = score + " yd";
                    if(score > best) { best = score; localStorage.setItem('myth_best', best); document.getElementById('best').innerText = best + " yd"; }
                }
            }

            // Draw
            ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0,0,500,600);
            
            // Background Vibe
            let g = ctx.createRadialGradient(250, 300, 0, 250, 300, 400);
            g.addColorStop(0, '#151525'); g.addColorStop(1, '#050508');
            ctx.fillStyle = g; ctx.fillRect(0,0,500,600);

            ctx.save(); ctx.translate(0, -camY);
            platforms.forEach(plat => {
                ctx.globalAlpha = plat.alpha;
                ctx.fillStyle = plat.type === 'void' ? '#f44' : var(--gold);
                ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            });
            ctx.globalAlpha = 1; ctx.shadowBlur = 15; ctx.shadowColor = '#000';
            ctx.drawImage(img, p.x, p.y, p.w, p.h);
            ctx.restore();

            requestAnimationFrame(loop);
        }

        const toxic = ["Uhni z toho ohně!", "DPS jak u tanka...", "Mimi vidí všechno!", "Suzu tě nehealuje!", "Zase wipe..."];
        setInterval(() => { if(started && active) msg("Guild", toxic[Math.floor(Math.random()*toxic.length)]); }, 7000);

        reset(); loop();
    </script>
</body>
</html>
