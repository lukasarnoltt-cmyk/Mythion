<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: Beer & Wipe Edition</title>
    <style>
        :root { --gold: #c49642; --mythic: #a335ee; --void: #ff4444; }
        
        body { 
            margin: 0; background: #020205; color: #f0ebe0; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden;
        }

        /* DYNAMICKÉ PARALLAX POZADÍ */
        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, #101025 0%, #000 100%);
        }

        .game-container { display: flex; gap: 20px; align-items: flex-start; z-index: 10; }
        
        .chat-area {
            width: 550px; height: 180px; background: rgba(0,0,0,0.9);
            border: 3px solid var(--gold); border-bottom: none; border-radius: 12px 12px 0 0;
            padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; 
            justify-content: flex-end; font-size: 13px; line-height: 1.5;
        }

        canvas { 
            border: 3px solid var(--gold); background: rgba(5, 5, 15, 0.5); 
            border-radius: 0 0 12px 12px; box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        .sidebar { width: 220px; display: flex; flex-direction: column; gap: 12px; }
        .panel { 
            background: rgba(0,0,0,0.85); border: 1px solid var(--gold); 
            border-left: 6px solid var(--gold); padding: 15px; border-radius: 6px;
        }
        .score-num { font-size: 32px; font-weight: bold; color: #fff; text-shadow: 0 0 10px var(--gold); }
        
        /* BARVY POSTAV */
        .c-mimi { color: #ff80df; font-weight: bold; } 
        .c-arny { color: #ffb100; font-weight: bold; }
        .c-suzu { color: #00ccff; font-weight: bold; }
        .c-ex { color: #a335ee; font-weight: bold; }
        .c-fajtus { color: #ff4444; font-weight: bold; }
        .c-matez { color: #44ff44; font-weight: bold; }
        
        .overlay { 
            display: none; position: absolute; top: 180px; left: 0; width: 550px; height: 606px; 
            background: rgba(0,0,0,0.95); flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        button { 
            background: var(--gold); border: none; padding: 15px 30px; font-size: 18px;
            font-weight: bold; cursor: pointer; border-radius: 6px; color: #000;
        }
    </style>
</head>
<body>

    <div id="bg"></div>
    <h1 style="color: var(--gold); letter-spacing: 12px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 0 0 20px #c49642;">Mythion</h1>

    <div class="game-container">
        <div class="canvas-wrap">
            <div class="chat-area" id="chat"></div>
            <div style="position: relative;">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOver" class="overlay">
                    <h2 style="color:var(--void); font-size: 40px; margin: 0;">PROMILLI FAIL</h2>
                    <p id="deathReason" style="color: #ccc; font-style: italic; margin-bottom: 20px;"></p>
                    <div id="finalScore" class="score-num" style="margin-bottom: 25px;">0 yd</div>
                    <button onclick="reset()">EXNOUT A ZNOVU</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <div style="font-size: 11px; color: var(--gold);">PROGRES (PIVO V SOBĚ)</div>
                <div id="curScore" class="score-num">0</div>
            </div>
            <div class="panel" style="border-left-color: var(--mythic)">
                <div style="font-size: 11px; color: var(--mythic);">REKORD GUILDY</div>
                <div id="bestScore" style="font-size: 22px; font-weight: bold;">0 yd</div>
            </div>
            <div class="panel" style="border-left-color: #ff4444; font-size: 12px;">
                <b>TIP:</b> Čím déle držíš <b>Mezerník</b>, tím víc ten ožralej ork poletí!
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 550; canvas.height = 600;

        const img = new Image(); img.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';

        let p, platforms, score, best, active, started, camY, keys = {};
        let jumpCharge = 0;
        
        best = localStorage.getItem('myth_beer_best') || 0;
        document.getElementById('bestScore').innerText = best + " yd";

        const members = [
            {n: "Mimi", c: "c-mimi", m: [
                "S jinou guildou se mi to teda dělalo mnohem líp...",
                "Piju jen výběrový víno, tohle vaše pivo je pro socky.",
                "Já jsem větší frajer než vy, tohle jsem prošel už v pre-alphě.",
                "Tuhle mechaniku jsem vymyslel já, vy ji jen kazíte.",
                "Mimi vidí všechno, i to, jak se ti klepou ruce z absťáku.",
                "S jinou guildou jsme tohle skákali poslepu a u toho jsme stíhali First Kill.",
                "Nezdržujte mě, čeká na mě top guilda, ne tahle vaše hospoda.",
                "Já už to měl hotový loni, vy jste jen moje levná pracovní síla."
            ]},
            {n: "Arny", c: "c-arny", m: [
                "Mimi, jestli ještě jednou řekneš jiná guilda, proženu ti šíp hlavou!",
                "Kdo mi dopil pivo?! Seberte mu loot!",
                "Makej orku, nebo ti Jefoma máma uvaří k obědu tvoje vlastní boty!",
                "Soustřeďte se! Padáte víc než já po desátym kousku.",
                "To je dps jak u mrtvýho tchoře.",
                "Příští wipe jde Mimi z raidu... i s tím svým vínem!"
            ]},
            {n: "Suzu", c: "c-suzu", m: [
                "Nehealuju nikoho, kdo nemá aspoň 2 promile!",
                "Mimi, uhni z tý červený, nebo ti ten tvůj progres nacpu do...",
                "Došly mi potky, pijte pivo, léčí to líp.",
                "Zase dole? Suzu tě zvedne, až dopije tohle orosený.",
                "Jsem healerka, ne vaše uklízečka blitků!"
            ]},
            {n: "Fajtus", c: "c-fajtus", m: [
                "Hoďte tam někdo Bloodlust, mně už dochází dech!",
                "Ty vole, já nevidím ty plošiny, kdo tu zhasnul?",
                "Mimi, ty tvoje kecy pálí víc než můj fireball.",
                "Pije tu někdo rum? Pivo je moc pomalý.",
                "Wipe? Nevadí, aspoň stihnu dojít pro další bednu."
            ]},
            {n: "Matez666", c: "c-matez", m: [
                "Mám zapnutý monitor? Ne, moment, to je jen zrcadlo.",
                "666 je moje číslo, ale s tímhle skákáním skončíme v pekle všichni.",
                "Mimi, ty jsi frajer leda tak v LFR, tak se uklidni.",
                "Tenhle raid je horší než ranní kocovina.",
                "Pojďme to pushnout, v lednici už mám jenom světlo."
            ]},
            {n: "Exsqueez", c: "c-ex", m: [
                "Exsqueez me? To byl skok, nebo jsi jen zakopl o vlastní ego?",
                "Půjč mi někdo na repair, utratil jsem všechno v baru.",
                "Vidím wipe, vidím tmu a vidím Mimiho, jak zase brečí.",
                "Mimi, tvoje jiná guilda tě vykopla, protože jsi pil moc limonády.",
                "Má ten ork lagy, nebo je prostě jenom vylitej?"
            ]}
        ];

        const deathReasons = [
            "Mimi tě ubrečel k smrti o svý minulý guildě.",
            "Upadl jsi a rozlil si pivo. Hanba ti!",
            "Arny ti dal kick, protože jsi skákal střízlivej.",
            "Suzu tě odmítla zvednout, protože nemáš v krvi ethanol.",
            "Matez666 tě omylem obětoval satanovi pro lepší loot."
        ];

        function msg() {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            const member = members[Math.floor(Math.random()*members.length)];
            const text = member.m[Math.floor(Math.random()*member.m.length)];
            d.innerHTML = `<span style="color:#40ff40">[Guild]</span> <span class="${member.c}">${member.n}:</span> ${text}`;
            c.appendChild(d);
            if(c.childNodes.length > 7) c.removeChild(c.firstChild);
            c.scrollTop = c.scrollHeight;
        }

        function reset() {
            p = { x: 250, y: 500, w: 45, h: 45, dy: 0, dx: 0, grounded: false };
            platforms = [{x: 0, y: 570, w: 550, h: 100, type: 'safe', alpha: 1, dead: false}];
            for(let i=1; i<15; i++) spawnPlat(570 - i * 140);
            score = 0; camY = 0; active = true; started = false; jumpCharge = 0;
            document.getElementById('gameOver').style.display = 'none';
        }

        function spawnPlat(y) {
            const w = 130;
            const lastType = platforms[platforms.length - 1].type;
            let type = 'safe';
            if (lastType === 'safe' && platforms.length > 3 && Math.random() > 0.55) type = 'void';
            platforms.push({ x: Math.random()*(canvas.width-w), y, w, h: 22, type, alpha: 1, dead: false });
        }

        window.onkeydown = e => { keys[e.code] = true; if(e.code === 'Space') e.preventDefault(); };
        window.onkeyup = e => { keys[e.code] = false; };

        function loop() {
            if(active) {
                if(keys['ArrowLeft'] || keys['KeyA']) p.dx = -7.5;
                else if(keys['ArrowRight'] || keys['KeyD']) p.dx = 7.5;
                else p.dx *= 0.85;

                if (keys['Space'] && p.grounded) {
                    jumpCharge += 1.2;
                    if (jumpCharge > 22) jumpCharge = 22;
                } else if (!keys['Space'] && jumpCharge > 0) {
                    p.dy = -jumpCharge - 6;
                    jumpCharge = 0;
                    p.grounded = false;
                    started = true;
                }

                p.dy += 0.6; 
                p.x += p.dx; p.y += p.dy;
                if(p.x > canvas.width) p.x = -p.w; if(p.x < -p.w) p.x = canvas.width;

                p.grounded = false;
                platforms.forEach(plat => {
                    if(!plat.dead && p.dy > 0 && p.x + p.w > plat.x && p.x < plat.x + plat.w &&
                       p.y + p.h > plat.y && p.y + p.h < plat.y + plat.h + p.dy) {
                        p.y = plat.y - p.h; p.dy = 0; p.grounded = true;
                        if(plat.type === 'void' && started) {
                            plat.alpha -= 0.2; // Rychlejší mizení pro větší hardcore
                            if(plat.alpha <= 0) plat.dead = true;
                        }
                    }
                });

                if(started) {
                    if(p.y < camY + 300) camY += (p.y - 300 - camY) * 0.15;
                    score = Math.max(score, Math.floor(Math.abs(p.y - 500)/10));
                    document.getElementById('curScore').innerText = score;
                }

                if(platforms[platforms.length-1].y > camY - 100) spawnPlat(platforms[platforms.length-1].y - 140);
                
                if(p.y > camY + 700 && started) {
                    active = false;
                    document.getElementById('gameOver').style.display = 'flex';
                    document.getElementById('finalScore').innerText = score + " yd";
                    document.getElementById('deathReason').innerText = deathReasons[Math.floor(Math.random()*deathReasons.length)];
                    if(score > best) { best = score; localStorage.setItem('myth_beer_best', best); document.getElementById('bestScore').innerText = best + " yd"; }
                }
            }

            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.save(); ctx.translate(0, -camY);

            platforms.forEach(plat => {
                if(!plat.dead) {
                    ctx.globalAlpha = plat.alpha;
                    ctx.fillStyle = plat.type === 'void' ? '#ff4444' : '#c49642';
                    ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                    ctx.strokeStyle = "rgba(255,255,255,0.2)";
                    ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                }
            });

            ctx.globalAlpha = 1; ctx.shadowBlur = 0;
            if(jumpCharge > 0) {
                ctx.fillStyle = '#44ff44';
                ctx.fillRect(p.x, p.y + p.h + 10, (jumpCharge/22)*p.w, 6);
            }
            ctx.drawImage(img, p.x, p.y, p.w, p.h);
            ctx.restore();
            requestAnimationFrame(loop);
        }

        function scheduleMsg() {
            if(active && started) msg();
            setTimeout(scheduleMsg, 4000 + Math.random() * 5000);
        }

        reset(); loop(); scheduleMsg();
    </script>
</body>
</html>
