<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: Engine Overhaul</title>
    <style>
        :root { --gold: #c49642; --mythic: #a335ee; --void: #ff4444; --rare: #0070dd; }
        
        body { 
            margin: 0; background: #050508; color: #f0ebe0; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
        }

        /* HLUBOKÝ VESMÍR */
        #starfield { position: absolute; inset: 0; z-index: -1; background: radial-gradient(circle at center, #110a1f 0%, #050508 100%); }

        .layout-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 10; }
        
        .guild-header { 
            font-size: 60px; font-weight: 900; letter-spacing: 20px; text-transform: uppercase; margin: 0;
            background: linear-gradient(to bottom, #fff 0%, var(--gold) 50%, #8a6526 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(196, 150, 66, 0.4));
        }

        .game-container { display: flex; gap: 30px; align-items: flex-start; }
        .main-view { display: flex; flex-direction: column; border-radius: 15px; box-shadow: 0 0 100px rgba(0,0,0,0.8); }

        .canvas-area { position: relative; border: 2px solid rgba(196, 150, 66, 0.5); border-radius: 12px 12px 0 0; overflow: hidden; background: #000; }
        canvas { display: block; cursor: none; }

        /* SIDEBAR PROFI UI */
        .sidebar { width: 240px; display: flex; flex-direction: column; gap: 15px; }
        .panel { 
            background: rgba(10, 10, 20, 0.8); border: 1px solid rgba(196, 150, 66, 0.2); 
            border-radius: 10px; padding: 20px; position: relative; backdrop-filter: blur(10px);
            border-left: 4px solid var(--gold);
        }
        .panel::after { content: ""; position: absolute; inset: 0; border-radius: 10px; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05)); pointer-events: none; }
        
        .panel-title { color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; font-weight: bold; opacity: 0.8; }
        .score-val { font-size: 36px; font-weight: 900; font-variant-numeric: tabular-nums; }
        .rank-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: var(--mythic); color: #fff; margin-top: 8px; font-weight: bold; }

        /* CHAT BOX */
        .chat-container {
            width: 100%; height: 160px; background: rgba(5, 5, 10, 0.9);
            border: 2px solid rgba(196, 150, 66, 0.5); border-top: none;
            border-radius: 0 0 12px 12px; padding: 15px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: flex-end; gap: 5px;
        }
        .chat-msg { font-size: 13px; border-left: 2px solid rgba(64, 255, 64, 0.3); padding-left: 8px; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .chat-guild { color: #40ff40; font-weight: bold; }
        .chat-system { color: #ffff40; font-style: italic; opacity: 0.8; }

        .overlay { 
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            flex-direction: column; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(8px);
        }
        .btn-restart { 
            background: var(--gold); color: #000; border: none; padding: 15px 40px; 
            font-weight: 900; cursor: pointer; border-radius: 5px; transition: 0.2s; text-transform: uppercase;
        }
        .btn-restart:hover { transform: scale(1.05); filter: brightness(1.2); }
    </style>
</head>
<body>

    <div id="starfield"></div>

    <div class="layout-wrapper" id="gameUI">
        <h1 class="guild-header">Mythion</h1>

        <div class="game-container">
            <div class="main-view">
                <div class="canvas-area">
                    <canvas id="gameCanvas"></canvas>
                    <div id="gameOverScreen" class="overlay">
                        <h1 style="color:var(--void); font-size: 50px; margin:0; text-shadow: 0 0 20px rgba(255,0,0,0.5);">RELEASE SPIRIT?</h1>
                        <div class="score-val" id="finalScore" style="color:var(--gold); margin-bottom: 20px;">0 yd</div>
                        <button class="btn-restart" onclick="restartGame()">Re-Pull Boss</button>
                    </div>
                </div>
                <div class="chat-container" id="gameChat"></div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="panel-title">M+ Rating</div>
                    <div class="score-val" id="height">0</div>
                    <div class="rank-tag" id="rankName">Trialist</div>
                </div>
                <div class="panel" style="border-left-color: var(--rare);">
                    <div class="panel-title">Affixes</div>
                    <div id="affixDisplay" style="font-weight: bold; color: var(--rare);">NONE</div>
                </div>
                <div class="panel" style="border-left-color: var(--mythic);">
                    <div class="panel-title">Personal Best</div>
                    <div id="bestScore" style="font-size: 24px; font-weight: bold;">0 yd</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 600;

        const imgOrc = new Image(); imgOrc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';
        
        // Game State
        let score = 0, best = localStorage.getItem('mythion_pro_best') || 0;
        let gameActive = true, started = false, spacePressed = false, jumpPower = 0, cameraY = 0;
        let shake = 0;
        const platforms = [], particles = [];

        // Player Config
        let player = { 
            x: 230, y: 500, w: 42, h: 42, dx: 0, dy: 0, 
            grounded: false, tilt: 0, scaleX: 1, scaleY: 1 
        };

        // --- PARTICLE ENGINE ---
        class Particle {
            constructor(x, y, color, speedX, speedY, life) {
                this.x = x; this.y = y; this.color = color;
                this.dx = speedX; this.dy = speedY; this.life = life; this.maxLife = life;
            }
            update() { this.x += this.dx; this.y += this.dy; this.life--; }
            draw(ctx) {
                ctx.globalAlpha = this.life / this.maxLife;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y - cameraY, 3, 3);
            }
        }

        function createExplosion(x, y, color, count) {
            for(let i=0; i<count; i++) {
                particles.push(new Particle(x, y, color, (Math.random()-0.5)*6, (Math.random()-0.5)*6, 20 + Math.random()*20));
            }
        }

        // --- PLATFORM ENGINE ---
        function addPlatform(y) {
            const w = Math.max(80, 160 - Math.abs(y)/800);
            const isVoid = Math.abs(y) > 800 && Math.random() > 0.75;
            platforms.push({
                x: Math.random()*(canvas.width - w), y: y, w: w, h: 16,
                type: isVoid ? 'void' : 'normal', alpha: 1, pulse: 0
            });
        }

        function restartGame() {
            score = 0; cameraY = 0; gameActive = true; started = false; jumpPower = 0;
            platforms.length = 0; particles.length = 0;
            player.x = 230; player.y = 500; player.dy = 0; player.dx = 0;
            platforms.push({x: 0, y: 570, w: 500, h: 100, type: 'start', alpha: 1});
            for(let i=1; i<10; i++) addPlatform(570 - i*140);
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('bestScore').innerText = best + " yd";
        }

        // --- CORE LOOP ---
        function update() {
            if (!gameActive) return;

            // Movement
            if (keys['KeyA'] || keys['ArrowLeft']) { player.dx = -8; player.tilt = -0.1; }
            else if (keys['KeyD'] || keys['ArrowRight']) { player.dx = 8; player.tilt = 0.1; }
            else { player.dx *= 0.85; player.tilt *= 0.8; }

            player.dy += 0.6; // Gravity
            player.x += player.dx; player.y += player.dy;

            // Screen Wrap
            if (player.x + player.w < 0) player.x = canvas.width;
            if (player.x > canvas.width) player.x = -player.w;

            // Jump Charge
            if (spacePressed && player.grounded) {
                jumpPower = Math.min(jumpPower + 0.8, 22);
                player.scaleY = 0.8; player.scaleX = 1.2; // SQUASH
            }

            // Collision
            let wasGrounded = player.grounded;
            player.grounded = false;
            for (let p of platforms) {
                if (player.dy > 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.dy) {
                    
                    if (!wasGrounded) { // Landing Juice
                        shake = player.dy * 0.5;
                        player.scaleY = 0.7; player.scaleX = 1.3;
                        createExplosion(player.x + 20, player.y + 40, '#fff', 5);
                    }
                    player.y = p.y - player.h; player.dy = 0; player.grounded = true;
                    if (p.type === 'void' && started) p.alpha -= 0.15;
                }
            }

            // Camera & Score
            if (started) {
                let targetCam = player.y - 250;
                if (targetCam < cameraY) cameraY += (targetCam - cameraY) * 0.1;
                score = Math.max(score, Math.floor(Math.abs(player.y - 500)/10));
                document.getElementById('height').innerText = score;
                
                if (score > 1000) document.getElementById('affixDisplay').innerText = "QUAKING";
                if (score > 2000) document.getElementById('rankName').innerText = "Guild Master";
            }

            // Animation Recovery
            player.scaleX += (1 - player.scaleX) * 0.2;
            player.scaleY += (1 - player.scaleY) * 0.2;

            // Cleanup & Gen
            if (platforms[platforms.length-1].y > cameraY - 200) addPlatform(platforms[platforms.length-1].y - 140);
            for(let i=particles.length-1; i>=0; i--) { particles[i].update(); if(particles[i].life <= 0) particles.splice(i,1); }

            if (player.y > cameraY + canvas.height + 100) {
                gameActive = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                document.getElementById('finalScore').innerText = score + " yd";
                if (score > best) { best = score; localStorage.setItem('mythion_pro_best', best); }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background Glow
            let grd = ctx.createRadialGradient(250, 300, 0, 250, 300, 400);
            grd.addColorStop(0, '#111'); grd.addColorStop(1, '#000');
            ctx.fillStyle = grd; ctx.fillRect(0,0,canvas.width,canvas.height);

            ctx.save();
            // Screen Shake
            if (shake > 0) { ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2); shake *= 0.9; }
            ctx.translate(0, -cameraY);

            // Draw Platforms
            platforms.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.type === 'void' ? '#f44' : '#c49642';
                ctx.fillStyle = p.type === 'void' ? '#300' : '#111';
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = p.type === 'void' ? '#ff4444' : '#c49642';
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, p.y, p.w, p.h);
            });

            // Particles
            particles.forEach(p => p.draw(ctx));

            // Player Draw with Squash/Stretch & Tilt
            ctx.save();
            ctx.translate(player.x + player.w/2, player.y + player.h/2);
            ctx.rotate(player.tilt);
            ctx.scale(player.scaleX, player.scaleY);
            ctx.shadowBlur = 20; ctx.shadowColor = jumpPower > 15 ? '#0af' : '#000';
            ctx.drawImage(imgOrc, -player.w/2, -player.h/2, player.w, player.h);
            ctx.restore();

            ctx.restore();
            requestAnimationFrame(() => { update(); draw(); });
        }

        // Input
        const keys = {};
        window.onkeydown = (e) => { keys[e.code] = true; if(e.code==='Space') { e.preventDefault(); spacePressed = true; } };
        window.onkeyup = (e) => { 
            keys[e.code] = false; 
            if(e.code==='Space' && player.grounded) { 
                player.dy = -jumpPower; player.grounded = false; started = true;
                player.scaleY = 1.5; player.scaleX = 0.7; // STRETCH on jump
                createExplosion(player.x + 20, player.y + 40, '#c49642', 8);
                jumpPower = 0; spacePressed = false;
            }
        };

        // Chat Sim
        const msgs = ["Uhni z toho ohně!", "Mimi vidí všechno!", "Suzu tě nehealuje!", "To je dps jak u tanka...", "Wipe v přímém přenosu."];
        const names = ["Arny", "Mimi", "Suzu", "Exsqueez"];
        setInterval(() => {
            if(!gameActive || !started) return;
            const chat = document.getElementById('gameChat');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<span class="chat-guild">[Guild]</span> <b>${names[Math.floor(Math.random()*names.length)]}:</b> ${msgs[Math.floor(Math.random()*msgs.length)]}`;
            chat.appendChild(div);
            if(chat.childNodes.length > 5) chat.removeChild(chat.firstChild);
        }, 7000);

        restartGame(); draw();
    </script>
</body>
</html>
