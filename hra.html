<title>Mythion: The Starry Return</title>
    <style>
        :root { --gold: #c49642; --mythic: #a335ee; --void: #ff4444; }
        
        body { 
            margin: 0; 
            background: #050508;
            color: #f0ebe0; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden;
            /* HVĚZDNÉ POZADÍ */
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px),
                radial-gradient(white, rgba(255,255,255,.1) 2px, transparent 40px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            animation: stars 60s linear infinite;
        }

        @keyframes stars {
            from { background-position: 0 0, 40px 60px, 130px 270px; }
            to { background-position: 0 1000px, 40px 1060px, 130px 1270px; }
        }

        .game-container { display: flex; gap: 20px; align-items: flex-start; }
        .canvas-wrap { display: flex; flex-direction: column; }

        .chat-area {
            width: 506px; height: 110px; background: rgba(0,0,0,0.85);
            border: 3px solid var(--gold); border-bottom: none; border-radius: 8px 8px 0 0;
            padding: 8px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end;
            font-size: 13px;
        }

        canvas { border: 3px solid var(--gold); background: rgba(10, 10, 25, 0.6); border-radius: 0 0 8px 8px; }

        .sidebar { width: 180px; display: flex; flex-direction: column; gap: 10px; }
        .panel { background: rgba(0,0,0,0.8); border: 1px solid var(--gold); border-left: 5px solid var(--gold); padding: 12px; border-radius: 4px; }
        .score-num { font-size: 26px; font-weight: bold; }
        .chat-guild { color: #40ff40; font-weight: bold; }
        
        .overlay { 
            display: none; position: absolute; top: 110px; left: 0; width: 506px; height: 606px; 
            background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        button { background: var(--gold); border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

    <h1 style="color: var(--gold); letter-spacing: 8px; text-transform: uppercase; margin-bottom: 10px;">Mythion</h1>

    <div class="game-container">
        <div class="canvas-wrap">
            <div class="chat-area" id="chat"></div>
            <div style="position: relative;">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOver" class="overlay">
                    <h2 style="color:var(--void)">RAID WIPE</h2>
                    <div id="finalScore" class="score-num" style="margin-bottom: 20px;">0 yd</div>
                    <button onclick="reset()">RE-PULL</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <div style="font-size: 10px; color: var(--gold)">M+ RATING</div>
                <div id="curScore" class="score-num">0</div>
            </div>
            <div class="panel" style="border-left-color: var(--mythic)">
                <div style="font-size: 10px; color: var(--mythic)">BEST</div>
                <div id="bestScore" style="font-size: 18px; font-weight: bold;">0 yd</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 600;

        const img = new Image(); img.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';

        let p, platforms, score, best, active, started, camY, keys = {};
        let jumpCharge = 0; // Pro nabíjení skoku
        
        best = localStorage.getItem('myth_starry_best') || 0;
        document.getElementById('bestScore').innerText = best + " yd";

        const members = [
            {n: "Arny", m: ["Makej!", "To je dps jak u tanka...", "Mimi ti Jefoma mama..."]},
            {n: "Mimi", m: ["Mimi vidí všechno!", "Skoč víc!", "Armáda čeká!"]},
            {n: "Suzu", m: ["Nehealuju!", "Low mana!", "Kdo to pullnul?"]},
            {n: "Exsqueez", m: ["Monitor zapnout!", "Wipe!", "Dej goldy na repair."]}
        ];

        function msg(name, text) {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.style.marginBottom = "2px";
            d.innerHTML = `<span class="chat-guild">[Guild] ${name}:</span> ${text}`;
            c.appendChild(d);
            if(c.childNodes.length > 5) c.removeChild(c.firstChild);
        }

        function reset() {
            p = { x: 230, y: 500, w: 40, h: 40, dy: 0, dx: 0, grounded: false };
            platforms = [{x: 0, y: 570, w: 500, h: 100, type: 'safe', alpha: 1, dead: false}];
            for(let i=1; i<10; i++) spawnPlat(570 - i * 140);
            score = 0; camY = 0; active = true; started = false; jumpCharge = 0;
            document.getElementById('gameOver').style.display = 'none';
        }

        function spawnPlat(y) {
            const w = 110;
            let type = 'safe';
            if (platforms.length > 5 && Math.random() > 0.6) type = 'void';
            platforms.push({ x: Math.random()*(canvas.width-w), y, w, h: 15, type, alpha: 1, dead: false });
        }

        window.onkeydown = e => { keys[e.code] = true; if(e.code === 'Space') e.preventDefault(); };
        window.onkeyup = e => { keys[e.code] = false; };

        function loop() {
            if(active) {
                // Pohyb do stran
                if(keys['ArrowLeft'] || keys['KeyA']) p.dx = -6;
                else if(keys['ArrowRight'] || keys['KeyD']) p.dx = 6;
                else p.dx *= 0.8;

                // LOGIKA SKOKU: Držení mezerníku
                if (keys['Space'] && p.grounded) {
                    jumpCharge += 0.8;
                    if (jumpCharge > 18) jumpCharge = 18; // Limit síly
                } else if (!keys['Space'] && jumpCharge > 0) {
                    p.dy = -jumpCharge - 5; // Minimální skok je 5 + nabití
                    jumpCharge = 0;
                    p.grounded = false;
                    started = true;
                }

                p.dy += 0.5; // Gravitace
                p.x += p.dx; p.y += p.dy;
                
                if(p.x > canvas.width) p.x = -p.w; if(p.x < -p.w) p.x = canvas.width;

                p.grounded = false;
                platforms.forEach(plat => {
                    if(!plat.dead && p.dy > 0 && p.x + p.w > plat.x && p.x < plat.x + plat.w &&
                       p.y + p.h > plat.y && p.y + p.h < plat.y + plat.h + p.dy) {
                        p.y = plat.y - p.h; p.dy = 0; p.grounded = true;
                        if(plat.type === 'void' && started) {
                            plat.alpha -= 0.1;
                            if(plat.alpha <= 0) plat.dead = true;
                        }
                    }
                });

                if(started) {
                    if(p.y < camY + 300) camY += (p.y - 300 - camY) * 0.1;
                    score = Math.max(score, Math.floor(Math.abs(p.y - 500)/10));
                    document.getElementById('curScore').innerText = score;
                }

                if(platforms[platforms.length-1].y > camY - 100) spawnPlat(platforms[platforms.length-1].y - 140);
                
                if(p.y > camY + 700 && started) {
                    active = false;
                    document.getElementById('gameOver').style.display = 'flex';
                    document.getElementById('finalScore').innerText = score + " yd";
                    if(score > best) { best = score; localStorage.setItem('myth_starry_best', best); document.getElementById('bestScore').innerText = best + " yd"; }
                }
            }

            ctx.clearRect(0,0,500,600);
            ctx.save(); ctx.translate(0, -camY);
            
            platforms.forEach(plat => {
                if(!plat.dead) {
                    ctx.globalAlpha = plat.alpha;
                    ctx.fillStyle = plat.type === 'void' ? '#ff4444' : '#c49642';
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                }
            });

            ctx.globalAlpha = 1;
            // Indikátor nabití skoku (stoupající linka pod orkem)
            if(jumpCharge > 0) {
                ctx.fillStyle = '#40ff40';
                ctx.fillRect(p.x, p.y + p.h + 5, (jumpCharge/18)*p.w, 4);
            }
            
            ctx.drawImage(img, p.x, p.y, p.w, p.h);
            ctx.restore();
            requestAnimationFrame(loop);
        }

        setInterval(() => {
            if(active && started) {
                const mem = members[Math.floor(Math.random()*members.length)];
                msg(mem.n, mem.m[Math.floor(Math.random()*mem.m.length)]);
            }
        }, 8000);

        reset(); loop();
    </script>
</body>
</html>
