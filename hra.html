<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion RPG: Hero's Journey</title>
    <style>
        body { margin: 0; background: #0b0d12; display: flex; flex-direction: column; align-items: center; color: #f0ebe0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { border: 3px solid #c49642; background: #1a1a2e; margin-top: 20px; cursor: crosshair; }
        .ui-top { display: flex; gap: 20px; margin-top: 10px; background: rgba(0,0,0,0.8); padding: 10px 20px; border: 2px solid #c49642; border-radius: 5px; }
        .stat { font-size: 18px; color: #c49642; font-weight: bold; }
        #shopUI { 
            display: none; position: absolute; top: 150px; background: #2c1a0a; border: 4px inset #c49642; 
            padding: 20px; text-align: center; width: 300px; box-shadow: 0 0 50px black;
        }
        .shop-btn { background: #4e342e; color: white; border: 1px solid #c49642; padding: 10px; margin: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        .shop-btn:hover { background: #c49642; color: black; }
        .close-btn { font-size: 12px; color: #888; cursor: pointer; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <h1 style="color: #c49642; margin: 10px 0 5px 0;">MYTHION: ORC ADVENTURE</h1>
    
    <div class="ui-top">
        <div class="stat">Zlato: <span id="gold">0</span>g</div>
        <div class="stat">Level: <span id="lvlDisplay">1</span></div>
        <div class="stat">Jump: <span id="jumpLvl">100</span>%</div>
        <div class="stat">Speed: <span id="speedLvl">100</span>%</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <p style="color: #888;">Šipky/WASD: Pohyb | U NPC zmáčkni <b>B</b> pro Obchod</p>

    <div id="shopUI">
        <h2 style="color:#c49642; margin-top:0;">Guildovní Obchod</h2>
        <p>Máš: <span id="shopGold">0</span>g</p>
        <button class="shop-btn" onclick="buy('speed')">Boty Rychlosti (30g)</button>
        <button class="shop-btn" onclick="buy('jump')">Lektvar Skoku (30g)</button>
        <span class="close-btn" onclick="toggleShop(false)">[ Zavřít ESC ]</span>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 500;

        // Obrázky
        const imgOrc = new Image(); imgOrc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';
        const imgMurloc = new Image(); imgMurloc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_misc_head_murloc_01.jpg';
        const imgPortal = new Image(); imgPortal.src = 'https://render.worldofwarcraft.com/eu/icons/56/spell_arcane_teleportorgrimmar.jpg';

        let gold = 0;
        let currentLevel = 1;
        let upgrades = { speed: 0, jump: 0 };
        let isShopOpen = false;
        const keys = {};

        const player = { x: 50, y: 300, w: 45, h: 45, dx: 0, dy: 0, grounded: false };
        const npc = { x: 220, y: 400, w: 45, h: 45 }; // Obchodník Murloc

        const levels = {
            1: {
                platforms: [{x:0, y:450, w:400, h:50}, {x:450, y:350, w:200, h:30}, {x:750, y:250, w:250, h:50}],
                coins: [{x:480, y:310}, {x:550, y:310}],
                portal: {x:920, y:190, w:60, h:60}
            },
            2: {
                platforms: [{x:0, y:450, w:150, h:50}, {x:250, y:380, w:100, h:20}, {x:450, y:300, w:100, h:20}, {x:650, y:220, w:100, h:20}, {x:850, y:150, w:150, h:50}],
                coins: [{x:280, y:340}, {x:480, y:260}, {x:680, y:180}],
                portal: {x:900, y:90, w:60, h:60}
            }
        };

        function toggleShop(open) {
            isShopOpen = open;
            document.getElementById('shopUI').style.display = open ? 'block' : 'none';
            document.getElementById('shopGold').innerText = gold;
        }

        function buy(type) {
            if (gold >= 30) {
                gold -= 30;
                upgrades[type]++;
                document.getElementById('gold').innerText = gold;
                document.getElementById('shopGold').innerText = gold;
                document.getElementById(type + 'Lvl').innerText = 100 + (upgrades[type] * 10);
            } else { alert("Nedostatek zlata!"); }
        }

        function update() {
            if (isShopOpen) return;

            let speed = 5 + (upgrades.speed * 0.8);
            if (keys['KeyD'] || keys['ArrowRight']) player.dx = speed;
            else if (keys['KeyA'] || keys['ArrowLeft']) player.dx = -speed;
            else player.dx = 0;

            player.dy += 0.8;
            player.x += player.dx;
            player.y += player.dy;

            // Kolize s platformami
            player.grounded = false;
            levels[currentLevel].platforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.w > p.x && player.y < p.y + p.h && player.y + player.h > p.y) {
                    if (player.dy > 0 && player.y + player.h - player.dy <= p.y) {
                        player.y = p.y - player.h; player.dy = 0; player.grounded = true;
                    }
                }
            });

            // Sbírání zlata
            levels[currentLevel].coins = levels[currentLevel].coins.filter(c => {
                if (Math.hypot(player.x - c.x, player.y - c.y) < 40) {
                    gold += 10; document.getElementById('gold').innerText = gold; return false;
                } return true;
            });

            // Portál
            const p = levels[currentLevel].portal;
            if (Math.hypot(player.x - p.x, player.y - p.y) < 50) {
                if (currentLevel < 2) { currentLevel++; resetPlayer(); } 
                else { alert("Všechny levely splněny! Restartuji..."); currentLevel = 1; resetPlayer(); }
                document.getElementById('lvlDisplay').innerText = currentLevel;
            }

            if (player.y > canvas.height) resetPlayer();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // NPC Obchodník (jen v levelu 1)
            if (currentLevel === 1) {
                ctx.drawImage(imgMurloc, npc.x, npc.y, npc.w, npc.h);
                ctx.fillStyle = "white"; ctx.font = "12px Arial";
                ctx.fillText("[B] Obchodník", npc.x - 10, npc.y - 10);
            }

            // Platformy a mince
            ctx.fillStyle = "#3e2723";
            levels[currentLevel].platforms.forEach(p => { ctx.fillRect(p.x, p.y, p.w, p.h); ctx.strokeRect(p.x, p.y, p.w, p.h); });
            
            ctx.fillStyle = "gold";
            levels[currentLevel].coins.forEach(c => { ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill(); });

            // Portál a Hráč
            const port = levels[currentLevel].portal;
            ctx.drawImage(imgPortal, port.x, port.y, port.w, port.h);
            ctx.drawImage(imgOrc, player.x, player.y, player.w, player.h);

            requestAnimationFrame(() => { update(); draw(); });
        }

        function resetPlayer() { player.x = 50; player.y = 300; player.dy = 0; }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space' && player.grounded) { player.dy = -14 - upgrades.jump; player.grounded = false; }
            if (e.code === 'KeyB' && Math.hypot(player.x - npc.x, player.y - npc.y) < 100) toggleShop(true);
            if (e.code === 'Escape') toggleShop(false);
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        draw();
    </script>
</body>
</html>
