<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: M+ Infinite Climb</title>
    <style>
        body { margin: 0; background: #05050a; display: flex; flex-direction: column; align-items: center; color: #f0ebe0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { border: 3px solid #c49642; background: #0a0a1a; margin-top: 10px; box-shadow: 0 0 50px #000; cursor: none; }
        .ui { position: absolute; top: 20px; left: 20px; background: rgba(11, 13, 18, 0.9); padding: 15px; border: 2px solid #c49642; border-radius: 8px; pointer-events: none; min-width: 180px; z-index: 10; }
        .stats { font-size: 26px; color: #c49642; font-weight: bold; text-shadow: 2px 2px 0px #000; }
        .power-bar-bg { width: 100%; height: 12px; background: #222; border: 1px solid #c49642; margin-top: 10px; border-radius: 6px; overflow: hidden; }
        #powerBar { width: 0%; height: 100%; background: linear-gradient(to right, #4a7c2c, #ffcc00, #ff4444); }
        .overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        .btn-restart { background: #c49642; color: black; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; }
        .btn-restart:hover { background: #ffcc00; }
    </style>
</head>
<body>
    <div id="gameOverScreen" class="overlay">
        <h1 style="color: #ff4444; font-size: 50px; margin-bottom: 0;">RAID WIPE!</h1>
        <p style="font-size: 24px;">Tvé skóre: <span id="finalScore">0</span> yd</p>
        <button class="btn-restart" onclick="restartGame()">Zkusit znovu</button>
    </div>

    <div class="ui">
        <div class="stats"><span style="font-size: 16px; color: #888;">M+ SCORE</span><br><span id="height">0</span> yd</div>
        <div style="font-size: 14px; margin-top: 5px;">Season Best: <span id="best" style="color: #c49642;">0</span> yd</div>
        <div class="power-bar-bg"><div id="powerBar"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 850;

        const imgOrc = new Image(); imgOrc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';

        let score = 0;
        let bestScore = localStorage.getItem('mythion_vertical_best') || 0;
        document.getElementById('best').innerText = bestScore;

        let spacePressed = false;
        let jumpPower = 0;
        let cameraY = 0;
        let gameActive = true;
        const keys = {};

        const stars = Array.from({ length: 100 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2
        }));

        let player = { x: 280, y: 700, w: 45, h: 45, dx: 0, dy: 0, speed: 6, grounded: false };
        let platforms = [];

        function generateInitialPlatforms() {
            platforms = [{x: 0, y: 780, w: 600, h: 100}];
            for (let i = 0; i < 25; i++) {
                addPlatform(700 - (i * 130));
            }
        }

        function addPlatform(y) {
            const width = Math.max(70, 140 - (Math.abs(y) / 400));
            platforms.push({ x: Math.random() * (canvas.width - width), y: y, w: width, h: 18 });
        }

        function restartGame() {
            score = 0;
            cameraY = 0;
            gameActive = true;
            player = { x: 280, y: 700, w: 45, h: 45, dx: 0, dy: 0, speed: 6, grounded: false };
            generateInitialPlatforms();
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('height').innerText = "0";
        }

        function update() {
            if (!gameActive) return;

            if (keys['KeyA'] || keys['ArrowLeft']) player.dx = -player.speed;
            else if (keys['KeyD'] || keys['ArrowRight']) player.dx = player.speed;
            else player.dx *= 0.85;

            player.dy += 0.5;
            player.y += player.dy;
            player.x += player.dx;

            if (spacePressed && player.grounded) {
                jumpPower += 0.45;
                if (jumpPower > 20) jumpPower = 20;
                document.getElementById('powerBar').style.width = (jumpPower / 20 * 100) + "%";
            }

            if (player.x < 0) { player.x = 0; player.dx *= -0.5; }
            if (player.x + player.w > canvas.width) { player.x = canvas.width - player.w; player.dx *= -0.5; }

            player.grounded = false;
            platforms.forEach(p => {
                if (player.dy > 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.dy) {
                    player.y = p.y - player.h;
                    player.dy = 0;
                    player.grounded = true;
                }
            });

            let targetCameraY = player.y - 500;
            if (targetCameraY < cameraY) cameraY += (targetCameraY - cameraY) * 0.1;

            const topPlatformY = platforms[platforms.length - 1].y;
            if (player.y < topPlatformY + 1200) addPlatform(topPlatformY - 130);

            let currentHeight = Math.floor(Math.abs(player.y - 700) / 10);
            if (currentHeight > score) {
                score = currentHeight;
                document.getElementById('height').innerText = score;
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('mythion_vertical_best', bestScore);
                    document.getElementById('best').innerText = bestScore;
                }
            }

            // PODMÍNKA PROHRY: Pád pod okraj kamery
            if (player.y > cameraY + canvas.height + 100) {
                gameActive = false;
                document.getElementById('finalScore').innerText = score;
                document.getElementById('gameOverScreen').style.display = 'flex';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#05050a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(s => {
                ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
                let starY = (s.y - cameraY * 0.3) % canvas.height;
                if (starY < 0) starY += canvas.height;
                ctx.fillRect(s.x, starY, s.size, s.size);
            });

            ctx.save();
            ctx.translate(0, -cameraY);

            platforms.forEach(p => {
                ctx.fillStyle = "#2c1a0a";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = "#c49642";
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, p.y, p.w, p.h);
            });

            ctx.drawImage(imgOrc, player.x, player.y, player.w, player.h);
            ctx.restore();

            requestAnimationFrame(() => { update(); draw(); });
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space') spacePressed = true;
        });

        window.addEventListener('keyup', e => {
            keys[e.code] = false;
            if (e.code === 'Space') {
                if (player.grounded) {
                    player.dy = -jumpPower;
                    player.grounded = false;
                }
                spacePressed = false;
                jumpPower = 0;
                document.getElementById('powerBar').style.width = "0%";
            }
        });

        generateInitialPlatforms();
        draw();
    </script>
</body>
</html>
