<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: Ultimate Raid Edition</title>
    <style>
        :root { --gold: #c49642; --mythic: #a335ee; --void: #ff4444; }
        
        body { 
            margin: 0; background: #020205; color: #f0ebe0; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; overflow: hidden;
            position: relative;
        }

        /* VRSTVENÉ HVĚZDNÉ POZADÍ */
        .stars-container {
            position: absolute; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
        }
        .layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 200%; height: 200%; }
        .stars1 { background: url('https://www.transparenttextures.com/patterns/stardust.png'); animation: move 100s linear infinite; opacity: 0.5; }
        .stars2 { background: url('https://www.transparenttextures.com/patterns/stardust.png'); animation: move 60s linear infinite; transform: scale(1.5); opacity: 0.3; }
        
        @keyframes move { from { transform: translateY(0); } to { transform: translateY(-500px); } }

        .game-container { display: flex; gap: 20px; align-items: flex-start; z-index: 10; }
        
        .chat-area {
            width: 506px; height: 150px; background: rgba(0,0,0,0.85);
            border: 3px solid var(--gold); border-bottom: none; border-radius: 12px 12px 0 0;
            padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; 
            justify-content: flex-end; font-size: 13px; font-weight: 500; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        canvas { 
            border: 3px solid var(--gold); 
            background: rgba(5, 5, 15, 0.4); 
            border-radius: 0 0 12px 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .sidebar { width: 210px; display: flex; flex-direction: column; gap: 12px; }
        .panel { 
            background: rgba(0,0,0,0.8); border: 1px solid var(--gold); 
            border-left: 6px solid var(--gold); padding: 15px; border-radius: 6px;
            backdrop-filter: blur(5px);
        }
        .score-num { font-size: 30px; font-weight: bold; color: #fff; text-shadow: 0 0 10px var(--gold); }
        
        /* BARVY CHATU */
        .chat-mimi { color: #ff80df; } 
        .chat-arny { color: #ffb100; }
        .chat-suzu { color: #00ccff; }
        .chat-ex { color: #a335ee; }
        .chat-guild { color: #40ff40; font-weight: bold; }
        
        .overlay { 
            display: none; position: absolute; top: 150px; left: 0; width: 506px; height: 606px; 
            background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        button { 
            background: var(--gold); border: none; padding: 15px 30px; font-size: 16px;
            font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.3s;
        }
        button:hover { background: #e0ac4e; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="stars-container">
        <div class="layer stars1"></div>
        <div class="layer stars2"></div>
    </div>

    <h1 style="color: var(--gold); letter-spacing: 12px; text-transform: uppercase; margin-bottom: 15px; text-shadow: 0 0 20px rgba(196,150,66,0.8);">Mythion</h1>

    <div class="game-container">
        <div class="canvas-wrap">
            <div class="chat-area" id="chat"></div>
            <div style="position: relative;">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOver" class="overlay">
                    <h2 style="color:var(--void); font-size: 36px;">WIPE / REPAIR</h2>
                    <div id="finalScore" class="score-num" style="margin-bottom: 25px;">0 yd</div>
                    <button onclick="reset()">DALŠÍ POKUS (PULL!)</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <div style="font-size: 11px; color: var(--gold); letter-spacing: 1px;">M+ SCORE</div>
                <div id="curScore" class="score-num">0</div>
            </div>
            <div class="panel" style="border-left-color: var(--mythic)">
                <div style="font-size: 11px; color: var(--mythic); letter-spacing: 1px;">SEASON BEST</div>
                <div id="bestScore" style="font-size: 22px; font-weight: bold;">0 yd</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 600;

        const img = new Image(); img.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';

        let p, platforms, score, best, active, started, camY, keys = {};
        let jumpCharge = 0;
        
        best = localStorage.getItem('myth_ultimate_best') || 0;
        document.getElementById('bestScore').innerText = best + " yd";

        const members = [
            {n: "Mimi", c: "chat-mimi", m: [
                "S jinou guildou se mi to dělá mnohem líp...",
                "Já jsem větší frajer než vy, tohle už jsem dávno udělal.",
                "S jinou guildou už jsem to prošel, tam se nefailovalo.",
                "Mám prostě lepší gear a víc zkušeností, smůla.",
                "To je hrozný, já už tohle měl hotový loni na altovi.",
                "Jsem tu jen proto, že mě prosili, jinak bych byl v top raidu.",
                "Mimi vidí všechno... i vaše trapný dps.",
                "S jinou guildou jsme tohle dávali se zavřenýma očima.",
                "Proč mi to děláte? Já už to měl dávno vyfarmený."
            ]},
            {n: "Arny", c: "chat-arny", m: [
                "Mimi, jestli ještě jednou řekneš jiná guilda, letíš!",
                "Makej orku, nebo ti Jefoma máma nedá nášup!",
                "Mimi, nikoho tvůj starej progres nezajímá.",
                "Kdo to zase pullnul? Arny nemá manu!",
                "To je dps jak u tanka po lobotomii.",
                "Mimi, radši skákej a neřeš minulost, lamo.",
                "Příští fail a všichni platíte repair ze svýho!"
            ]},
            {n: "Suzu", c: "chat-suzu", m: [
                "Healovat tuhle bandu je za trest.",
                "Mimi, přestaň machrovat a uhni z tý červený!",
                "Došly mi potky, tak se snažte neumřít.",
                "Zase padáš? Suzu tě zvedat nebude!",
                "Mám low manu, skákejte opatrně.",
                "Ten ork má míň HP než můj mount.",
                "Už zase wipe? Jdu na kafe, zatím se snažte."
            ]},
            {n: "Exsqueez", c: "chat-ex", m: [
                "Exsqueez me? To byl jako pokus o skok?",
                "Půjčte mi někdo na repair, Mimi mi všechno vylootoval.",
                "Vidím wipe, vidím tmu... a Mimiho ego.",
                "Ten ork je pomalejší než načítání Battle.netu.",
                "Mimi, tvoje kecy mají větší cooldown než tvoje skilly.",
                "Wipe za 3... 2... 1... klasika.",
                "Má ten ork vůbec zapnutý monitor?"
            ]}
        ];

        function msg() {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.style.marginBottom = "4px";
            const member = members[Math.floor(Math.random()*members.length)];
            const text = member.m[Math.floor(Math.random()*member.m.length)];
            d.innerHTML = `<span class="chat-guild">[Guild]</span> <span class="${member.c}">${member.n}:</span> ${text}`;
            c.appendChild(d);
            if(c.childNodes.length > 6) c.removeChild(c.firstChild);
            c.scrollTop = c.scrollHeight;
        }

        function reset() {
            p = { x: 230, y: 500, w: 44, h: 44, dy: 0, dx: 0, grounded: false };
            platforms = [{x: 0, y: 570, w: 500, h: 100, type: 'safe', alpha: 1, dead: false}];
            for(let i=1; i<12; i++) spawnPlat(570 - i * 145);
            score = 0; camY = 0; active = true; started = false; jumpCharge = 0;
            document.getElementById('gameOver').style.display = 'none';
        }

        function spawnPlat(y) {
            const w = 125;
            const lastType = platforms[platforms.length - 1].type;
            let type = 'safe';
            if (lastType === 'safe' && platforms.length > 3 && Math.random() > 0.6) type = 'void';
            platforms.push({ x: Math.random()*(canvas.width-w), y, w, h: 20, type, alpha: 1, dead: false });
        }

        window.onkeydown = e => { keys[e.code] = true; if(e.code === 'Space') e.preventDefault(); };
        window.onkeyup = e => { keys[e.code] = false; };

        function loop() {
            if(active) {
                if(keys['ArrowLeft'] || keys['KeyA']) p.dx = -7;
                else if(keys['ArrowRight'] || keys['KeyD']) p.dx = 7;
                else p.dx *= 0.82;

                if (keys['Space'] && p.grounded) {
                    jumpCharge += 1.1;
                    if (jumpCharge > 21) jumpCharge = 21;
                } else if (!keys['Space'] && jumpCharge > 0) {
                    p.dy = -jumpCharge - 6;
                    jumpCharge = 0;
                    p.grounded = false;
                    started = true;
                }

                p.dy += 0.58; 
                p.x += p.dx; p.y += p.dy;
                if(p.x > canvas.width) p.x = -p.w; if(p.x < -p.w) p.x = canvas.width;

                p.grounded = false;
                platforms.forEach(plat => {
                    if(!plat.dead && p.dy > 0 && p.x + p.w > plat.x && p.x < plat.x + plat.w &&
                       p.y + p.h > plat.y && p.y + p.h < plat.y + plat.h + p.dy) {
                        p.y = plat.y - p.h; p.dy = 0; p.grounded = true;
                        if(plat.type === 'void' && started) {
                            plat.alpha -= 0.15;
                            if(plat.alpha <= 0) plat.dead = true;
                        }
                    }
                });

                if(started) {
                    if(p.y < camY + 300) camY += (p.y - 300 - camY) * 0.14;
                    score = Math.max(score, Math.floor(Math.abs(p.y - 500)/10));
                    document.getElementById('curScore').innerText = score;
                }

                if(platforms[platforms.length-1].y > camY - 100) spawnPlat(platforms[platforms.length-1].y - 145);
                
                if(p.y > camY + 750 && started) {
                    active = false;
                    document.getElementById('gameOver').style.display = 'flex';
                    document.getElementById('finalScore').innerText = score + " yd";
                    if(score > best) { best = score; localStorage.setItem('myth_ultimate_best', best); document.getElementById('bestScore').innerText = best + " yd"; }
                }
            }

            ctx.clearRect(0,0,500,600);
            ctx.save(); ctx.translate(0, -camY);
            platforms.forEach(plat => {
                if(!plat.dead) {
                    ctx.globalAlpha = plat.alpha;
                    ctx.fillStyle = plat.type === 'void' ? '#ff4444' : '#c49642';
                    ctx.shadowBlur = 20; ctx.shadowColor = ctx.fillStyle;
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                    // Detail plošiny
                    ctx.strokeStyle = "rgba(255,255,255,0.3)";
                    ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                }
            });
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;
            if(jumpCharge > 0) {
                ctx.fillStyle = '#40ff40';
                ctx.fillRect(p.x, p.y + p.h + 10, (jumpCharge/21)*p.w, 6);
            }
            ctx.drawImage(img, p.x, p.y, p.w, p.h);
            ctx.restore();
            requestAnimationFrame(loop);
        }

        // Náhodné hlášky v různých intervalech
        function scheduleMsg() {
            if(active && started) msg();
            setTimeout(scheduleMsg, 5000 + Math.random() * 6000);
        }

        reset(); loop(); scheduleMsg();
    </script>
</body>
</html>
