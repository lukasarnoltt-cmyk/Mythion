<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: M+ Vertical Push</title>
    <style>
        :root { --gold: #c49642; --dark: #0b0d12; --accent: #ffcc00; }
        body { 
            margin: 0; background: #050508; color: #f0ebe0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
        }
        
        .game-wrapper { display: flex; gap: 30px; align-items: flex-start; padding: 20px; background: rgba(20,20,30,0.4); border-radius: 15px; border: 1px solid rgba(196, 150, 66, 0.2); }

        /* EPIC CANVAS */
        canvas { 
            border: 4px solid var(--gold); background: #0a0a15;
            box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 20px rgba(196, 150, 66, 0.2);
            border-radius: 10px; cursor: none;
        }

        /* SCOREBOARD VEDLE HRY */
        .sidebar { width: 250px; display: flex; flex-direction: column; gap: 20px; }
        .panel { 
            background: rgba(15, 15, 25, 0.9); border: 2px solid var(--gold); 
            border-radius: 8px; padding: 20px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            border-left: 10px solid var(--gold);
        }
        .panel-title { color: var(--gold); font-weight: bold; text-transform: uppercase; border-bottom: 1px solid var(--gold); padding-bottom: 5px; margin-bottom: 15px; font-size: 14px; letter-spacing: 2px; }
        .score-val { font-size: 36px; font-weight: bold; color: #fff; text-shadow: 0 0 10px var(--gold); }
        .rank-badge { display: inline-block; padding: 4px 10px; background: var(--gold); color: black; font-weight: bold; border-radius: 4px; font-size: 12px; margin-top: 10px; }

        /* OVERLAY */
        .overlay { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; 
            align-items: center; z-index: 100; text-align: center; border-radius: 8px;
        }
        .btn-restart { 
            background: linear-gradient(to bottom, #d4a755, #c49642); color: black; border: none; 
            padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 4px; 
            margin-top: 20px; text-transform: uppercase; transition: 0.2s;
        }
        .btn-restart:hover { transform: scale(1.05); filter: brightness(1.2); }

        .guild-name { font-size: 48px; color: var(--gold); letter-spacing: 10px; text-transform: uppercase; margin-top: 20px; opacity: 0.8; text-shadow: 0 0 20px black; font-weight: 900; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div style="position: relative;">
            <canvas id="gameCanvas"></canvas>
            <div id="gameOverScreen" class="overlay">
                <h1 style="color: #ff4444; font-size: 50px; margin: 0;">RAID WIPE</h1>
                <p id="deathQuote" style="color: #aaa; font-style: italic;"></p>
                <div class="score-val" id="finalScoreDisplay">0</div>
                <button class="btn-restart" onclick="restartGame()">Re-Pull Boss</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <div class="panel-title">M+ Score</div>
                <div class="score-val" id="height">0</div>
                <div id="currentRank" class="rank-badge">LFR Raider</div>
            </div>

            <div class="panel">
                <div class="panel-title">Personal Best</div>
                <div style="font-size: 24px; font-weight: bold;" id="best">0 yd</div>
            </div>

            <div class="panel" style="border-left-color: #4a7c2c;">
                <div class="panel-title">Affixes</div>
                <div id="affixList" style="font-size: 14px; color: #aaa;">None active</div>
            </div>
            
            <div style="text-align: center; color: #555; font-size: 12px;">
                Hold SPACE to charge jump<br>A / D to move in air
            </div>
        </div>
    </div>

    <div class="guild-name">Mythion</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 750;

        const imgOrc = new Image(); imgOrc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';
        
        let score = 0, bestScore = localStorage.getItem('mythion_best') || 0;
        document.getElementById('best').innerText = bestScore + " yd";

        let spacePressed = false, jumpPower = 0, cameraY = 0, gameActive = true, started = false;
        let activeQuote = { text: "", timer: 0 };
        const keys = {}, particles = [];

        let player = { x: 230, y: 650, w: 40, h: 40, dx: 0, dy: 0, grounded: false };
        let platforms = [];

        function getRank(h) {
            if (h < 300) return { n: "LFR Raider", c: "#888" };
            if (h < 700) return { n: "Normal Raider", c: "#4a7c2c" };
            if (h < 1500) return { n: "Heroic Raider", c: "#3498db" };
            return { n: "Mythic CE", c: "#a335ee" };
        }

        function restartGame() {
            score = 0; cameraY = 0; gameActive = true; started = false;
            player = { x: 230, y: 650, w: 40, h: 40, dx: 0, dy: 0, grounded: false };
            platforms = [{x: 0, y: 700, w: 500, h: 100, type: 'start'}];
            for(let i=0; i<20; i++) addPlatform(600 - i*140);
            document.getElementById('gameOverScreen').style.display = 'none';
        }

        function addPlatform(y) {
            const w = Math.max(60, 140 - Math.abs(y)/400);
            const type = (Math.random() > 0.85 && Math.abs(y) > 1000) ? 'void' : 'normal';
            platforms.push({ x: Math.random()*(canvas.width-w), y: y, w: w, h: 15, type: type, alpha: 1 });
        }

        function update() {
            if (!gameActive) return;

            // Movement
            if (keys['KeyA'] || keys['ArrowLeft']) player.dx = -6;
            else if (keys['KeyD'] || keys['ArrowRight']) player.dx = 6;
            else player.dx *= 0.8;

            player.dy += 0.5;
            player.x += player.dx;
            player.y += player.dy;

            // Power Charge
            if (spacePressed && player.grounded) {
                jumpPower += 0.5;
                if (jumpPower > 21) jumpPower = 21;
            }

            // Collisions
            player.grounded = false;
            platforms.forEach(p => {
                if (player.dy > 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.dy) {
                    player.y = p.y - player.h; player.dy = 0; player.grounded = true;
                    if (p.type === 'void') p.alpha -= 0.1;
                }
            });
            platforms = platforms.filter(p => p.alpha > 0.1);

            // Camera & Score
            if (started) {
                let targetCam = player.y - 400;
                if (targetCam < cameraY) cameraY += (targetCam - cameraY) * 0.1;
            }

            if (player.y < platforms[platforms.length-1].y + 800) addPlatform(platforms[platforms.length-1].y - 140);

            let curH = Math.floor(Math.abs(player.y - 650)/10);
            if (curH > score) {
                score = curH;
                document.getElementById('height').innerText = score;
                const r = getRank(score);
                document.getElementById('currentRank').innerText = r.n;
                document.getElementById('currentRank').style.background = r.c;
                if (score > 1000) document.getElementById('affixList').innerText = "Void Platforms";
                else if (score > 500) document.getElementById('affixList').innerText = "Windy Conditions";
            }

            if (player.y > cameraY + canvas.height + 100 && started) {
                gameActive = false;
                document.getElementById('finalScoreDisplay').innerText = score + " yd";
                document.getElementById('gameOverScreen').style.display = 'flex';
                if (score > bestScore) localStorage.setItem('mythion_best', score);
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            
            // DRAW DUNGEON BG (Atmospheric)
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#1a1a2e");
            gradient.addColorStop(1, "#050508");
            ctx.fillStyle = gradient;
            ctx.fillRect(0,0,canvas.width, canvas.height);

            ctx.save();
            ctx.translate(0, -cameraY);

            // Platforms
            platforms.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.type === 'void' ? "#ff4444" : "#1a1a2e";
                ctx.shadowBlur = 10; ctx.shadowColor = p.type === 'void' ? "red" : "#c49642";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = "#c49642"; ctx.lineWidth = 2;
                ctx.strokeRect(p.x, p.y, p.w, p.h);
            });

            // Orc
            ctx.shadowBlur = 15; ctx.shadowColor = "black";
            ctx.drawImage(imgOrc, player.x, player.y, player.w, player.h);

            // Jump Charge Visual
            if (spacePressed && player.grounded) {
                ctx.strokeStyle = "#ffcc00"; ctx.lineWidth = 3;
                ctx.strokeRect(player.x-2, player.y-2, player.w+4, player.h+4);
            }

            ctx.restore();
            requestAnimationFrame(() => { update(); draw(); });
        }

        window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') spacePressed = true; });
        window.addEventListener('keyup', e => { 
            keys[e.code] = false; 
            if (e.code === 'Space' && player.grounded) { 
                player.dy = -jumpPower; player.grounded = false; started = true;
                jumpPower = 0; 
            }
            spacePressed = false; 
        });

        restartGame(); draw();
    </script>
</body>
</html>
