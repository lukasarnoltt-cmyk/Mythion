<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: The Final Correction</title>
    <style>
        :root { --gold: #c49642; --mythic: #a335ee; --void: #ff4444; }
        body { 
            margin: 0; background: #050508; color: #f0ebe0; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
            /* POZADÍ Z TVÉHO SCREENSHOTU */
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
        }
        .layout { display: flex; gap: 20px; align-items: flex-start; }
        .game-col { display: flex; flex-direction: column; gap: 0; }
        
        canvas { border: 3px solid var(--gold); background: #0a0a1a; border-radius: 0 0 8px 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        .chat-area {
            width: 506px; height: 125px; background: rgba(0,0,0,0.9);
            border: 3px solid var(--gold); border-bottom: none; border-radius: 8px 8px 0 0;
            padding: 10px; box-sizing: border-box; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        .chat-msg { font-size: 13px; margin-bottom: 2px; line-height: 1.2; }
        .chat-guild { color: #40ff40; font-weight: bold; }
        .chat-system { color: #ffff40; font-style: italic; }

        .sidebar { width: 220px; display: flex; flex-direction: column; gap: 12px; }
        .panel { background: rgba(20, 20, 30, 0.95); border: 1px solid var(--gold); border-left: 6px solid var(--gold); padding: 15px; border-radius: 4px; }
        .score { font-size: 30px; font-weight: bold; }
        
        .overlay { 
            display: none; position: absolute; top: 125px; left: 0; width: 506px; height: 606px; 
            background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        button { background: var(--gold); border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 12px; color: var(--gold); text-transform: uppercase; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(196,150,66,0.5))">Mythion</h1>

    <div class="layout">
        <div class="game-col">
            <div class="chat-area" id="chat"></div>
            <div style="position: relative;">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOver" class="overlay">
                    <h2 style="color:var(--void); font-size: 40px; margin: 10px;">RAID WIPE</h2>
                    <div id="finalScore" class="score" style="margin-bottom: 20px;">0 yd</div>
                    <button onclick="reset()">RE-PULL BOSS</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <div style="font-size: 11px; color: var(--gold); letter-spacing: 1px;">M+ RATING</div>
                <div id="scoreDisplay" class="score">0</div>
            </div>
            <div class="panel" style="border-left-color: var(--mythic)">
                <div style="font-size: 11px; color: var(--mythic); letter-spacing: 1px;">PERSONAL BEST</div>
                <div id="bestDisplay" style="font-size: 22px; font-weight: bold;">0 yd</div>
            </div>
            <div class="panel" style="border-left-color: #3498db;">
                <div style="font-size: 11px; color: #3498db; letter-spacing: 1px;">ACTIVE AFFIX</div>
                <div style="font-size: 14px; font-weight: bold;">TYRANNICAL</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 600;

        const img = new Image(); img.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';

        let p, platforms, score, best, active, started, camY, keys = {};
        best = localStorage.getItem('myth_vFinal_best') || 0;
        document.getElementById('bestDisplay').innerText = best + " yd";

        const members = [
            {n: "Arny", m: ["Makej, nebo ti Jefoma máma nedá oběd!", "To je dps jak u tanka...", "Uhni z toho ohně!", "Mimi ti Jefoma mama..."]},
            {n: "Mimi", m: ["Tebe bych si vzal do parády k nám do armády!", "Mimi vidí všechno!", "Skoč víc, bačkoro!", "Takhle ty dungeony nevyupujeme."]},
            {n: "Suzu", m: ["Suzu tě healovat nebude!", "Mám low manu, nepadni.", "Kdo to zase pullnul??", "Focus na ty mechaniky!"]},
            {n: "Exsqueez", m: ["Solidní wipe v přímém přenosu.", "Máš zapnutý monitor?", "Exsqueez me? Co to bylo?", "Půjč mi na repair."]}
        ];

        function msg(name, text, type = 'guild') {
            const c = document.getElementById('chat');
            const d = document.createElement('div');
            d.className = 'chat-msg';
            d.innerHTML = type === 'guild' ? `<span class="chat-guild">[Guild] ${name}:</span> ${text}` : `<span class="chat-system">${text}</span>`;
            c.appendChild(d);
            if(c.childNodes.length > 7) c.removeChild(c.firstChild);
        }

        function reset() {
            p = { x: 230, y: 500, w: 42, h: 42, dy: 0, dx: 0, grounded: false };
            platforms = [{x: 0, y: 570, w: 500, h: 100, type: 'safe', alpha: 1}];
            for(let i=1; i<15; i++) spawnPlat(570 - i*142);
            score = 0; camY = 0; active = true; started = false;
            document.getElementById('gameOver').style.display = 'none';
            msg(null, "--- NOVÝ PULL: LOK'TAR OGAR! ---", "system");
        }

        function spawnPlat(y) {
            const w = 110 + Math.random()*40;
            // FÉROVÁ LOGIKA: Každá DRUHÁ plošina je vždy bezpečná
            let type = 'safe';
            if (platforms.length % 2 === 0 && Math.abs(y) > 800) {
                if (Math.random() > 0.4) type = 'void';
            }
            platforms.push({ x: Math.random()*(canvas.width-w), y, w, h: 18, type, alpha: 1 });
        }

        window.onkeydown = e => { keys[e.code] = true; if(e.code === 'Space') e.preventDefault(); };
        window.onkeyup = e => {
            keys[e.code] = false;
            if(e.code === 'Space' && p.grounded && active) {
                p.dy = -17.5; p.grounded = false; started = true;
            }
        };

        function loop() {
            if(active) {
                if(keys['ArrowLeft'] || keys['KeyA']) p.dx = -7.5;
                else if(keys['ArrowRight'] || keys['KeyD']) p.dx = 7.5;
                else p.dx *= 0.85;
                
                p.dy += 0.6; p.x += p.dx; p.y += p.dy;
                if(p.x > canvas.width) p.x = -p.w; if(p.x < -p.w) p.x = canvas.width;

                p.grounded = false;
                platforms.forEach(plat => {
                    if(p.dy > 0 && p.x + p.w > plat.x && p.x < plat.x + plat.w &&
                       p.y + p.h > plat.y && p.y + p.h < plat.y + plat.h + p.dy) {
                        p.y = plat.y - p.h; p.dy = 0; p.grounded = true;
                        if(plat.type === 'void' && started) plat.alpha -= 0.15;
                    }
                });

                if(started) {
                    if(p.y < camY + 300) camY = p.y - 300;
                    score = Math.max(score, Math.floor(Math.abs(p.y - 500)/10));
                    document.getElementById('scoreDisplay').innerText = score;
                }

                if(platforms[platforms.length-1].y > camY - 100) spawnPlat(platforms[platforms.length-1].y - 142);
                
                if(p.y > camY + canvas.height + 150 && started) {
                    active = false;
                    document.getElementById('gameOver').style.display = 'flex';
                    document.getElementById('finalScore').innerText = score + " yd";
                    if(score > best) { 
                        best = score; localStorage.setItem('myth_vFinal_best', best); 
                        document.getElementById('bestDisplay').innerText = best + " yd"; 
                    }
                }
            }

            // Draw Background
            ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0,0,500,600);
            
            ctx.save(); ctx.translate(0, -camY);
            platforms.forEach(plat => {
                ctx.globalAlpha = plat.alpha;
                ctx.fillStyle = plat.type === 'void' ? '#ff4444' : '#c49642';
                ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                
                // Runa text na plošině
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.font = "bold 10px serif";
                ctx.fillText("ᚱᚢᚾᛅ", plat.x + 10, plat.y + 13);
            });
            
            ctx.globalAlpha = 1; ctx.shadowBlur = 20; ctx.shadowColor = '#000';
            ctx.drawImage(img, p.x, p.y, p.w, p.h);
            ctx.restore();
            
            requestAnimationFrame(loop);
        }

        setInterval(() => {
            if(active && started) {
                const mem = members[Math.floor(Math.random()*members.length)];
                msg(mem.n, mem.m[Math.floor(Math.random()*mem.m.length)]);
            }
        }, 8500);

        reset(); loop();
    </script>
</body>
</html>
