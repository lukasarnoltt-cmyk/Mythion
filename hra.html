<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: M+ Season Overdrive</title>
    <style>
        :root { --gold: #c49642; --dark: #050508; --panel: rgba(10, 10, 20, 0.9); }
        body { 
            margin: 0; background: #020205; color: #f0ebe0; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow-x: hidden;
        }
        
        .layout-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .game-horizontal { display: flex; gap: 20px; align-items: flex-start; }

        /* CANVAS STYLING */
        .canvas-area { position: relative; border: 4px solid var(--gold); border-radius: 8px; overflow: hidden; box-shadow: 0 0 40px rgba(196, 150, 66, 0.2); }
        canvas { background: #000; cursor: none; display: block; }

        /* SIDEBAR */
        .sidebar { width: 200px; display: flex; flex-direction: column; gap: 15px; }
        .panel { 
            background: var(--panel); border: 1px solid var(--gold); border-radius: 6px; 
            padding: 15px; border-left: 6px solid var(--gold);
        }
        .panel-title { color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; opacity: 0.8; }
        .score-val { font-size: 28px; font-weight: bold; }

        /* VYCENTROVANÝ CHAT */
        .chat-container {
            width: 508px; /* Šířka canvasu + border */
            height: 130px; background: rgba(0,0,0,0.8);
            border: 1px solid rgba(196, 150, 66, 0.3); border-radius: 4px;
            padding: 10px; box-sizing: border-box; display: flex; flex-direction: column;
            justify-content: flex-end; overflow: hidden; box-shadow: inset 0 0 15px #000;
        }
        .chat-msg { font-size: 13px; margin-bottom: 4px; line-height: 1.2; animation: slideIn 0.2s ease-out; }
        .chat-guild { color: #40ff40; font-weight: bold; }
        .chat-system { color: #ffff40; font-style: italic; }

        /* OVERLAY - OPRAVENO PŘEKRÝVÁNÍ */
        .overlay { 
            display: none; position: absolute; inset: 0;
            background: rgba(0,0,0,0.85); flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
        .overlay h1 { color: #ff4444; font-size: 42px; margin: 0 0 10px 0; text-shadow: 0 0 20px rgba(255,0,0,0.5); }
        .overlay p { color: #aaa; margin: 0 0 20px 0; font-style: italic; }
        .btn-restart { 
            background: var(--gold); color: black; border: none; padding: 12px 30px; 
            font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.2s;
        }
        .btn-restart:hover { transform: scale(1.05); filter: brightness(1.2); }

        .guild-header { font-size: 42px; color: var(--gold); font-weight: 900; letter-spacing: 15px; text-transform: uppercase; margin-bottom: 5px; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <div class="guild-header">Mythion</div>

        <div class="game-horizontal">
            <div class="canvas-area">
                <canvas id="gameCanvas"></canvas>
                <div id="gameOverScreen" class="overlay">
                    <h1>RAID WIPE</h1>
                    <p id="deathTaunt">Zase stojíš v ohni...</p>
                    <div class="score-val" id="finalScoreDisplay" style="margin-bottom: 20px;">0 yd</div>
                    <button class="btn-restart" onclick="restartGame()">RE-PULL BOSS</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="panel-title">M+ Rating</div>
                    <div class="score-val" id="height">0</div>
                </div>
                <div class="panel" style="border-left-color: #a335ee;">
                    <div class="panel-title">Personal Best</div>
                    <div id="best" style="font-size: 20px; font-weight: bold;">0 yd</div>
                </div>
                <div class="panel" style="border-left-color: #ff4444;">
                    <div class="panel-title">Active Affix</div>
                    <div id="affix" style="font-size: 12px; font-weight: bold;">TYRANNICAL</div>
                </div>
            </div>
        </div>

        <div class="chat-container" id="gameChat"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 600;

        const imgOrc = new Image(); imgOrc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';
        
        let score = 0, bestScore = localStorage.getItem('mythion_v5_best') || 0;
        document.getElementById('best').innerText = bestScore + " yd";

        let gameActive = true, started = false, spacePressed = false, jumpPower = 0, cameraY = 0;
        const maxJumpPower = 22, keys = {}, platforms = [];
        let player = { x: 230, y: 500, w: 42, h: 42, dx: 0, dy: 0, grounded: false };

        const members = [
            {n: "Arny", m: ["Makej, nebo ti Jefoma máma nedá oběd!", "Uhni z toho ohně!", "Takhle M+ nevyčasujeme."]},
            {n: "Mimi", m: ["Tebe bych si vzal do parády k nám do armády!", "Mimi vidí všechno!", "Skoč víc, bačkoro!"]},
            {n: "Suzu", m: ["Suzu tě healovat nebude!", "Mám low manu, nepadni.", "Kdo to zase pullnul?"]},
            {n: "Exsqueez", m: ["Solidní wipe v přímém přenosu.", "Máš zapnutý monitor?", "Exsqueez me? Co to bylo?"]}
        ];

        function addChatMessage(name, msg, type = 'guild') {
            const chatBox = document.getElementById('gameChat');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            if (type === 'guild') div.innerHTML = `[<span class="chat-guild">Guild</span>] <b>${name}:</b> ${msg}`;
            else if (type === 'system') div.innerHTML = `<span class="chat-system">${msg}</span>`;
            chatBox.appendChild(div);
            if (chatBox.childNodes.length > 5) chatBox.removeChild(chatBox.firstChild);
        }

        function restartGame() {
            score = 0; cameraY = 0; gameActive = true; started = false; jumpPower = 0;
            player = { x: 230, y: 500, w: 42, h: 42, dx: 0, dy: 0, grounded: false };
            platforms.length = 0;
            platforms.push({x: 0, y: 560, w: 500, h: 80, type: 'start', alpha: 1});
            for(let i=1; i<15; i++) addPlatform(560 - i*140);
            document.getElementById('gameOverScreen').style.display = 'none';
            addChatMessage(null, "--- NOVÝ PULL ---", "system");
        }

        function addPlatform(y) {
            const w = Math.max(70, 150 - Math.abs(y)/500);
            let type = (platforms.length % 4 !== 0 && Math.abs(y) > 800 && Math.random() > 0.7) ? 'void' : 'normal';
            platforms.push({ x: Math.random()*(canvas.width-w), y: y, w: w, h: 18, type: type, alpha: 1 });
        }

        function update() {
            if (!gameActive) return;
            if (keys['KeyA'] || keys['ArrowLeft']) player.dx = -7;
            else if (keys['KeyD'] || keys['ArrowRight']) player.dx = 7;
            else player.dx *= 0.85;

            player.dy += 0.55; player.x += player.dx; player.y += player.dy;

            if (spacePressed && player.grounded) {
                jumpPower += 0.85; if (jumpPower > maxJumpPower) jumpPower = maxJumpPower;
            }

            if (player.x < 0) player.x = 0; if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

            player.grounded = false;
            for (let p of platforms) {
                if (player.dy > 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.dy) {
                    player.y = p.y - player.h; player.dy = 0; player.grounded = true;
                    if (p.type === 'void' && started) p.alpha -= 0.15;
                }
            }
            for(let i=platforms.length-1; i>=0; i--) { if(platforms[i].alpha <= 0) platforms.splice(i,1); }

            if (started) {
                let targetCam = player.y - 300;
                if (targetCam < cameraY) cameraY += (targetCam - cameraY) * 0.1;
            }

            let topY = platforms[platforms.length - 1].y;
            if (player.y < topY + 800) addPlatform(topY - 140);

            let curH = Math.floor(Math.abs(player.y - 500) / 10);
            if (curH > score) {
                score = curH;
                document.getElementById('height').innerText = score;
                if (score > bestScore) {
                    bestScore = score; localStorage.setItem('mythion_v5_best', score);
                    document.getElementById('best').innerText = bestScore + " yd";
                }
            }

            if (started && player.y > cameraY + canvas.height + 100) {
                gameActive = false;
                document.getElementById('finalScoreDisplay').innerText = score + " yd";
                document.getElementById('gameOverScreen').style.display = 'flex';
                addChatMessage("Mimi", "Armáda tě nepříjme, jsi dole!", "guild");
            }
        }

        // EPIC BACKGROUND EFFECT
        let stars = Array.from({length: 50}, () => ({x: Math.random()*500, y: Math.random()*600, s: Math.random()*2}));

        function draw() {
            // Background Shader-like
            ctx.fillStyle = "#020205"; ctx.fillRect(0,0,500,600);
            
            // Draw Stars
            ctx.fillStyle = "#fff";
            stars.forEach(s => {
                let y = (s.y - cameraY * 0.5) % 600;
                if (y < 0) y += 600;
                ctx.globalAlpha = 0.3;
                ctx.beginPath(); ctx.arc(s.x, y, s.s, 0, Math.PI*2); ctx.fill();
            });

            ctx.save(); ctx.translate(0, -cameraY);

            // Platforms
            platforms.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.type === 'void' ? "#ff0000" : "#c49642";
                ctx.fillStyle = p.type === 'void' ? "#400" : "#1a1a2e";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = p.type === 'void' ? "#f44" : "#c49642";
                ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
            });

            // Player
            ctx.globalAlpha = 1; ctx.shadowBlur = 20; ctx.shadowColor = "#000";
            ctx.drawImage(imgOrc, player.x, player.y, player.w, player.h);
            
            // Charge Aura
            if (spacePressed && player.grounded) {
                ctx.strokeStyle = `hsl(${Math.random()*360}, 100%, 50%)`; ctx.lineWidth = 3;
                ctx.strokeRect(player.x-4, player.y-4, player.w+8, player.h+8);
            }

            ctx.restore();
            requestAnimationFrame(() => { update(); draw(); });
        }

        setInterval(() => {
            if (gameActive && started) {
                const mem = members[Math.floor(Math.random()*members.length)];
                addChatMessage(mem.n, mem.m[Math.floor(Math.random()*mem.m.length)]);
            }
        }, 8000);

        window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') { e.preventDefault(); spacePressed = true; }});
        window.addEventListener('keyup', e => { 
            keys[e.code] = false; 
            if (e.code === 'Space' && gameActive) { 
                if (player.grounded) { player.dy = -Math.max(10, jumpPower); player.grounded = false; started = true; }
                spacePressed = false; jumpPower = 0;
            }
        });

        restartGame(); draw();
    </script>
</body>
</html>
