<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: Shadowlands Edition</title>
    <style>
        :root { 
            --gold: #c49642; 
            --mythic: #a335ee; 
            --void: #ff4444; 
            --bg-panel: rgba(10, 10, 15, 0.85);
        }
        
        body { 
            margin: 0; background: #050508; color: #f0ebe0; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
            /* EPIC BACKGROUND */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://i.imgur.com/84u8Ony.jpg'); /* Dungeon Wall Texture */
            background-size: cover;
            background-position: center;
        }

        .layout-wrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 10; width: 800px; }
        
        .guild-header { 
            font-size: 55px; font-weight: 900; letter-spacing: 25px; text-transform: uppercase; margin: 0;
            background: linear-gradient(to bottom, #fff, var(--gold), #8a6526);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(196, 150, 66, 0.4));
        }

        /* HORNÍ CHAT */
        .chat-container {
            width: 506px; height: 110px; background: var(--bg-panel);
            border: 2px solid var(--gold); border-bottom: none;
            border-radius: 12px 12px 0 0; padding: 12px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: flex-end;
            backdrop-filter: blur(10px); align-self: flex-start;
        }
        .chat-msg { font-size: 13px; margin-bottom: 3px; border-left: 2px solid #40ff40; padding-left: 8px; }
        .chat-guild { color: #40ff40; font-weight: bold; }

        .game-container { display: flex; gap: 20px; align-items: flex-start; }

        /* CANVAS AREA */
        .canvas-area { 
            position: relative; border: 3px solid var(--gold); border-radius: 0 0 12px 12px; 
            overflow: hidden; background: rgba(0,0,0,0.4); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        canvas { display: block; cursor: none; }

        /* SIDEBAR */
        .sidebar { width: 220px; display: flex; flex-direction: column; gap: 12px; }
        .panel { 
            background: var(--bg-panel); border: 1px solid rgba(196, 150, 66, 0.3); 
            border-radius: 8px; padding: 15px; backdrop-filter: blur(10px);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .panel-title { color: var(--gold); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; font-weight: bold; }
        .score-val { font-size: 28px; font-weight: 800; }

        .overlay { 
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <h1 class="guild-header">Mythion</h1>

        <div class="game-container">
            <div style="display: flex; flex-direction: column;">
                <div class="chat-container" id="gameChat"></div>
                <div class="canvas-area">
                    <canvas id="gameCanvas"></canvas>
                    <div id="gameOverScreen" class="overlay">
                        <h1 style="color:var(--void); font-size: 45px; margin:0; letter-spacing: 5px;">RAID WIPE</h1>
                        <div class="score-val" id="finalScore" style="color:var(--gold); margin: 10px 0;">0 yd</div>
                        <button style="background:var(--gold); border:none; padding:12px 30px; font-weight:bold; cursor:pointer; border-radius:4px;" onclick="restartGame()">RE-PULL BOSS</button>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel" style="border-top: 3px solid var(--gold);">
                    <div class="panel-title">M+ Rating</div>
                    <div class="score-val" id="height">0</div>
                </div>
                <div class="panel" style="border-top: 3px solid var(--mythic);">
                    <div class="panel-title">Personal Best</div>
                    <div id="bestScore" style="font-size: 20px; font-weight: bold;">0 yd</div>
                </div>
                <div class="panel" style="border-top: 3px solid #3498db;">
                    <div class="panel-title">Active Affix</div>
                    <div style="font-weight: bold; color: #3498db; font-size: 14px;">BOLSTERING</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 600;

        const imgOrc = new Image(); imgOrc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';
        
        let score = 0, best = localStorage.getItem('mythion_final_best') || 0;
        let gameActive = true, started = false, spacePressed = false, jumpPower = 0, cameraY = 0;
        const platforms = [];

        let player = { x: 230, y: 500, w: 42, h: 42, dx: 0, dy: 0, grounded: false };

        function addPlatform(y) {
            const w = Math.max(85, 160 - Math.abs(y)/700);
            const isVoid = Math.abs(y) > 800 && Math.random() > 0.7;
            platforms.push({ x: Math.random()*(canvas.width - w), y: y, w: w, h: 18, type: isVoid ? 'void' : 'normal', alpha: 1 });
        }

        function restartGame() {
            score = 0; cameraY = 0; gameActive = true; started = false; jumpPower = 0;
            platforms.length = 0;
            player.x = 230; player.y = 500; player.dy = 0;
            platforms.push({x: 0, y: 570, w: 500, h: 100, type: 'start', alpha: 1});
            for(let i=1; i<10; i++) addPlatform(570 - i*145);
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('bestScore').innerText = best + " yd";
        }

        function update() {
            if (!gameActive) return;
            if (keys['KeyA'] || keys['ArrowLeft']) player.dx = -8;
            else if (keys['KeyD'] || keys['ArrowRight']) player.dx = 8;
            else player.dx *= 0.85;

            player.dy += 0.55; player.x += player.dx; player.y += player.dy;
            if (player.x < 0) player.x = 0; if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

            if (spacePressed && player.grounded) jumpPower = Math.min(jumpPower + 0.9, 22);

            player.grounded = false;
            for (let p of platforms) {
                if (player.dy > 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.dy) {
                    player.y = p.y - player.h; player.dy = 0; player.grounded = true;
                    if (p.type === 'void' && started) p.alpha -= 0.15;
                }
            }

            if (started) {
                let targetCam = player.y - 280;
                if (targetCam < cameraY) cameraY += (targetCam - cameraY) * 0.1;
                score = Math.max(score, Math.floor(Math.abs(player.y - 500)/10));
                document.getElementById('height').innerText = score;
            }

            if (platforms[platforms.length-1].y > cameraY - 200) addPlatform(platforms[platforms.length-1].y - 145);

            if (player.y > cameraY + canvas.height + 100) {
                gameActive = false;
                document.getElementById('gameOverScreen').style.display = 'flex';
                document.getElementById('finalScore').innerText = score + " yd";
                if (score > best) { best = score; localStorage.setItem('mythion_final_best', best); }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // DYNAMICKÉ POZADÍ UVNITŘ HERNÍ PLOCHY (The "Vipe")
            ctx.fillStyle = "rgba(10, 10, 20, 0.6)"; ctx.fillRect(0,0,500,600);
            
            // Červená mlha na dně (Vír smrti)
            let fogGrd = ctx.createLinearGradient(0, 500 - cameraY, 0, 800 - cameraY);
            fogGrd.addColorStop(0, "transparent");
            fogGrd.addColorStop(1, "rgba(255, 0, 0, 0.4)");
            ctx.fillStyle = fogGrd; ctx.fillRect(0,0,500,600);

            ctx.save(); ctx.translate(0, -cameraY);

            // PLOŠINY JAKO MAGICKÉ RUNY
            platforms.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.type === 'void' ? "#f00" : var(--gold);
                
                // Vnitřek plošiny
                ctx.fillStyle = p.type === 'void' ? "#300" : "#1a1a2e";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                
                // Runa efekt (textura)
                ctx.strokeStyle = p.type === 'void' ? "#ff4444" : "#c49642";
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, p.y, p.w, p.h);
                
                // Přidání "runových znaků" pro styl
                ctx.fillStyle = ctx.strokeStyle;
                ctx.font = "bold 10px serif";
                ctx.fillText("ᚱ ᚢ ᚾ ᛅ", p.x + 10, p.y + 13);
            });

            // PLAYER
            ctx.globalAlpha = 1; ctx.shadowBlur = 20; ctx.shadowColor = "#000";
            ctx.drawImage(imgOrc, player.x, player.y, player.w, player.h);
            
            ctx.restore();
            requestAnimationFrame(() => { update(); draw(); });
        }

        const keys = {};
        window.onkeydown = (e) => { keys[e.code] = true; if(e.code==='Space') { e.preventDefault(); spacePressed = true; }};
        window.onkeyup = (e) => { 
            keys[e.code] = false; 
            if(e.code==='Space' && player.grounded) { 
                player.dy = -jumpPower; player.grounded = false; started = true; 
                jumpPower = 0; spacePressed = false;
            }
        };

        const msgs = ["Makej, nebo ti Jefoma máma nedá oběd", "Mimi vidí všechno!", "To je dps jak u tanka...", "Suzu tě healovat nebude!"];
        const names = ["Arny", "Mimi", "Arny", "Suzu"];
        setInterval(() => {
            if(!gameActive || !started) return;
            const chat = document.getElementById('gameChat');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<span class="chat-guild">[Guild]</span> <b>${names[Math.floor(Math.random()*names.length)]}:</b> ${msgs[Math.floor(Math.random()*msgs.length)]}`;
            chat.appendChild(div);
            if(chat.childNodes.length > 5) chat.removeChild(chat.firstChild);
        }, 8000);

        restartGame(); draw();
    </script>
</body>
</html>
