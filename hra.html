<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: Fixed & Epic v5</title>
    <style>
        :root { --gold: #c49642; --dark: #050508; --mythic: #a335ee; --void: #ff4444; }
        
        body { 
            margin: 0; background: #020205; color: #f0ebe0; 
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
            background-color: #050508;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
        }

        .layout-wrapper { display: flex; flex-direction: column; align-items: center; gap: 0; z-index: 10; }
        
        .guild-header { 
            font-size: 50px; font-weight: 900; letter-spacing: 15px; text-transform: uppercase; margin: 0 0 10px 0;
            background: linear-gradient(to bottom, #fff, var(--gold), #8a6526);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(196, 150, 66, 0.4));
        }

        /* JEDNODUCHÝ CHAT NAHOŘE */
        .chat-container {
            width: 506px; height: 110px; background: rgba(0,0,0,0.85);
            border: 2px solid var(--gold); border-bottom: none;
            border-radius: 12px 12px 0 0; padding: 12px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: flex-end;
            backdrop-filter: blur(10px); align-self: flex-start;
        }
        .chat-msg { font-size: 13px; margin-bottom: 3px; animation: chatIn 0.3s; }
        .chat-guild { color: #40ff40; font-weight: bold; }
        .chat-system { color: #ffff40; font-style: italic; }

        .game-horizontal { display: flex; gap: 25px; align-items: flex-start; }
        .game-column { display: flex; flex-direction: column; align-items: flex-start; }

        .canvas-area { position: relative; border: 3px solid var(--gold); border-radius: 0 0 12px 12px; overflow: hidden; background: #000; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        canvas { background: rgba(0,0,0,0.85); cursor: none; display: block; }

        .sidebar { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        .panel { 
            background: rgba(10, 10, 20, 0.9); border: 1px solid rgba(196,150,66,0.3); 
            border-radius: 8px; padding: 18px; border-left: 6px solid var(--gold);
            backdrop-filter: blur(5px);
        }
        .panel-title { color: var(--gold); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: bold; }
        .score-val { font-size: 32px; font-weight: bold; color: #fff; }

        .overlay { 
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
        .btn-restart { 
            background: var(--gold); color: black; border: none; padding: 12px 30px; 
            font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 20px;
        }

        @keyframes chatIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="layout-wrapper">
        <div class="guild-header">Mythion</div>

        <div class="game-horizontal">
            <div class="game-column">
                <div class="chat-container" id="gameChat"></div>
                <div class="canvas-area">
                    <canvas id="gameCanvas"></canvas>
                    <div id="gameOverScreen" class="overlay">
                        <h1 style="color:var(--void); font-size: 45px; margin:0; letter-spacing: 5px;">RAID WIPE</h1>
                        <div class="score-val" id="finalScoreDisplay" style="color: var(--gold);">0 yd</div>
                        <button class="btn-restart" onclick="restartGame()">RE-PULL BOSS</button>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="panel-title">M+ Rating</div>
                    <div class="score-val" id="height">0</div>
                </div>
                <div class="panel" style="border-left-color: var(--mythic);">
                    <div class="panel-title">Personal Best</div>
                    <div id="best" style="font-size: 22px; font-weight: bold;">0 yd</div>
                </div>
                <div class="panel" style="border-left-color: #3498db;">
                    <div class="panel-title">Active Affix</div>
                    <div id="affix" style="font-size: 13px; font-weight: bold; color: #3498db;">TYRANNICAL</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 600;

        const imgOrc = new Image(); imgOrc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';
        
        let score = 0, bestScore = localStorage.getItem('mythion_vFinal_best') || 0;
        document.getElementById('best').innerText = bestScore + " yd";

        let gameActive = true, started = false, spacePressed = false, jumpPower = 0, cameraY = 0;
        const maxJumpPower = 22, keys = {}, platforms = [];
        let player = { x: 230, y: 500, w: 42, h: 42, dx: 0, dy: 0, grounded: false };

        const members = [
            {n: "Arny", m: ["Makej, nebo ti Jefoma máma nedá oběd!", "To je dps jak u tanka...", "Uhni z toho ohně!", "Mimi ti Jefoma mama..."]},
            {n: "Mimi", m: ["Tebe bych si vzal do parády k nám do armády!", "Mimi vidí všechno!", "Skoč víc, bačkoro!"]},
            {n: "Suzu", m: ["Suzu tě healovat nebude!", "Mám low manu, nepadni.", "Kdo to zase pullnul?"]},
            {n: "Exsqueez", m: ["Solidní wipe v přímém přenosu.", "Máš zapnutý monitor?", "Exsqueez me? Co to bylo?", "Půjč mi na repair."]}
        ];

        function addChatMessage(name, msg, type = 'guild') {
            const chatBox = document.getElementById('gameChat');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            if (type === 'guild') div.innerHTML = `[<span class="chat-guild">Guild</span>] <b>${name}:</b> ${msg}`;
            else if (type === 'system') div.innerHTML = `<span class="chat-system">${msg}</span>`;
            chatBox.appendChild(div);
            if (chatBox.childNodes.length > 5) chatBox.removeChild(chatBox.firstChild);
        }

        setInterval(() => {
            if (gameActive && started) {
                const mem = members[Math.floor(Math.random()*members.length)];
                addChatMessage(mem.n, mem.m[Math.floor(Math.random()*mem.m.length)]);
            }
        }, 8500);

        function restartGame() {
            score = 0; cameraY = 0; gameActive = true; started = false; jumpPower = 0;
            player = { x: 230, y: 500, w: 42, h: 42, dx: 0, dy: 0, grounded: false };
            platforms.length = 0;
            platforms.push({x: 0, y: 560, w: 500, h: 100, type: 'start', alpha: 1});
            for(let i=1; i<15; i++) addPlatform(560 - i*140);
            document.getElementById('gameOverScreen').style.display = 'none';
            addChatMessage(null, "--- NOVÝ PULL: LOK'TAR OGAR! ---", "system");
        }

        function addPlatform(y) {
            const w = Math.max(75, 150 - Math.abs(y)/600);
            // ANTI-STUCK LOGIKA: Každá třetí plošina je garantovaně normální
            let type = 'normal';
            if (platforms.length % 3 !== 0 && Math.abs(y) > 800 && Math.random() > 0.7) type = 'void';
            platforms.push({ x: Math.random()*(canvas.width - w), y: y, w: w, h: 20, type: type, alpha: 1 });
        }

        function update() {
            if (!gameActive) return;
            if (keys['KeyA'] || keys['ArrowLeft']) player.dx = -7.5;
            else if (keys['KeyD'] || keys['ArrowRight']) player.dx = 7.5;
            else player.dx *= 0.85;

            player.dy += 0.55; player.x += player.dx; player.y += player.dy;

            if (spacePressed && player.grounded) {
                jumpPower += 0.85; // Ryhlejší nabíjení
                if (jumpPower > maxJumpPower) jumpPower = maxJumpPower;
            }

            if (player.x < 0) player.x = 0; if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

            player.grounded = false;
            for (let p of platforms) {
                if (player.dy > 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.dy) {
                    player.y = p.y - player.h; player.dy = 0; player.grounded = true;
                    if (p.type === 'void' && started) p.alpha -= 0.15; // Červená mizí
                }
            }
            // Smazání zmizelých
            for(let i=platforms.length-1; i>=0; i--) { if(platforms[i].alpha <= 0) platforms.splice(i,1); }

            if (started) {
                let targetCam = player.y - 300;
                if (targetCam < cameraY) cameraY += (targetCam - cameraY) * 0.12;
            }

            let topY = platforms[platforms.length - 1].y;
            if (player.y < topY + 800) addPlatform(topY - 142);

            let curH = Math.floor(Math.abs(player.y - 500) / 10);
            if (curH > score) {
                score = curH;
                document.getElementById('height').innerText = score;
                if (score > bestScore) {
                    bestScore = score; localStorage.setItem('mythion_vFinal_best', score);
                    document.getElementById('best').innerText = bestScore + " yd";
                }
            }

            if (started && player.y > cameraY + canvas.height + 100) {
                gameActive = false;
                document.getElementById('finalScoreDisplay').innerText = score + " yd";
                document.getElementById('gameOverScreen').style.display = 'flex';
                addChatMessage("System", "Wipefest confirmed. Mage port do Ogrimmaru?", "system");
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // GARANTOVANÉ EPIC POZADÍ (The Vipe)
            let grd = ctx.createRadialGradient(250, 300, 50, 250, 300, 500);
            grd.addColorStop(0, "rgba(30, 20, 80, 0.4)"); grd.addColorStop(1, "rgba(0,0,0,0.95)");
            ctx.fillStyle = grd; ctx.fillRect(0,0,500,600);

            ctx.save(); ctx.translate(0, -cameraY);

            // platforms
            platforms.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.type === 'void' ? "#ff0000" : "#c49642";
                
                // Runa efekt (textura)
                ctx.fillStyle = p.type === 'void' ? "#300" : "#1a1a2e";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = p.type === 'void' ? "#ff4444" : "#c49642";
                ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
                
                // Přidání "runových znaků" pro styl
                ctx.fillStyle = ctx.strokeStyle;
                ctx.font = "bold 10px serif";
                ctx.fillText("ᚱ ᚢ ᚾ ᛅ", p.x + 10, p.y + 13);
            });

            // PLAYER
            ctx.globalAlpha = 1; ctx.shadowBlur = 20; ctx.shadowColor = "#000";
            ctx.drawImage(imgOrc, player.x, player.y, player.w, player.h);
            
            ctx.restore();
            requestAnimationFrame(() => { update(); draw(); });
        }

        window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') { e.preventDefault(); spacePressed = true; }});
        window.addEventListener('keyup', e => { 
            keys[e.code] = false; 
            if (e.code === 'Space' && gameActive) { 
                if (player.grounded) { player.dy = -Math.max(10, jumpPower); player.grounded = false; started = true; }
                spacePressed = false; jumpPower = 0;
            }
        });

        restartGame(); draw();
    </script>
</body>
</html>
