<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: M+ Infinite Climb</title>
    <style>
        body { margin: 0; background: #05050a; display: flex; flex-direction: column; align-items: center; color: #f0ebe0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { border: 3px solid #c49642; background: #0a0a1a; margin-top: 10px; box-shadow: 0 0 50px #000; cursor: none; }
        .ui { position: absolute; top: 20px; left: 20px; background: rgba(11, 13, 18, 0.9); padding: 15px; border: 2px solid #c49642; border-radius: 8px; pointer-events: none; min-width: 180px; }
        .stats { font-size: 26px; color: #c49642; font-weight: bold; text-shadow: 2px 2px 0px #000; }
        .power-bar-bg { width: 100%; height: 12px; background: #222; border: 1px solid #c49642; margin-top: 10px; border-radius: 6px; overflow: hidden; }
        #powerBar { width: 0%; height: 100%; background: linear-gradient(to right, #4a7c2c, #ffcc00, #ff4444); box-shadow: 0 0 10px rgba(74, 124, 44, 0.8); }
        .controls-hint { font-size: 13px; color: #aaa; margin-top: 8px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="ui">
        <div class="stats"><span style="font-size: 16px; color: #888;">M+ SCORE</span><br><span id="height">0</span> yd</div>
        <div style="font-size: 14px; margin-top: 5px;">Season Best: <span id="best" style="color: #c49642;">0</span> yd</div>
        <div class="power-bar-bg"><div id="powerBar"></div></div>
        <div class="controls-hint">DRŽ MEZERNÍK: Nabíjení<br>A / D: Pohyb (i za letu!)</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 850;

        const imgOrc = new Image(); imgOrc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';

        let score = 0;
        let bestScore = localStorage.getItem('mythion_vertical_best') || 0;
        document.getElementById('best').innerText = bestScore;

        let spacePressed = false;
        let jumpPower = 0;
        let cameraY = 0;
        const keys = {};

        // Hvězdy na pozadí
        const stars = Array.from({ length: 100 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            speed: Math.random() * 0.5 + 0.1
        }));

        const player = {
            x: 280, y: 700, w: 45, h: 45,
            dx: 0, dy: 0, speed: 6, grounded: false
        };

        let platforms = [];
        function generateInitialPlatforms() {
            platforms = [{x: 0, y: 780, w: 600, h: 100, color: "#1a1a1a"}]; // Startovní zem
            for (let i = 0; i < 25; i++) {
                addPlatform(700 - (i * 130));
            }
        }

        function addPlatform(y) {
            const width = Math.max(70, 140 - (Math.abs(y) / 300));
            platforms.push({
                x: Math.random() * (canvas.width - width),
                y: y,
                w: width,
                h: 18
            });
        }

        function update() {
            // Horizontální pohyb (funguje pořád)
            if (keys['KeyA'] || keys['ArrowLeft']) player.dx = -player.speed;
            else if (keys['KeyD'] || keys['ArrowRight']) player.dx = player.speed;
            else player.dx *= 0.85; // Zpomalení při puštění klávesy

            // Gravitace
            player.dy += 0.5;
            player.y += player.dy;
            player.x += player.dx;

            // Nabíjení skoku
            if (spacePressed && player.grounded) {
                jumpPower += 0.4;
                if (jumpPower > 19) jumpPower = 19;
                document.getElementById('powerBar').style.width = (jumpPower / 19 * 100) + "%";
            }

            // Odraz od stěn (Mírné odražení)
            if (player.x < 0) { player.x = 0; player.dx *= -0.5; }
            if (player.x + player.w > canvas.width) { player.x = canvas.width - player.w; player.dx *= -0.5; }

            // Kolize s platformami
            player.grounded = false;
            platforms.forEach(p => {
                if (player.dy > 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.dy) {
                    player.y = p.y - player.h;
                    player.dy = 0;
                    player.grounded = true;
                }
            });

            // Kamera (hladší sledování)
            let targetCameraY = player.y - 500;
            if (targetCameraY < cameraY) {
                cameraY += (targetCameraY - cameraY) * 0.1;
            }

            // Generování nových plošin nad hráčem
            const topPlatformY = platforms[platforms.length - 1].y;
            if (player.y < topPlatformY + 1200) {
                addPlatform(topPlatformY - 130);
            }

            // Skóre
            let currentHeight = Math.floor(Math.abs(player.y - 700) / 10);
            if (currentHeight > score) {
                score = currentHeight;
                document.getElementById('height').innerText = score;
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('mythion_vertical_best', bestScore);
                    document.getElementById('best').innerText = bestScore;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Pozadí s hvězdami
            ctx.fillStyle = "#05050a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(s => {
                ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
                // Hvězdy se hýbou s kamerou (paralaxa)
                let starY = (s.y - cameraY * 0.3) % canvas.height;
                if (starY < 0) starY += canvas.height;
                ctx.beginPath();
                ctx.arc(s.x, starY, s.size, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.save();
            ctx.translate(0, -cameraY);

            // 2. Platformy
            platforms.forEach(p => {
                // Stín plošiny
                ctx.shadowBlur = 15;
                ctx.shadowColor = "rgba(196, 150, 66, 0.3)";
                
                // Hlavní tělo
                ctx.fillStyle = "#2c1a0a";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                
                // Zlatý okraj
                ctx.strokeStyle = "#c49642";
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, p.y, p.w, p.h);
                
                // Odlesk navrchu
                ctx.fillStyle = "rgba(196, 150, 66, 0.2)";
                ctx.fillRect(p.x, p.y, p.w, 4);
            });

            // 3. Hráč (Ork)
            ctx.shadowBlur = 20;
            ctx.shadowColor = "rgba(0,0,0,1)";
            ctx.drawImage(imgOrc, player.x, player.y, player.w, player.h);
            
            // Pokud nabíjí skok, přidej efekt záře
            if (spacePressed && player.grounded) {
                ctx.strokeStyle = "#ffcc00";
                ctx.lineWidth = 3;
                ctx.strokeRect(player.x - 2, player.y - 2, player.w + 4, player.h + 4);
            }

            ctx.restore();

            requestAnimationFrame(() => { update(); draw(); });
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space') spacePressed = true;
        });

        window.addEventListener('keyup', e => {
            keys[e.code] = false;
            if (e.code === 'Space') {
                if (player.grounded) {
                    player.dy = -jumpPower;
                    player.grounded = false;
                }
                spacePressed = false;
                jumpPower = 0;
                document.getElementById('powerBar').style.width = "0%";
            }
        });

        generateInitialPlatforms();
        draw();
    </script>
</body>
</html>
