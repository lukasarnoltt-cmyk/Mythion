<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion RPG: The Great Adventure</title>
    <style>
        body { margin: 0; background: #0b0d12; display: flex; flex-direction: column; align-items: center; color: #f0ebe0; font-family: sans-serif; overflow: hidden; }
        canvas { border: 3px solid #c49642; background: #1a1a2e; margin-top: 20px; box-shadow: 0 0 20px black; }
        .ui-container { display: flex; gap: 20px; margin-top: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 1px solid #c49642; }
        .stat { font-size: 18px; color: #c49642; font-weight: bold; }
        .controls { color: #888; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <h1 style="color: #c49642; margin-bottom: 5px;">MYTHION QUEST: LEVEL <span id="lvlDisplay">1</span></h1>
    
    <div class="ui-container">
        <div class="stat">Zlato: <span id="gold">0</span> g</div>
        <div class="stat">Skok: +<span id="jumpLvl">0</span></div>
        <div class="stat">Rychlost: +<span id="speedLvl">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="controls">A/D: Pohyb | Mezerník: Skok | <b>B: Koupit Upgrade (stojí 30g)</b></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 500;

        let currentLevel = 1;
        let gold = 0;
        let upgrades = { jump: 0, speed: 0 };
        const keys = {};

        // Hráč
        const player = { x: 50, y: 300, w: 40, h: 40, dx: 0, dy: 0, baseSpeed: 5, baseJump: -14, grounded: false };

        // Definice levelů
        const levels = {
            1: {
                platforms: [
                    { x: 0, y: 450, w: 300, h: 50 }, { x: 350, y: 380, w: 150, h: 30 },
                    { x: 550, y: 300, w: 200, h: 30 }, { x: 850, y: 250, w: 150, h: 50 }
                ],
                coins: [{x: 400, y: 340}, {x: 600, y: 260}],
                portal: { x: 920, y: 190, w: 50, h: 60 }
            },
            2: {
                platforms: [
                    { x: 0, y: 450, w: 150, h: 50 }, { x: 250, y: 350, w: 100, h: 20 },
                    { x: 450, y: 350, w: 100, h: 20 }, { x: 650, y: 250, w: 100, h: 20 },
                    { x: 800, y: 450, w: 200, h: 50 }
                ],
                coins: [{x: 280, y: 310}, {x: 480, y: 310}, {x: 680, y: 210}],
                portal: { x: 920, y: 390, w: 50, h: 60 }
            }
        };

        function update() {
            let speed = player.baseSpeed + upgrades.speed;
            if (keys['ArrowRight'] || keys['KeyD']) player.dx = speed;
            else if (keys['ArrowLeft'] || keys['KeyA']) player.dx = -speed;
            else player.dx = 0;

            player.dy += 0.8; // gravitace
            player.x += player.dx;
            player.y += player.dy;

            // Kolize s podlahou
            player.grounded = false;
            levels[currentLevel].platforms.forEach(p => {
                if (player.x < p.x + p.w && player.x + player.w > p.x &&
                    player.y < p.y + p.h && player.y + player.h > p.y) {
                    if (player.dy > 0 && player.y + player.h - player.dy <= p.y) {
                        player.y = p.y - player.h;
                        player.dy = 0;
                        player.grounded = true;
                    }
                }
            });

            // Sbírání mincí
            levels[currentLevel].coins = levels[currentLevel].coins.filter(c => {
                const dist = Math.hypot(player.x - c.x, player.y - c.y);
                if (dist < 40) {
                    gold += 10;
                    document.getElementById('gold').innerText = gold;
                    return false;
                }
                return true;
            });

            // Portál (Další level)
            const port = levels[currentLevel].portal;
            if (player.x < port.x + port.w && player.x + player.w > port.x &&
                player.y < port.y + port.h && player.y + player.h > port.y) {
                if (currentLevel < 2) {
                    currentLevel++;
                    document.getElementById('lvlDisplay').innerText = currentLevel;
                    resetPlayer();
                } else {
                    alert("VYHRÁL JSI CELOU HRU! Jsi Mythion Champion!");
                    currentLevel = 1;
                    resetPlayer();
                }
            }

            if (player.y > canvas.height) resetPlayer();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Kresli platformy
            ctx.fillStyle = "#4e342e";
            levels[currentLevel].platforms.forEach(p => {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = "#c49642";
                ctx.strokeRect(p.x, p.y, p.w, p.h);
            });

            // Kresli mince
            ctx.fillStyle = "gold";
            levels[currentLevel].coins.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, 8, 0, Math.PI*2);
                ctx.fill();
            });

            // Kresli portál
            ctx.fillStyle = "#9b30ff";
            const p = levels[currentLevel].portal;
            ctx.fillRect(p.x, p.y, p.w, p.h);

            // Kresli hráče
            ctx.fillStyle = "#4a7c2c";
            ctx.fillRect(player.x, player.y, player.w, player.h);

            requestAnimationFrame(() => { update(); draw(); });
        }

        function resetPlayer() {
            player.x = 50; player.y = 300; player.dy = 0;
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space' && player.grounded) {
                player.dy = player.baseJump - upgrades.jump;
                player.grounded = false;
            }
            // Obchod - zmáčkni B
            if (e.code === 'KeyB') {
                if (gold >= 30) {
                    gold -= 30;
                    // Náhodně vylepší skok nebo rychlost
                    if (Math.random() > 0.5) {
                        upgrades.jump += 1;
                        document.getElementById('jumpLvl').innerText = upgrades.jump;
                    } else {
                        upgrades.speed += 1;
                        document.getElementById('speedLvl').innerText = upgrades.speed;
                    }
                    document.getElementById('gold').innerText = gold;
                }
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        draw();
    </script>
</body>
</html>
