<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: World of Platformer</title>
    <style>
        body { margin: 0; background: #0b0d12; display: flex; flex-direction: column; align-items: center; color: #f0ebe0; font-family: sans-serif; overflow: hidden; }
        canvas { border: 3px solid #c49642; background: #1a1a2e; margin-top: 20px; box-shadow: 0 0 20px black; }
        .ui { margin-top: 10px; font-size: 20px; color: #c49642; font-weight: bold; }
        .controls { color: #888; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <h1 style="color: #c49642; margin-bottom: 5px;">MYTHION QUEST: LEVEL 1</h1>
    <div class="ui">Najdi Dark Portal na konci mapy!</div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls">Pohyb: Šipky / A,D | Skok: Mezerník</div>
    <a href="index.html" style="margin-top:15px; color:#c49642;">Zpět na web</a>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 500;

        // Nastavení hry
        const gravity = 0.8;
        const keys = {};

        // Obrázky
        const playerImg = new Image(); playerImg.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';
        const portalImg = new Image(); portalImg.src = 'https://render.worldofwarcraft.com/eu/icons/56/spell_arcane_teleportorgrimmar.jpg';

        // Hráč
        const player = {
            x: 50, y: 300, w: 40, h: 40,
            dx: 0, dy: 0, speed: 5, jump: -15, grounded: false
        };

        // Mapa (Level 1) - x, y, šířka, výška
        const platforms = [
            { x: 0, y: 450, w: 300, h: 50 },   // Start
            { x: 350, y: 380, w: 150, h: 30 },  // První skok
            { x: 550, y: 300, w: 200, h: 30 },  // Druhý skok
            { x: 400, y: 200, w: 100, h: 20 },  // Odbočka nahoru
            { x: 800, y: 450, w: 200, h: 50 },  // Cíl
        ];

        const goal = { x: 920, y: 390, w: 60, h: 60 }; // Portál

        function update() {
            // Pohyb
            if (keys['ArrowRight'] || keys['KeyD']) player.dx = player.speed;
            else if (keys['ArrowLeft'] || keys['KeyA']) player.dx = -player.speed;
            else player.dx = 0;

            player.dy += gravity;
            player.x += player.dx;
            player.y += player.dy;

            // Kolize s platformami
            player.grounded = false;
            for (let p of platforms) {
                if (player.x < p.x + p.w && player.x + player.w > p.x &&
                    player.y < p.y + p.h && player.y + player.h > p.y) {
                    
                    // Detekce dopadu shora
                    if (player.dy > 0 && player.y + player.h - player.dy <= p.y) {
                        player.y = p.y - player.h;
                        player.dy = 0;
                        player.grounded = true;
                    }
                }
            }

            // Pád do "lávy" (mimo obrazovku)
            if (player.y > canvas.height) {
                reset();
            }

            // Výhra - dotek portálu
            if (player.x < goal.x + goal.w && player.x + player.w > goal.x &&
                player.y < goal.y + goal.h && player.y + player.h > goal.y) {
                alert("GRATULACE! Level 1 dokončen. Jsi připraven na raid!");
                reset();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Pozadí - obloha
            ctx.fillStyle = "#1a1a2e";
            ctx.fillRect(0,0, canvas.width, canvas.height);

            // Platformy
            ctx.fillStyle = "#4e342e"; // Barva země
            for (let p of platforms) {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = "#c49642";
                ctx.strokeRect(p.x, p.y, p.w, p.h);
            }

            // Portál
            ctx.drawImage(portalImg, goal.x, goal.y, goal.w, goal.h);

            // Hráč
            ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

            requestAnimationFrame(() => { update(); draw(); });
        }

        function reset() {
            player.x = 50; player.y = 300; player.dy = 0;
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space' && player.grounded) {
                player.dy = player.jump;
                player.grounded = false;
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        draw();
    </script>
</body>
</html>
