<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: Ascended Edition</title>
    <style>
        :root { 
            --gold: #c49642; 
            --dark: #050508; 
            --panel: rgba(10, 10, 25, 0.92); 
            --mythic: #a335ee; 
        }
        
        body { 
            margin: 0; background: #020205; color: #f0ebe0; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050508 100%);
        }

        /* HVĚZDY NA POZADÍ */
        body::before {
            content: ""; position: absolute; width: 200%; height: 200%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.15; animation: moveDust 100s linear infinite; z-index: -1;
        }
        @keyframes moveDust { from { transform: translate(0,0); } to { transform: translate(-25%, -25%); } }

        .layout-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; transition: transform 0.05s ease-out; }
        
        .guild-header { 
            font-size: 50px; font-weight: 900; letter-spacing: 15px; text-transform: uppercase; margin: 0 0 10px 0;
            background: linear-gradient(to bottom, #fff, var(--gold), #8a6526);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(196, 150, 66, 0.5));
        }

        .game-horizontal { display: flex; gap: 25px; align-items: flex-start; }
        .game-column { display: flex; flex-direction: column; align-items: flex-start; }

        .canvas-area { position: relative; border: 3px solid var(--gold); border-radius: 12px; overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,1); background: #000; }
        canvas { display: block; cursor: none; background: rgba(0,0,0,0.8); }

        .sidebar { width: 220px; display: flex; flex-direction: column; gap: 15px; }
        .panel { 
            background: var(--panel); border: 1px solid rgba(196,150,66,0.4); border-radius: 8px; 
            padding: 15px; border-left: 6px solid var(--gold); backdrop-filter: blur(10px);
        }
        .panel-title { color: var(--gold); font-size: 11px; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .score-val { font-size: 30px; font-weight: bold; color: #fff; }
        .rank-tag { font-size: 12px; color: var(--mythic); font-weight: bold; text-transform: uppercase; margin-top: 5px; }

        .chat-container {
            width: 506px; height: 140px; background: rgba(5, 5, 15, 0.95);
            border: 2px solid var(--gold); border-top: none;
            border-radius: 0 0 10px 10px; padding: 12px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: flex-end;
            backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .chat-msg { font-size: 13px; margin-bottom: 4px; line-height: 1.2; }
        .chat-guild { color: #40ff40; font-weight: bold; }
        .chat-system { color: #ffff40; font-style: italic; }

        .overlay { 
            display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.92);
            flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center;
        }
    </style>
</head>
<body>

    <div class="layout-wrapper" id="mainWrapper">
        <div class="guild-header">Mythion</div>

        <div class="game-horizontal">
            <div class="game-column">
                <div class="canvas-area">
                    <canvas id="gameCanvas"></canvas>
                    <div id="gameOverScreen" class="overlay">
                        <h1 style="color:#ff4444; font-size: 40px; margin:0; letter-spacing:4px;">DEPLETED</h1>
                        <p style="font-style:italic; color:#aaa;">Zase jsi pullnul celou roomku...</p>
                        <div class="score-val" id="finalScoreDisplay" style="color:var(--gold);">0 yd</div>
                        <button style="background:var(--gold); border:none; padding:12px 35px; font-weight:bold; cursor:pointer; margin-top:20px; border-radius:4px; text-transform:uppercase;" onclick="restartGame()">Release Spirit</button>
                    </div>
                </div>
                <div class="chat-container" id="gameChat"></div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <div class="panel-title">M+ Rating</div>
                    <div class="score-val" id="height">0</div>
                    <div class="rank-tag" id="rankName">Trialist</div>
                </div>
                <div class="panel" style="border-left-color: #3498db;">
                    <div class="panel-title">Active Affix</div>
                    <div id="affixList" style="font-size: 13px; color: #3498db; font-weight: bold;">FORTIFIED</div>
                </div>
                <div class="panel" style="border-left-color: var(--mythic);">
                    <div class="panel-title">Personal Best</div>
                    <div id="best" style="font-size: 22px; font-weight: bold;">0 yd</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 600;

        const imgOrc = new Image(); imgOrc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';
        
        let score = 0, bestScore = localStorage.getItem('mythion_vAsc_best') || 0;
        document.getElementById('best').innerText = bestScore + " yd";

        let gameActive = true, started = false, spacePressed = false, jumpPower = 0, cameraY = 0;
        let shakeAmount = 0;
        const maxJumpPower = 22, keys = {}, platforms = [];
        let player = { x: 230, y: 500, w: 42, h: 42, dx: 0, dy: 0, grounded: false };

        const ranks = [
            { h: 0, n: "Trialist" }, { h: 500, n: "Core Raider" }, 
            { h: 1200, n: "Mythic Raider" }, { h: 2500, n: "Guild Master" }
        ];

        function addChatMessage(name, msg, type = 'guild') {
            const chatBox = document.getElementById('gameChat');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = type === 'guild' ? `[<span class="chat-guild">Guild</span>] <b>${name}:</b> ${msg}` : `<span class="chat-system">${msg}</span>`;
            chatBox.appendChild(div);
            if (chatBox.childNodes.length > 6) chatBox.removeChild(chatBox.firstChild);
        }

        function restartGame() {
            score = 0; cameraY = 0; gameActive = true; started = false; jumpPower = 0;
            player = { x: 230, y: 500, w: 42, h: 42, dx: 0, dy: 0, grounded: false };
            platforms.length = 0;
            platforms.push({x: 0, y: 560, w: 500, h: 100, type: 'start', alpha: 1});
            for(let i=1; i<15; i++) addPlatform(560 - i*140);
            document.getElementById('gameOverScreen').style.display = 'none';
            addChatMessage(null, "--- NOVÝ PULL: KEY +15 ---", "system");
        }

        function addPlatform(y) {
            const w = Math.max(75, 150 - Math.abs(y)/650);
            let type = (Math.abs(y) > 800 && Math.random() > 0.7) ? 'void' : 'normal';
            // Pojistka proti příliš mnoha voidům
            if (platforms.length > 0 && platforms[platforms.length-1].type === 'void') type = 'normal';
            platforms.push({ x: Math.random()*(canvas.width-w), y: y, w: w, h: 20, type: type, alpha: 1, pTime: 0 });
        }

        function update() {
            if (!gameActive) return;
            
            if (shakeAmount > 0) shakeAmount *= 0.9;
            document.getElementById('mainWrapper').style.transform = `translate(${Math.random()*shakeAmount - shakeAmount/2}px, ${Math.random()*shakeAmount - shakeAmount/2}px)`;

            if (keys['KeyA'] || keys['ArrowLeft']) player.dx = -7.5;
            else if (keys['KeyD'] || keys['ArrowRight']) player.dx = 7.5;
            else player.dx *= 0.85;

            player.dy += 0.55; player.x += player.dx; player.y += player.dy;

            if (spacePressed && player.grounded) {
                jumpPower += 0.9; if (jumpPower > maxJumpPower) jumpPower = maxJumpPower;
            }

            if (player.x < 0) player.x = 0; if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;

            player.grounded = false;
            for (let p of platforms) {
                if (player.dy > 0 && player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.dy) {
                    
                    if (!player.grounded && player.dy > 5) shakeAmount = player.dy * 0.4;
                    player.y = p.y - player.h; player.dy = 0; player.grounded = true;
                    if (p.type === 'void' && started) p.alpha -= 0.15;
                }
            }
            for(let i=platforms.length-1; i>=0; i--) { if(platforms[i].alpha <= 0) platforms.splice(i,1); }

            if (started) {
                let targetCam = player.y - 300;
                if (targetCam < cameraY) cameraY += (targetCam - cameraY) * 0.12;
                if (score > 1500 && Math.random() > 0.992) shakeAmount = 12; // Quaking affix
            }

            let topY = platforms[platforms.length - 1].y;
            if (player.y < topY + 800) addPlatform(topY - 142);

            let curH = Math.floor(Math.abs(player.y - 500) / 10);
            if (curH > score) {
                score = curH;
                document.getElementById('height').innerText = score;
                let currentRank = ranks.filter(r => r.h <= score).pop();
                document.getElementById('rankName').innerText = currentRank.n;
                
                if (score > 500) document.getElementById('affixList').innerText = "SANGUINE";
                if (score > 1500) document.getElementById('affixList').innerText = "SANGUINE, QUAKING";

                if (score > bestScore) {
                    bestScore = score; localStorage.setItem('mythion_vAsc_best', score);
                    document.getElementById('best').innerText = bestScore + " yd";
                }
            }

            if (started && player.y > cameraY + canvas.height + 100) {
                gameActive = false;
                document.getElementById('finalScoreDisplay').innerText = score + " yd";
                document.getElementById('gameOverScreen').style.display = 'flex';
                shakeAmount = 25;
            }
        }

        function draw() {
            ctx.fillStyle = "#000"; ctx.fillRect(0,0,500,600);
            
            let grd = ctx.createRadialGradient(250, 300, 50, 250, 300, 500);
            grd.addColorStop(0, "rgba(30, 15, 60, 0.4)"); grd.addColorStop(1, "rgba(0,0,0,0.9)");
            ctx.fillStyle = grd; ctx.fillRect(0,0,500,600);

            ctx.save(); ctx.translate(0, -cameraY);

            platforms.forEach(p => {
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.type === 'void' ? "#f00" : "#c49642";
                
                if (score > 500) {
                    p.pTime += 0.05;
                    ctx.shadowColor = p.type === 'void' ? "#f00" : `rgba(196, 150, 66, ${0.4 + Math.sin(p.pTime)*0.3})`;
                }

                ctx.fillStyle = p.type === 'void' ? "#400" : "#1a1a2e";
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = p.type === 'void' ? "#ff4444" : "#c49642";
                ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h);
            });

            ctx.globalAlpha = 1; ctx.shadowBlur = 20; 
            ctx.shadowColor = jumpPower > 15 ? "#0cf" : "#000";
            ctx.drawImage(imgOrc, player.x, player.y, player.w, player.h);
            
            ctx.restore();
            requestAnimationFrame(() => { update(); draw(); });
        }

        const members = [
            {n: "Arny", m: ["Uhni z toho ohně!", "Takhle M+ nevyčasujeme.", "To je DPS jak u tanka..."]},
            {n: "Mimi", m: ["V armádě bys už dělal kliky!", "Mimi vidí všechno!", "Skoč víc, bačkoro!"]},
            {n: "Suzu", m: ["Mám low manu, nepadni.", "Suzu tě healovat nebude!", "Kdo to zase pullnul?"]},
            {n: "Exsqueez", m: ["Solidní wipe v přímém přenosu.", "Máš zapnutý monitor?", "Půjč mi na repair."]}
        ];

        setInterval(() => {
            if (gameActive && started) {
                const mem = members[Math.floor(Math.random()*members.length)];
                addChatMessage(mem.n, mem.m[Math.floor(Math.random()*mem.m.length)]);
            }
        }, 9000);

        window.addEventListener('keydown', e => { keys[e.code] = true; if (e.code === 'Space') { e.preventDefault(); spacePressed = true; }});
        window.addEventListener('keyup', e => { 
            keys[e.code] = false; 
            if (e.code === 'Space' && gameActive) { 
                if (player.grounded) { player.dy = -Math.max(10, jumpPower); player.grounded = false; started = true; }
                spacePressed = false; jumpPower = 0;
            }
        });

        restartGame(); draw();
    </script>
</body>
</html>
