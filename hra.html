<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mythion: M+ Vertical Push</title>
    <style>
        body { margin: 0; background: #0b0d12; display: flex; flex-direction: column; align-items: center; color: #f0ebe0; font-family: sans-serif; overflow: hidden; }
        canvas { border: 3px solid #c49642; background: linear-gradient(to bottom, #1a2a3a, #0b0d12); margin-top: 20px; box-shadow: 0 0 30px black; }
        .ui { margin-top: 10px; text-align: center; }
        .power-bar-container { width: 400px; height: 20px; background: #333; border: 2px solid #c49642; margin-top: 5px; position: relative; }
        #powerBar { width: 0%; height: 100%; background: linear-gradient(to right, #4a7c2c, #ff4444); transition: width 0.1s; }
        .stats { font-size: 20px; color: #c49642; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h1 style="color: #c49642; margin: 10px 0;">M+ VERTICAL PUSH: SEASON 1</h1>
    
    <div class="stats">
        Current Depth: <span id="height">0</span> yd | 
        Best M+ Score: <span id="score">0</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="ui">
        <div class="power-bar-container"><div id="powerBar"></div></div>
        <p style="color: #888;">Drž MEZERNÍK pro sílu skoku | Šipky A/D pro směr ve vzduchu</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 700;

        // Obrázky
        const imgOrc = new Image(); imgOrc.src = 'https://render.worldofwarcraft.com/eu/icons/56/inv_helmet_06.jpg';

        let maxScore = localStorage.getItem('mythion_mplus') || 0;
        document.getElementById('score').innerText = maxScore;

        let spacePressed = false;
        let jumpPower = 0;
        const keys = {};

        const player = {
            x: 280, y: 600, w: 40, h: 40,
            dx: 0, dy: 0,
            grounded: false
        };

        // Platformy (svislý level)
        // x, y (odshora), šířka, výška
        const platforms = [
            {x: 0, y: 650, w: 600, h: 50}, // Startovní zem
            {x: 100, y: 550, w: 150, h: 20},
            {x: 350, y: 480, w: 150, h: 20},
            {x: 150, y: 380, w: 100, h: 20},
            {x: 400, y: 300, w: 120, h: 20},
            {x: 100, y: 220, w: 150, h: 20},
            {x: 300, y: 150, w: 100, h: 20},
            {x: 50, y: 80, w: 100, h: 20},
        ];

        function update() {
            // Gravitace
            player.dy += 0.5;
            player.x += player.dx;
            player.y += player.dy;

            // Nabíjení skoku
            if (spacePressed && player.grounded) {
                jumpPower += 0.4;
                if (jumpPower > 20) jumpPower = 20;
                document.getElementById('powerBar').style.width = (jumpPower * 5) + "%";
            }

            // Ovládání ve vzduchu
            if (!player.grounded) {
                if (keys['KeyA'] || keys['ArrowLeft']) player.dx = -4;
                else if (keys['KeyD'] || keys['ArrowRight']) player.dx = 4;
            } else {
                player.dx *= 0.8; // Tření na zemi
            }

            // Odraz od stěn
            if (player.x < 0 || player.x + player.w > canvas.width) {
                player.dx *= -1;
            }

            // Kolize s platformami
            let wasGrounded = player.grounded;
            player.grounded = false;
            for (let p of platforms) {
                if (player.x < p.x + p.w && player.x + player.w > p.x &&
                    player.y < p.y + p.h && player.y + player.h > p.y) {
                    
                    // Dopad shora
                    if (player.dy > 0 && player.y + player.h - player.dy <= p.y) {
                        player.y = p.y - player.h;
                        player.dy = 0;
                        player.dx = 0;
                        player.grounded = true;
                    }
                }
            }

            // Výpočet skóre (výška)
            let currentHeight = Math.floor((610 - player.y));
            if (currentHeight < 0) currentHeight = 0;
            document.getElementById('height').innerText = currentHeight;

            if (currentHeight > maxScore) {
                maxScore = currentHeight;
                localStorage.setItem('mythion_mplus', maxScore);
                document.getElementById('score').innerText = maxScore;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Kreslení platforem
            ctx.fillStyle = "#4e342e";
            for (let p of platforms) {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = "#c49642";
                ctx.strokeRect(p.x, p.y, p.w, p.h);
            }

            // Kreslení hráče
            ctx.drawImage(imgOrc, player.x, player.y, player.w, player.h);

            requestAnimationFrame(() => { update(); draw(); });
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'Space') spacePressed = true;
        });

        window.addEventListener('keyup', e => {
            keys[e.code] = false;
            if (e.code === 'Space' && player.grounded) {
                // Výstřel nahoru
                player.dy = -jumpPower;
                // Pokud držíme stranu, skočíme i do boku
                if (keys['KeyA'] || keys['ArrowLeft']) player.dx = -5;
                if (keys['KeyD'] || keys['ArrowRight']) player.dx = 5;
                
                player.grounded = false;
                spacePressed = false;
                jumpPower = 0;
                document.getElementById('powerBar').style.width = "0%";
            }
        });

        draw();
    </script>
</body>
</html>
