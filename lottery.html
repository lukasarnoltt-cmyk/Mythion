<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythion Loterie | Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  background-color: #050505;
  background-image:
    radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.2), transparent 70%),
    linear-gradient(180deg, #111111 0%, #000000 100%);
  color: #e5e7eb;
  min-height: 100vh;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #facc15; }
.font-cinzel { font-family: 'Cinzel', serif; }
.card { background: rgba(15,15,15,0.8); border:1px solid rgba(255,215,0,0.2); backdrop-filter: blur(12px); transition: all 0.3s ease; box-shadow: 0 4px 30px rgba(0,0,0,0.5);}
.card:hover { transform: translateY(-2px); border-color: rgba(255,215,0,0.5); box-shadow: 0 10px 40px rgba(212,175,55,0.15);}
.glow-effect { animation: pulse-glow 3s infinite; }
@keyframes pulse-glow {0%,100%{text-shadow:0 0 10px rgba(255,215,0,0.5);}50%{text-shadow:0 0 25px rgba(255,215,0,0.9);}}
.fog-container{position: fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none; overflow:hidden;}
.fog-img{position:absolute; height:100vh; width:300vw; opacity:0.15; background:url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png') repeat-x; animation:fog 60s linear infinite; filter: sepia(1) hue-rotate(10deg) saturate(3);}
.fog-img-2{animation-direction: reverse; animation-duration:40s; top:30%; opacity:0.1; filter: sepia(1) hue-rotate(10deg) saturate(3);}
@keyframes fog{0%{transform:translate3d(0,0,0);}100%{transform:translate3d(-200vw,0,0);}}
</style>
</head>
<body>

<div class="fog-container">
  <div class="fog-img"></div>
  <div class="fog-img-2"></div>
</div>

<div class="container mx-auto p-4 md:p-8 max-w-6xl relative z-10">

  <!-- TLAČÍTKO NAHLAVU -->
  <div class="mb-6 text-left">
    <a href="index.html" class="bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-2 px-4 rounded shadow-lg shadow-yellow-500/20 inline-flex items-center gap-2">
      <i data-lucide="arrow-left" class="w-4 h-4"></i> Vrátit se na hlavní stránku
    </a>
  </div>

  <header class="flex flex-col items-center mb-12 text-center">
    <div class="relative group">
      <div class="absolute -inset-1 bg-gradient-to-r from-yellow-600 to-amber-400 rounded-full blur opacity-25 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
      <div class="relative w-32 h-32 rounded-full bg-black border-2 border-yellow-500 flex items-center justify-center overflow-hidden shadow-2xl group-hover:border-yellow-400 transition-colors">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-yellow-900/40 via-black to-black"></div>
        <span class="relative z-10 text-7xl font-black font-cinzel bg-clip-text text-transparent bg-gradient-to-b from-yellow-100 via-yellow-400 to-amber-700 drop-shadow-[0_0_10px_rgba(255,215,0,0.8)] glow-effect mt-2">M</span>
      </div>
    </div>
    <h1 class="mt-6 text-5xl md:text-7xl font-bold uppercase tracking-widest font-cinzel bg-clip-text text-transparent bg-gradient-to-b from-yellow-200 via-white to-yellow-600 drop-shadow-lg">Mythion</h1>
    <div class="flex items-center gap-2 mt-2 text-yellow-300/70 text-sm uppercase tracking-widest font-semibold">
      <span class="w-8 h-[1px] bg-yellow-500/50"></span>
      Guildovní Loterie
      <span class="w-8 h-[1px] bg-yellow-500/50"></span>
    </div>
    <div class="mt-4 flex items-center gap-4 bg-black/50 px-4 py-2 rounded-full border border-yellow-500/30 backdrop-blur-sm">
      <i data-lucide="calendar" class="w-4 h-4 text-yellow-400"></i>
      <span id="date-display" class="text-gray-300 font-mono text-sm">Načítání data...</span>
    </div>
  </header>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
    <!-- Card: Jackpot -->
    <div class="card rounded-xl p-6 relative overflow-hidden group">
      <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
        <i data-lucide="coins" class="w-16 h-16 text-yellow-400"></i>
      </div>
      <h2 class="text-sm font-bold text-yellow-500 uppercase tracking-wider mb-2">Celkový Jackpot</h2>
      <div class="flex items-baseline gap-1">
        <span id="jackpot-amount" class="text-4xl font-bold text-white glow-effect">0</span>
        <span class="text-yellow-500 font-cinzel">g</span>
      </div>
      <p id="rollover-info" class="text-xs text-gray-500 mt-2 h-4"></p>
      <div class="w-full bg-gray-800 h-1 mt-4 rounded-full overflow-hidden">
        <div class="bg-gradient-to-r from-yellow-600 to-amber-400 h-full w-[60%]"></div>
      </div>
      <p class="text-[10px] text-right text-gray-500 mt-1">60% prizepool</p>
    </div>

    <!-- Card: Bank -->
    <div class="card rounded-xl p-6 relative overflow-hidden group border-amber-500/20">
      <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
        <i data-lucide="landmark" class="w-16 h-16 text-amber-500"></i>
      </div>
      <h2 class="text-sm font-bold text-amber-500 uppercase tracking-wider mb-2">Celkem v Guild Bance</h2>
      <div class="flex items-baseline gap-1">
        <span id="bank-total-amount" class="text-4xl font-bold text-white">0</span>
        <span class="text-yellow-500 font-cinzel">g</span>
      </div>
      <p id="bank-weekly-gain" class="text-xs text-green-400 mt-2">+0g tento týden</p>
      <div class="w-full bg-gray-800 h-1 mt-4 rounded-full overflow-hidden">
        <div class="bg-amber-600 h-full w-full opacity-50"></div>
      </div>
      <p class="text-[10px] text-right text-gray-500 mt-1">Historický výdělek (40% cut)</p>
    </div>

    <!-- Card: Winning Number -->
    <div class="card rounded-xl p-6 relative overflow-hidden text-center border-yellow-500/40">
      <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">Vítězné Číslo</h2>
      <div class="relative inline-block">
        <div class="absolute -inset-2 bg-yellow-600 blur-lg opacity-20 rounded-full"></div>
        <span id="winning-number-display" class="relative text-6xl font-black font-mono text-white z-10">?</span>
      </div>
      <div id="countdown-display" class="mt-4 text-xs font-mono text-yellow-300 bg-yellow-900/30 py-1 px-2 rounded inline-block border border-yellow-500/20">
        ---
      </div>
    </div>

    <!-- Card: Winners -->
    <div class="card rounded-xl p-6 flex flex-col justify-center text-center relative overflow-hidden">
      <div class="absolute inset-0 bg-gradient-to-b from-green-900/10 to-transparent pointer-events-none"></div>
      <h2 class="text-sm font-bold text-green-400 uppercase tracking-wider mb-2">Vítězové</h2>
      <div id="winner-container" class="flex-1 flex items-center justify-center">
        <span id="winner-name" class="text-2xl font-bold text-gray-500">Čekání na los...</span>
      </div>
      <button onclick="copyToDiscord()" class="mt-4 flex items-center justify-center gap-2 text-xs bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-2 px-4 rounded transition-colors shadow-lg shadow-yellow-500/20">
        <i data-lucide="copy" class="w-3 h-3"></i> Zkopírovat pro Discord
      </button>
    </div>
  </div>
