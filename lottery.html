<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYTHION Guild | Loterie</title>

<link rel="stylesheet" href="css/style_final_v8.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Uncial+Antiqua&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {background:#050505; color:#fff; font-family:'Cinzel', serif;}
.navbar {display:flex; justify-content:space-between; padding:15px; background:rgba(0,0,0,0.8);}
.navbar a {color:gold; margin:0 10px; text-decoration:none;}
.navbar a.active {text-decoration:underline;}
.content-section {max-width:900px; margin:30px auto; padding:20px; background:rgba(15,15,15,0.8); border-radius:12px; border:1px solid rgba(255,215,0,0.3);}
h2 {text-align:center; color:gold; text-shadow:0 0 15px gold; margin-bottom:20px;}
.back-btn {display:inline-block; margin:0 auto 20px auto; padding:10px 20px; background:rgba(255,215,0,0.2); color:gold; font-weight:bold; border:1px solid gold; border-radius:8px; text-decoration:none; transition:0.3s;}
.back-btn:hover {background:rgba(255,215,0,0.4); color:#fff;}
.lottery-input {width:60px; padding:5px; margin-right:10px; border-radius:5px; border:none; text-align:center;}
button.place-bet {padding:5px 10px; border:none; border-radius:5px; background:gold; color:#000; font-weight:bold; cursor:pointer; transition:0.3s;}
button.place-bet:hover {background:#fff;}
#winningNumber {font-size:50px; color:gold; text-shadow:0 0 20px gold; text-align:center; margin:15px 0;}
table {width:100%; border-collapse:collapse; margin-top:20px;}
th, td {padding:10px; border:1px solid gold; text-align:center;}
th {background:rgba(255,215,0,0.2);}
td {background:rgba(0,0,0,0.5);}
.countdown {text-align:center; font-size:24px; margin:20px 0; color:gold;}
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">MYTHION</div>
  <ul>
    <li><a href="index.html">Domů</a></li>
    <li><a href="lottery.html" class="active">Guild Loterie</a></li>
    <li><a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a></li>
  </ul>
</nav>

<section class="content-section">
  <h2>🎰 Guild Loterie</h2>

  <div style="text-align:center;">
    <a href="index.html" class="back-btn">⏎ Zpět na hlavní</a>
  </div>

  <div class="countdown" id="countdown">Na páteční losování zbývá: --:--:--</div>

  <div style="text-align:center; margin-bottom:20px;">
    <input type="text" id="playerName" class="lottery-input" placeholder="Jméno">
    <input type="number" id="playerNumber" class="lottery-input" placeholder="1-100" min="1" max="100">
    <button class="place-bet" onclick="placeBet()">Vsadit</button>
  </div>

  <div class="winning-box">
    <h3>Výherní číslo týdne</h3>
    <div id="winningNumber">?</div>
  </div>

  <h3 style="text-align:center; margin-top:30px;">Seznam vsazených čísel</h3>
  <table id="playersTable">
    <thead>
      <tr>
        <th>Jméno</th>
        <th>Číslo</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</section>

<footer style="text-align:center; margin-top:30px;">
  <p>&copy; 2026 Mythion Guild | 
     <a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a>
  </p>
</footer>

<script>
let players = JSON.parse(localStorage.getItem("lotteryPlayers")) || [];
let winningNumber = localStorage.getItem("winningNumber") || "?";

function updateTable(){
  const tbody = document.querySelector("#playersTable tbody");
  tbody.innerHTML = "";
  players.forEach(p => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${p.name}</td><td>${p.number}</td>`;
    tbody.appendChild(tr);
  });
}

function placeBet(){
  const name = document.getElementById("playerName").value.trim();
  let number = parseInt(document.getElementById("playerNumber").value);
  if(!name || isNaN(number) || number<1 || number>100){ alert("Vyplň jméno a číslo 1-100"); return; }
  // omezíme jedno číslo na hráče
  if(players.some(p=>p.name===name)){ alert("Hráč už vsadil!"); return; }
  players.push({name,name, number});
  localStorage.setItem("lotteryPlayers",JSON.stringify(players));
  updateTable();
  document.getElementById("playerName").value="";
  document.getElementById("playerNumber").value="";
}

// Odpočet do pátečního losování
function updateCountdown(){
  const now = new Date();
  let nextFriday = new Date();
  nextFriday.setDate(now.getDate() + (5 - now.getDay() + 7) % 7);
  nextFriday.setHours(20,0,0,0); // pátek 20:00
  let diff = nextFriday - now;
  let h = Math.floor(diff/1000/60/60);
  let m = Math.floor(diff/1000/60)%60;
  let s = Math.floor(diff/1000)%60;
  document.getElementById("countdown").innerText = `Na páteční losování zbývá: ${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;
}
setInterval(updateCountdown,1000);

// Losování každý pátek v 20:00
function checkFriday(){
  const now = new Date();
  if(now.getDay()===5 && now.getHours()===20 && now.getMinutes()===0){
    drawWinningNumber();
  }
}
setInterval(checkFriday,60000);

function drawWinningNumber(){
  const number = Math.floor(Math.random()*100)+1;
  winningNumber = number;
  document.getElementById("winningNumber").innerText=number;
  confetti({particleCount:200, spread:120, origin:{y:0.6}});
  localStorage.setItem("winningNumber",number);
  // Reset hráčů po losování
  players=[];
  localStorage.setItem("lotteryPlayers",JSON.stringify(players));
  updateTable();
}

// Načtení uložených hodnot při startu
document.getElementById("winningNumber").innerText = winningNumber;
updateTable();

</script>

</body>
</html>
