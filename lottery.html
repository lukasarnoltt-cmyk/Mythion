<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYTHION Guild | Loterie</title>

<link rel="stylesheet" href="css/style_final_v8.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Uncial+Antiqua&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  background: black;
  color: white;
  font-family: 'Cinzel', serif;
  overflow-x: hidden;
}
.navbar {
  position: fixed;
  top: 0; width: 100%;
  padding: 20px 40px;
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  z-index: 999;
}
.navbar .logo { color: gold; font-size:1.8rem; font-weight:bold; }
.navbar ul { list-style:none; display:flex; gap:30px; }
.navbar ul li a { text-decoration:none; color:white; transition:0.3s; }
.navbar ul li a:hover, .navbar ul li a.active { color: gold; text-shadow:0 0 10px gold; }

section { padding:120px 20px 60px; text-align:center; min-height:80vh; position:relative; }

.hero-bg {
  position:absolute; inset:0; z-index:-2;
  background: radial-gradient(circle at 50% 50%, rgba(255,215,0,0.05), transparent 70%);
  overflow:hidden;
}
.particle {
  position:absolute; width:4px; height:4px; background:white; border-radius:50%;
  opacity:0; animation:floatUp linear infinite;
}
@keyframes floatUp { 0%{transform:translateY(100vh);opacity:0;} 20%{opacity:1;} 100%{transform:translateY(-10vh);opacity:0;} }

.content-section { max-width:900px; margin:auto; background: rgba(0,0,0,0.6); padding:30px; border-radius:12px; border:1px solid rgba(255,215,0,0.3); }
.content-section h2 { color: gold; margin-bottom:20px; text-shadow:0 0 10px gold; }

.stat-box { display:inline-block; margin:15px; padding:20px 35px; border-radius:12px; backdrop-filter: blur(6px); border:1px solid rgba(255,215,0,0.3); }
.stat-box h3 { font-size:28px; color:gold; }
.stat-box p { color:white; margin-top:5px; font-weight:500; }

.winning-box { margin:30px 0; }
.winning-number { font-size:60px; color:gold; text-shadow:0 0 20px gold; margin-top:10px; }

.countdown { font-size:2rem; color:gold; text-shadow:0 0 10px gold; margin-bottom:30px; }

.back-btn { display:inline-block; margin:0 auto 20px auto; padding:10px 20px; background:rgba(255,215,0,0.2); color:gold; font-weight:bold; border:1px solid gold; border-radius:8px; text-decoration:none; transition:0.3s; }
.back-btn:hover { background:rgba(255,215,0,0.4); color:#fff; }

table { width:100%; border-collapse:collapse; margin-top:20px; }
table, th, td { border:1px solid gold; }
th, td { padding:10px; text-align:center; }
th { background:rgba(255,215,0,0.2); color:gold; }

footer { background:#111; padding:30px; text-align:center; }
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">MYTHION</div>
  <ul>
    <li><a href="index.html">Domů</a></li>
    <li><a href="lottery.html" class="active">Guild Loterie</a></li>
    <li><a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a></li>
  </ul>
</nav>

<section>
  <div class="hero-bg"></div>
  
  <div class="content-section active">
    <h2>🎰 Guild Loterie</h2>
    <a href="index.html" class="back-btn">⏎ Zpět na hlavní</a>

    <div class="stat-box">
      <h3>Aktuální Jackpot</h3>
      <p id="jackpot">50,000 🪙</p>
    </div>

    <div class="winning-box">
      <h3>Výherní číslo týdne</h3>
      <div id="winningNumber" class="winning-number">?</div>
    </div>

    <div class="countdown">
      Další losování za: <span id="countdownTimer">?</span>
    </div>

    <h3>Hráči a jejich čísla</h3>
    <table>
      <thead>
        <tr><th>Jméno</th><th>Číslo</th></tr>
      </thead>
      <tbody id="playersTable">
        <tr><td>Lukáš</td><td>23</td></tr>
        <tr><td>Arny</td><td>77</td></tr>
      </tbody>
    </table>
  </div>
</section>

<footer>
  &copy; 2026 Mythion Guild | <a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a>
</footer>

<script>
function generateWinningNumber() {
  let number = Math.floor(Math.random()*100)+1;
  document.getElementById("winningNumber").innerText = number;
  localStorage.setItem("mythionLotteryNumber", number);
  confetti({particleCount:200, spread:120, origin:{y:0.6}});
}

// Načtení uloženého čísla
let savedNumber = localStorage.getItem("mythionLotteryNumber");
if(savedNumber) document.getElementById("winningNumber").innerText = savedNumber;

// Odpočet do příštího pátku 20:00
function updateCountdown() {
  let now = new Date();
  let nextFriday = new Date();
  nextFriday.setDate(now.getDate() + (5 - now.getDay() + 7) % 7);
  nextFriday.setHours(20,0,0,0);
  let diff = nextFriday - now;
  if(diff<=0){ generateWinningNumber(); nextFriday.setDate(nextFriday.getDate()+7); diff = nextFriday - now; }
  let days = Math.floor(diff/(1000*60*60*24));
  let hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  let minutes = Math.floor((diff%(1000*60*60))/(1000*60));
  let seconds = Math.floor((diff%(1000*60))/1000);
  document.getElementById("countdownTimer").innerText = `${days}d ${hours}h ${minutes}m ${seconds}s`;
}
setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
