<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MYTHION Guild | Loterie</title>

<link rel="stylesheet" href="css/style_final_v8.css">

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
}

.wrapper{
max-width:900px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.mythion-title{
font-size:60px;
color:gold;
font-weight:bold;
text-shadow:0 0 25px gold;
margin-bottom:10px;
}

.countdown{
font-size:22px;
margin-bottom:30px;
color:#ffd700;
}

.number-box{
background:#111;
border:2px solid gold;
border-radius:15px;
padding:30px;
margin-bottom:30px;
}

.number{
font-size:90px;
color:gold;
text-shadow:0 0 30px gold;
}

table{
width:100%;
border-collapse:collapse;
background:#111;
border-radius:10px;
overflow:hidden;
}

th{
background:#1a1a1a;
color:gold;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #333;
}

tr:hover{
background:#181818;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="mythion-title">MYTHION LOTTERY</div>

<div id="countdown" class="countdown">
Losování se načítá...
</div>

<div class="number-box">

<div style="font-size:22px;margin-bottom:10px;">Výherní číslo</div>

<div id="winningNumber" class="number">?</div>

</div>

<table>

<thead>
<tr>
<th>#</th>
<th>Hráč</th>
<th>Tip</th>
<th>Stav</th>
</tr>
</thead>

<tbody id="players"></tbody>

</table>

</div>

<script>

const drawDay = 5
const drawHour = 20

let winningNumber = null

const players = [
{name:"Exsqueez",bet:37},
{name:"Luxes",bet:12},
{name:"Arny",bet:55},
{name:"Suzu",bet:13},
{name:"Vecty",bet:77},
{name:"Cikynxd",bet:88},
{name:"Kubiinho",bet:92},
{name:"Tony101",bet:44},
{name:"Artimik",bet:61},
{name:"Adamekdave",bet:5},
{name:"Sajmon",bet:26},
{name:"DreimorE3",bet:73},
{name:"Faceless",bet:67},
{name:"Daenysh",bet:45}
]

function getNextDraw(){

const now = new Date()

let days = (drawDay - now.getDay() + 7) % 7

if(days === 0 && now.getHours() >= drawHour){
days = 7
}

const draw = new Date()

draw.setDate(now.getDate() + days)
draw.setHours(drawHour,0,0,0)

return draw

}

function startCountdown(){

const el = document.getElementById("countdown")

setInterval(()=>{

const diff = getNextDraw() - new Date()

const d = Math.floor(diff / 86400000)
const h = Math.floor(diff / 3600000) % 24
const m = Math.floor(diff / 60000) % 60
const s = Math.floor(diff / 1000) % 60

if(diff > 0){
el.innerText = "Další losování za " + d+"d "+h+"h "+m+"m "+s+"s"
}

if(diff <= 0 && winningNumber === null){
drawNumber()
}

},1000)

}

function drawNumber(){

const display = document.getElementById("winningNumber")

let rolls = 0

const anim = setInterval(()=>{

display.innerText = Math.floor(Math.random()*100)+1

rolls++

if(rolls > 30){

clearInterval(anim)

winningNumber = Math.floor(Math.random()*100)+1

display.innerText = winningNumber

renderPlayers()

}

},80)

}

function renderPlayers(){

const body = document.getElementById("players")

body.innerHTML = ""

players.forEach((p,i)=>{

let status = "Čeká"

if(winningNumber !== null){

if(p.bet === winningNumber){
status = "🏆 VÍTĚZ"
}
else{
status = "Prohrál"
}

}

body.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.bet}</td>
<td>${status}</td>
</tr>
`

})

}

renderPlayers()

startCountdown()

</script>

</body>
</html>
