<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mythion Loterie | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.2), transparent 70%),
                linear-gradient(180deg, #111111 0%, #000000 100%);
            color: #e5e7eb;
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #facc15; }

        .font-cinzel { font-family: 'Cinzel', serif; }
        .card {
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 215, 0, 0.5);
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.15);
        }
        .glow-effect {
            animation: pulse-glow 3s infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
            50% { text-shadow: 0 0 25px rgba(255, 215, 0, 0.9); }
        }
        .fog-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .fog-img { position: absolute; height: 100vh; width: 300vw; opacity: 0.15; background: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png') repeat-x; animation: fog 60s linear infinite; filter: sepia(1) hue-rotate(10deg) saturate(3); }
        .fog-img-2 { animation-direction: reverse; animation-duration: 40s; top: 30%; opacity: 0.1; filter: sepia(1) hue-rotate(10deg) saturate(3); }
        @keyframes fog { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-200vw, 0, 0); } }
    </style>
</head>
<body>

<div class="fog-container">
    <div class="fog-img"></div>
    <div class="fog-img-2"></div>
</div>

<div class="container mx-auto p-4 md:p-8 max-w-6xl relative z-10">
    
    <header class="flex flex-col items-center mb-12 text-center">
        <div class="relative group">
            <div class="absolute -inset-1 bg-gradient-to-r from-yellow-600 to-amber-400 rounded-full blur opacity-25 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
            <div class="relative w-32 h-32 rounded-full bg-black border-2 border-yellow-500 flex items-center justify-center overflow-hidden shadow-2xl group-hover:border-yellow-400 transition-colors">
                 <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-yellow-900/40 via-black to-black"></div>
                 <span class="relative z-10 text-7xl font-black font-cinzel bg-clip-text text-transparent bg-gradient-to-b from-yellow-100 via-yellow-400 to-amber-700 drop-shadow-[0_0_10px_rgba(255,215,0,0.8)] glow-effect mt-2">
                     M
                 </span>
            </div>
        </div>
        
        <h1 class="mt-6 text-5xl md:text-7xl font-bold uppercase tracking-widest font-cinzel bg-clip-text text-transparent bg-gradient-to-b from-yellow-200 via-white to-yellow-600 drop-shadow-lg">
            Mythion
        </h1>
        <div class="flex items-center gap-2 mt-2 text-yellow-300/70 text-sm uppercase tracking-widest font-semibold">
            <span class="w-8 h-[1px] bg-yellow-500/50"></span>
            Guildovní Loterie
            <span class="w-8 h-[1px] bg-yellow-500/50"></span>
        </div>
        
        <div class="mt-4 flex flex-col items-center gap-2 bg-black/50 px-4 py-2 rounded-full border border-yellow-500/30 backdrop-blur-sm">
            <div class="flex items-center gap-4">
                <i data-lucide="calendar" class="w-4 h-4 text-yellow-400"></i>
                <span id="date-display" class="text-gray-300 font-mono text-sm">Načítání data...</span>
            </div>
            <button onclick="location.href='index.html'" class="mt-2 px-4 py-2 bg-yellow-600 hover:bg-yellow-500 text-black rounded font-bold shadow-lg">Vrátit se na hlavní stránku</button>
        </div>
    </header>

    <!-- Zbytek původního HTML (Jackpot, Guild Bank, Vítězné číslo, tabulka hráčů) zůstává úplně stejný -->
    <!-- Přesně podle tvého původního kódu -->

    <footer class="text-center mt-12 mb-6 text-gray-600 text-xs">
        <p>Powered by Goblin Engineering Inc. &trade; | Mythion Guild System v2.2</p>
    </footer>
</div>

<div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-900 border border-green-500 text-white px-4 py-3 rounded-lg shadow-2xl flex items-center gap-3 z-50">
    <div class="bg-green-500/20 p-2 rounded-full"><i data-lucide="check" class="w-4 h-4 text-green-400"></i></div>
    <div>
        <h4 class="font-bold text-sm text-yellow-400">Zkopírováno!</h4>
        <p class="text-xs text-gray-400">Výsledky pro Mythion jsou ve schránce.</p>
    </div>
</div>

<script>
const CONFIG = {
    winningNumber: null,
    entryFee: 5000,
    lastJackpotRollover: 65000,
    totalGuildBankSaved: 44000,
    drawDay: 5,
    drawHour: 20,
};

const players = [
    { name: 'Exsqueez', bet: 137 },
    { name: 'Luxes', bet: null },
    { name: 'Arny', bet: null },
    { name: 'Suzu', bet: 13 },
    { name: 'Vecty', bet: null },
    { name: 'Cikynxd', bet: null },
    { name: 'Kubiinho', bet: null },
    { name: 'Tony101', bet: null },
    { name: 'Artimik', bet: null },
    { name: 'Adamekdave', bet: null },
    { name: 'Sajmon', bet: null },
    { name: 'DreimorE3', bet: 176 },
    { name: 'Faceless', bet: 67 },
    { name: 'Daenysh', bet: 145 }
];

lucide.createIcons();
let sortedBy = 'name';
let sortAsc = true;

document.addEventListener('DOMContentLoaded', () => { initApp(); });

function initApp() {
    updateTimers();
    renderTable();
    calculateStats();
}

function getNextDrawDate() {
    const now = new Date();
    const today = now.getDay();
    const daysUntil = (CONFIG.drawDay - today + 7) % 7;
    const nextDraw = new Date(now);
    if (daysUntil === 0 && now.getHours() >= CONFIG.drawHour) nextDraw.setDate(now.getDate() + 7);
    else nextDraw.setDate(now.getDate() + daysUntil);
    nextDraw.setHours(CONFIG.drawHour, 0, 0, 0);
    return nextDraw;
}

function updateTimers() {
    const nextDate = getNextDrawDate();
    document.getElementById('date-display').textContent = 
        `Příští losování: ${nextDate.toLocaleDateString('cs-CZ')} v ${CONFIG.drawHour}:00`;
    const countdownEl = document.getElementById('countdown-display');
    const timerInterval = setInterval(() => {
        const now = new Date();
        const diff = nextDate - now;
        if (diff <= 0) {
            clearInterval(timerInterval);
            CONFIG.winningNumber = Math.floor(Math.random() * 200) + 1;
            calculateStats();
            countdownEl.textContent = "⚠️ LOSOVÁNÍ PROBÍHÁ / HOTOVO";
            countdownEl.classList.add('text-red-400');
            countdownEl.classList.remove('text-yellow-300');
            launchConfetti();
            return;
        }
        const d = Math.floor(diff / (1000*60*60*24));
        const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
        const m = Math.floor((diff % (1000*60*60)) / (1000*60));
        const s = Math.floor((diff % (1000*60)) / 1000);
        countdownEl.textContent = `Zbývá: ${d}d ${h}h ${m}m ${s}s`;
    }, 1000);
}

// Zbytek funkcí calculateStats, renderTable, animateValue, launchConfetti, copyToDiscord, sortTable atd. zůstává stejný jako ve tvém původním kódu

</script>
</body>
</html>
