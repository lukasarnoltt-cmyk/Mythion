<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYTHION Guild Casino</title>

<link rel="stylesheet" href="css/style_final_v8.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Uncial+Antiqua&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
.box{
  text-align:center;
  margin:40px 0;
}
.slot{
  font-size:70px;
  margin:20px;
}
input{
  padding:8px;
  margin:5px;
}
button{
  padding:10px 20px;
  margin:10px;
  cursor:pointer;
}
.jackpot{
  font-size:40px;
  color:gold;
  text-shadow:0 0 10px gold;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">MYTHION</div>
  <ul>
    <li><a href="index.html">Domů</a></li>
    <li><a href="lottery.html">Guild Casino</a></li>
    <li><a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a></li>
  </ul>
</nav>

<section id="content-area">
  <div class="content-section active">

<h2>🎰 Mythion Guild Casino</h2>

<!-- JACKPOT -->
<div class="box">
<h3>Guild Jackpot</h3>
<div id="jackpot" class="jackpot">100</div>
</div>

<!-- LOTTERY BETS -->
<div class="box">
<h3>🎟 Loterie – sázky</h3>
<input id="betName" placeholder="Jméno">
<input id="betNumber" type="number" min="1" max="100" placeholder="Číslo">
<button onclick="addBet()">Přidat sázku</button>
<ul id="betList"></ul>
</div>

<!-- LOSOVÁNÍ -->
<div class="box">
<h3>Losování čísla</h3>
<div id="winningNumber" style="font-size:60px;color:gold">?</div>
<button onclick="drawLottery()">Losovat</button>
</div>

<!-- SLOT -->
<div class="box">
<h3>🎰 Mythion Automat</h3>
<input id="playerName" placeholder="Jméno hráče">
<button onclick="loadPlayer()">Načíst hráče</button>
<div>Coins: <span id="playerCoins">0</span></div>
<div id="slotDisplay" class="slot">❓ ❓ ❓</div>
<button onclick="spinSlot()">Protočit (5 coinů)</button>
<div id="slotResult"></div>
</div>

<!-- HISTORIE -->
<div class="box">
<h3>🏆 Historie výher</h3>
<ul id="historyList"></ul>
</div>

<!-- LEADERBOARD -->
<div class="box">
<h3>👑 Top hráči</h3>
<ul id="leaderboard"></ul>
</div>

</div>
</section>

<footer>
<p>&copy; 2026 Mythion Guild</p>
</footer>

<script>
/* DATA */
let bets=JSON.parse(localStorage.getItem("bets"))||[];
let players=JSON.parse(localStorage.getItem("players"))||{};
let history=JSON.parse(localStorage.getItem("history"))||[];
let jackpot=Number(localStorage.getItem("jackpot"))||100;
let currentPlayer=null;

function save(){
  localStorage.setItem("bets",JSON.stringify(bets));
  localStorage.setItem("players",JSON.stringify(players));
  localStorage.setItem("history",JSON.stringify(history));
  localStorage.setItem("jackpot",jackpot);
}

/* BETS */
function addBet(){
  let name=document.getElementById("betName").value;
  let number=document.getElementById("betNumber").value;
  if(!name||!number) return;
  bets.push({name:name,number:Number(number)});
  renderBets();
  save();
}

function renderBets(){
  let list=document.getElementById("betList");
  list.innerHTML="";
  bets.forEach(b=>{
    let li=document.createElement("li");
    li.innerText=b.name+" → "+b.number;
    list.appendChild(li);
  });
}

/* LOTTERY */
function drawLottery(){
  let num=Math.floor(Math.random()*100)+1;
  document.getElementById("winningNumber").innerText=num;

  let winner="Nikdo";
  bets.forEach(b=>{
    if(b.number===num) winner=b.name;
  });

  history.unshift({number:num,winner:winner});

  if(winner!=="Nikdo"){
    confetti({particleCount:200,spread:120});
    bets=[];
    jackpot=100;
  }else{
    jackpot+=20;
  }

  updateJackpot();
  renderHistory();
  renderBets();
  save();
}

/* JACKPOT */
function updateJackpot(){
  document.getElementById("jackpot").innerText=jackpot;
}

/* CASINO */
const symbols=["🐉","🪙","⭐","💀","🔥"];

function loadPlayer(){
  let name=document.getElementById("playerName").value;
  if(!players[name]){
    players[name]={coins:20};
  }
  currentPlayer=name;
  updateCoins();
  renderLeaderboard();
  save();
}

function updateCoins(){
  if(!currentPlayer) return;
  document.getElementById("playerCoins").innerText=players[currentPlayer].coins;
}

function spinSlot(){
  if(!currentPlayer) return;
  if(players[currentPlayer].coins<5){
    document.getElementById("slotResult").innerText="Nemáš coin!";
    return;
  }
  players[currentPlayer].coins-=5;
  jackpot+=2;
  updateJackpot();

  let display=document.getElementById("slotDisplay");
  let spins=0;
  let interval=setInterval(()=>{
    let a=symbols[Math.floor(Math.random()*symbols.length)];
    let b=symbols[Math.floor(Math.random()*symbols.length)];
    let c=symbols[Math.floor(Math.random()*symbols.length)];
    display.innerText=a+" "+b+" "+c;
    spins++;
    if(spins>20){
      clearInterval(interval);
      checkWin(a,b,c);
    }
  },100);
}

function checkWin(a,b,c){
  let reward=0;
  if(a===b&&b===c){
    if(a==="🐉") reward=100;
    if(a==="🪙") reward=50;
    if(a==="⭐") reward=jackpot;
  }
  if(reward>0){
    players[currentPlayer].coins+=reward;
    confetti({particleCount:150,spread:100});
    document.getElementById("slotResult").innerText="🎉 Výhra "+reward+" coinů";
    jackpot=100;
  }else{
    document.getElementById("slotResult").innerText="Nic";
  }
  updateCoins();
  updateJackpot();
  renderLeaderboard();
  save();
}

/* LEADERBOARD */
function renderLeaderboard(){
  let list=document.getElementById("leaderboard");
  list.innerHTML="";
  let sorted=Object.entries(players)
    .sort((a,b)=>b[1].coins-a[1].coins);
  sorted.forEach(p=>{
    let li=document.createElement("li");
    li.innerText=p[0]+" — "+p[1].coins+" coinů";
    list.appendChild(li);
  });
}

/* HISTORY */
function renderHistory(){
  let list=document.getElementById("historyList");
  list.innerHTML="";
  history.forEach(h=>{
    let li=document.createElement("li");
    li.innerText="Číslo "+h.number+" | vítěz: "+h.winner;
    list.appendChild(li);
  });
}

/* INIT */
updateJackpot();
renderBets();
renderHistory();
renderLeaderboard();

</script>

</body>
</html>
