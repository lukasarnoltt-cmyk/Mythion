<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYTHION Guild | Loterie</title>
<link rel="stylesheet" href="css/style_final_v8.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Uncial+Antiqua&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
  font-family: 'Cinzel', serif;
  background: black;
  color: white;
  overflow-x: hidden;
  margin: 0;
}

.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  z-index: 999;
}

.navbar .logo { color: gold; font-size: 1.8rem; font-weight: bold; }
.navbar ul { list-style: none; display: flex; gap: 30px; }
.navbar ul li a { text-decoration: none; color: white; font-size: 1rem; transition: 0.3s; }
.navbar ul li a:hover { color: gold; }

.hero {
  height: 300px;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
  background: linear-gradient(135deg, #111, #222);
}

.hero h1 { font-size: 3rem; color: gold; text-shadow: 0 0 15px gold; }
.hero p { font-size: 1.2rem; color: #fff; margin-top: 10px; }

#countdown {
  font-size: 2rem;
  margin-top: 10px;
  color: #ffd700;
  text-shadow: 0 0 15px gold;
}

/* Hlavní sekce loterie */
#lottery-section {
  padding: 120px 20px 50px 20px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: rgba(0,0,0,0.6);
  padding: 20px;
  border-radius: 12px;
  border: 1px solid rgba(255,215,0,0.3);
  box-shadow: 0 0 30px rgba(255,215,0,0.2);
  margin-bottom: 30px;
}

/* Výherní číslo */
.winning-number {
  font-size: 60px;
  color: gold;
  text-align: center;
  margin: 20px 0;
  text-shadow: 0 0 20px gold;
}

/* Tabulka hráčů */
.players-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

.players-table th, .players-table td {
  border: 1px solid gold;
  padding: 10px;
  text-align: center;
}

.players-table th {
  background: rgba(255,215,0,0.2);
  color: black;
}

/* Jackpot */
#jackpot {
  font-size: 1.8rem;
  color: gold;
  text-align: center;
  margin-bottom: 20px;
  text-shadow: 0 0 15px gold;
}

/* Animace slotu */
.slot {
  display: inline-block;
  font-size: 3rem;
  margin: 0 5px;
  color: gold;
  text-shadow: 0 0 10px #fff;
  animation: spin 1s ease-in-out infinite alternate;
}

@keyframes spin {
  0% { transform: translateY(0px); }
  100% { transform: translateY(-20px); }
}

/* Footer */
footer {
  background: #111;
  padding: 30px;
  text-align: center;
  margin-top: 50px;
  color: #ccc;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">MYTHION</div>
  <ul>
    <li><a href="index.html">Domů</a></li>
    <li><a href="lottery.html" class="active">Guild Loterie</a></li>
    <li><a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a></li>
  </ul>
</nav>

<div class="hero">
  <div>
    <h1>🎰 Guild Loterie</h1>
    <p>Automatické losování každé pátek v 20:00</p>
    <div id="countdown">Na losování zbývá: --:--:--</div>
  </div>
</div>

<section id="lottery-section">

  <div id="jackpot" class="card">
    Aktuální Jackpot: <span id="jackpotValue">80,000 🪙</span>
  </div>

  <div class="card">
    <h2>Výherní číslo</h2>
    <div id="winningNumber" class="winning-number">?</div>
    <div class="slot">
      <span>🎰</span><span>🎰</span><span>🎰</span>
    </div>
  </div>

  <div class="card">
    <h2>Hráči a sázky</h2>
    <table class="players-table">
      <thead>
        <tr>
          <th>Jméno</th>
          <th>Sázka</th>
          <th>Číslo</th>
        </tr>
      </thead>
      <tbody id="playersBody">
        <tr><td>Lukáš</td><td>1000 🪙</td><td>42</td></tr>
        <tr><td>Exsqueez</td><td>500 🪙</td><td>7</td></tr>
        <tr><td>Mimi</td><td>300 🪙</td><td>88</td></tr>
      </tbody>
    </table>
  </div>

</section>

<footer>
  &copy; 2026 Mythion Guild | <a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a>
</footer>

<script>
// --------------------------
// Pátek 20:00 automatické losování
// --------------------------
function generateNumber() {
  let number = Math.floor(Math.random() * 100) + 1;
  document.getElementById("winningNumber").innerText = number;

  // konfety při losování
  confetti({
    particleCount: 200,
    spread: 120,
    origin: {y:0.6}
  });

  localStorage.setItem("mythionLotteryNumber", number);
}

// načtení uloženého čísla
let savedNumber = localStorage.getItem("mythionLotteryNumber");
if (savedNumber) document.getElementById("winningNumber").innerText = savedNumber;

// Odpočet na pátek 20:00
function updateCountdown() {
  let now = new Date();
  let nextFriday = new Date();
  nextFriday.setDate(now.getDate() + ((5 - now.getDay() + 7) % 7));
  nextFriday.setHours(20,0,0,0);

  let diff = nextFriday - now;
  if (diff < 0) diff += 7*24*60*60*1000;

  let h = Math.floor(diff / (1000*60*60));
  let m = Math.floor((diff % (1000*60*60)) / (1000*60));
  let s = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById("countdown").innerText = `Na losování zbývá: ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

// kontrola pátečního losování
function checkFriday() {
  let now = new Date();
  if(now.getDay()===5 && now.getHours()===20 && now.getMinutes()===0){
    generateNumber();
  }
}

setInterval(updateCountdown, 1000);
setInterval(checkFriday, 60000);
</script>

</body>
</html>
