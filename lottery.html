<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythion Casino | Loterie</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
body {
    font-family: 'Inter', sans-serif;
    background: #050505;
    color: white;
    overflow-x: hidden;
}
.hero {
    height: 60vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
}
.hero h1 {
    font-family: 'Cinzel', serif;
    font-size: 5rem;
    color: gold;
    text-shadow: 0 0 20px gold;
    animation: glow 2.5s infinite alternate;
}
@keyframes glow {
    from { text-shadow: 0 0 10px gold; }
    to { text-shadow: 0 0 40px gold, 0 0 60px orange; }
}
.fog-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: -1;
}
.fog {
    position: absolute;
    width: 300vw;
    height: 100vh;
    background: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png') repeat-x;
    animation: fogmove 60s linear infinite;
    opacity: 0.15;
}
.fog:nth-child(2) {
    animation-direction: reverse;
    top: 20%;
    opacity: 0.1;
}
@keyframes fogmove { 0% { transform: translateX(0); } 100% { transform: translateX(-200vw); } }
.card {
    background: rgba(15, 15, 15, 0.8);
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 16px;
    padding: 20px;
    margin: 20px auto;
    max-width: 900px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(212,175,55,0.2);
}
table {
    width: 100%;
    border-collapse: collapse;
    text-align: center;
}
th, td {
    padding: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
th {
    color: gold;
    font-family: 'Cinzel', serif;
}
td {
    font-family: monospace;
}
#winner-number {
    font-size: 4rem;
    font-family: 'Cinzel', serif;
    color: orange;
    margin: 10px 0;
    animation: pulse 1.5s infinite alternate;
}
@keyframes pulse { 0%{ transform: scale(1); } 100%{ transform: scale(1.2); } }
#countdown {
    font-family: monospace;
    font-size: 1.2rem;
    margin: 10px 0;
    color: yellow;
    animation: glowcount 1.5s infinite alternate;
}
@keyframes glowcount { 0%{ text-shadow: 0 0 5px yellow;} 100%{ text-shadow: 0 0 20px gold;} }
</style>
</head>
<body>
<div class="fog-container">
    <div class="fog"></div>
    <div class="fog"></div>
</div>

<div class="hero">
    <h1>Mythion</h1>
</div>

<div class="card">
    <h2 class="text-2xl mb-2 font-cinzel">Guildová Loterie</h2>
    <div>Celkový Jackpot: <span id="jackpot">0</span> g</div>
    <div id="countdown">Načítání odpočtu...</div>
    <div id="winner-number">?</div>

    <h3 class="mt-4 font-bold">Sázky hráčů</h3>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Hráč</th>
                <th>Vsazeno</th>
                <th>Tip</th>
                <th>Stav</th>
            </tr>
        </thead>
        <tbody id="players-table">
        </tbody>
    </table>
</div>

<script>
// ==================== KONFIG ====================
const ENTRY_FEE = 5000;
const JACKPOT = 0; // nastavíš sám
const DRAW_DAY = 5; // Pátek
const DRAW_HOUR = 20; // 20:00

// hráči
const players = [
    { name: 'Exsqueez', bet: null },
    { name: 'Luxes', bet: null },
    { name: 'Arny', bet: null },
    { name: 'Suzu', bet: null },
    { name: 'Vecty', bet: null },
];

// ==================== FUNKCE ====================
function getNextDraw() {
    const now = new Date();
    const today = now.getDay();
    let daysUntil = (DRAW_DAY - today + 7) % 7;
    if(daysUntil === 0 && now.getHours() >= DRAW_HOUR) daysUntil = 7;
    const next = new Date(now);
    next.setDate(now.getDate() + daysUntil);
    next.setHours(DRAW_HOUR,0,0,0);
    return next;
}

function updateCountdown() {
    const countdownEl = document.getElementById('countdown');
    const nextDraw = getNextDraw();
    const now = new Date();
    const diff = nextDraw - now;
    if(diff<=0){
        countdownEl.textContent = "Losování probíhá...";
        drawNumber();
        return;
    }
    const d = Math.floor(diff/1000/60/60/24);
    const h = Math.floor((diff/1000/60/60)%24);
    const m = Math.floor((diff/1000/60)%60);
    const s = Math.floor((diff/1000)%60);
    countdownEl.textContent = `Zbývá: ${d}d ${h}h ${m}m ${s}s`;
}
setInterval(updateCountdown,1000);

// ==================== LOSOVÁNÍ ====================
function drawNumber() {
    const winnerNumber = Math.floor(Math.random()*100)+1;
    const winnerEl = document.getElementById('winner-number');
    let current = 0;
    const interval = setInterval(()=>{
        current = Math.floor(Math.random()*100)+1;
        winnerEl.textContent = current;
    },50);
    setTimeout(()=>{
        clearInterval(interval);
        winnerEl.textContent = winnerNumber;
        confetti({particleCount: 100, spread: 360, origin:{y:0.4}});
    },2000);
}

// ==================== RENDER HRÁČI ====================
function renderPlayers(){
    const tbody = document.getElementById('players-table');
    tbody.innerHTML = '';
    players.forEach((p,i)=>{
        tbody.innerHTML += `<tr>
            <td>${i+1}</td>
            <td>${p.name}</td>
            <td>${ENTRY_FEE}</td>
            <td>${p.bet!==null?p.bet:'?'}</td>
            <td>${p.bet!==null?'Vsazeno':'Čeká'}</td>
        </tr>`;
    });
}
renderPlayers();
</script>
</body>
</html>
