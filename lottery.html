<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythion Loterie | Casino</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>
body { font-family:'Inter',sans-serif; background:#050505; color:#fff; min-height:100vh; display:flex; justify-content:center; align-items:center; overflow-x:hidden; }
.container { max-width:800px; width:100%; padding:20px; text-align:center; }
h1 { font-family:'Cinzel', serif; font-size:3rem; color:gold; text-shadow:0 0 15px gold; margin-bottom:20px; }
.card { background:rgba(15,15,15,0.85); border:1px solid rgba(255,215,0,0.2); border-radius:12px; padding:20px; margin-bottom:20px; position:relative; }
.card h2 { color:gold; font-family:'Cinzel', serif; margin-bottom:10px; }
#winning-number { font-size:5rem; color:#fff; text-shadow:0 0 15px gold; animation:glow 2s infinite alternate; }
@keyframes glow { from{ text-shadow:0 0 15px gold;} to{ text-shadow:0 0 35px gold;} }
table { width:100%; margin-top:10px; border-collapse:collapse; }
table th, table td { padding:10px; border-bottom:1px solid rgba(255,215,0,0.2); text-align:center; font-size:0.9rem; }
.winner { background:rgba(0,128,0,0.4); font-weight:bold; color:#fff; }
.countdown { font-family:'Monospace'; font-size:1.2rem; margin-bottom:15px; color:#ffd700; }
</style>
</head>
<body>

<div class="container">
    <h1>Mythion Casino - Loterie</h1>

    <div class="card">
        <h2>Celkový Jackpot (g)</h2>
        <span id="jackpot-display">0</span>
    </div>

    <div class="card">
        <h2>Čas do losování</h2>
        <div id="countdown" class="countdown">Načítání...</div>
    </div>

    <div class="card">
        <h2>Vítězné číslo</h2>
        <div id="winning-number">?</div>
    </div>

    <div class="card">
        <h2>Hráči a jejich čísla</h2>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Hráč</th>
                    <th>Tip</th>
                </tr>
            </thead>
            <tbody id="players-table"></tbody>
        </table>
    </div>
</div>

<script>
// ====================== KONFIGURACE ======================
const entryFee = 5000;
let jackpot = 0; // sem napiš ručně
const drawDay = 5; // pátek
const drawHour = 20; // 20:00

let players = [
    {name:'Exsqueez', bet:null},
    {name:'Luxes', bet:null},
    {name:'Arny', bet:null},
    {name:'Suzu', bet:null},
    {name:'Vecty', bet:null},
    {name:'Cikynxd', bet:null},
    {name:'Kubiinho', bet:null},
    {name:'Tony101', bet:null},
    {name:'Artimik', bet:null},
    {name:'Adamekdave', bet:null},
    {name:'Sajmon', bet:null},
    {name:'DreimorE3', bet:null},
    {name:'Faceless', bet:null},
    {name:'Daenysh', bet:null}
];

// ====================== FUNKCE ======================
function getNextDrawDate() {
    const now = new Date();
    const today = now.getDay();
    let daysUntil = (drawDay - today + 7) % 7;
    if(daysUntil === 0 && now.getHours() >= drawHour) daysUntil = 7;
    const next = new Date(now);
    next.setDate(now.getDate() + daysUntil);
    next.setHours(drawHour,0,0,0);
    return next;
}

function updateCountdown() {
    const countdownEl = document.getElementById('countdown');
    const nextDraw = getNextDrawDate();
    const now = new Date();
    const diff = nextDraw - now;

    if(diff <=0){
        countdownEl.textContent="⚡ LOSOVÁNÍ probíhá...";
        autoDraw();
        return;
    }

    const d = Math.floor(diff/(1000*60*60*24));
    const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    const m = Math.floor((diff%(1000*60*60))/(1000*60));
    const s = Math.floor((diff%(1000*60))/1000);

    countdownEl.textContent = `Zbývá: ${d}d ${h}h ${m}m ${s}s`;
}

function autoDraw(){
    // jen jednou
    if(window.drawDone) return;
    window.drawDone = true;

    // přiřadit náhodný tip hráčům, kteří ještě vsadili
    players.forEach(p=>{if(p.bet===null)p.bet=Math.floor(Math.random()*100)+1;});
    const winning = Math.floor(Math.random()*100)+1;
    document.getElementById('winning-number').textContent=winning;

    renderTable();
    launchConfetti();
}

function renderTable(){
    const tbody=document.getElementById('players-table');
    tbody.innerHTML='';
    const winning = parseInt(document.getElementById('winning-number').textContent);
    players.forEach((p,i)=>{
        const tr=document.createElement('tr');
        if(p.bet===winning) tr.classList.add('winner');
        tr.innerHTML=`<td>${i+1}</td><td>${p.name}</td><td>${p.bet!==null?p.bet:'-'}</td>`;
        tbody.appendChild(tr);
    });
}

function launchConfetti(){
    confetti({particleCount:100,spread:70,origin:{y:0.6},colors:['#FFD700','#FFA500','#DAA520']});
}

// ====================== SPUŠTĚNÍ ======================
document.getElementById('jackpot-display').textContent = jackpot.toLocaleString();
updateCountdown();
setInterval(updateCountdown,1000);

</script>
</body>
</html>
