<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythion Casino | Guildová Loterie</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #050505;
    overflow-x: hidden;
    color: #e5e7eb;
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: #0a0a0a; }
::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #facc15; }

.hero {
    height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    color: gold;
}
.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('https://images.unsplash.com/photo-1629234603640-f2c09e8c0c71?auto=format&fit=crop&w=1740&q=80') no-repeat center/cover;
    filter: brightness(0.2);
    z-index: -2;
}
.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(212,175,55,0.2), transparent 80%);
    z-index: -1;
}

.hero h1 {
    font-family: 'Cinzel', serif;
    font-size: 5rem;
    text-shadow: 0 0 20px gold;
    animation: pulse-glow 2s infinite alternate;
}
@keyframes pulse-glow {
    0% { text-shadow: 0 0 10px gold; }
    50% { text-shadow: 0 0 25px gold; }
    100% { text-shadow: 0 0 10px gold; }
}

#countdown {
    margin-top: 20px;
    font-size: 2rem;
    font-family: 'Cinzel', serif;
    text-shadow: 0 0 15px gold;
    animation: glow-count 1.5s infinite alternate;
}
@keyframes glow-count {
    0% { text-shadow: 0 0 5px gold; }
    100% { text-shadow: 0 0 20px gold; }
}

#winning-number-box {
    margin: -60px auto 40px auto;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.3), rgba(0,0,0,0.5));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    font-family: 'Cinzel', serif;
    text-shadow: 0 0 20px gold;
    color: white;
    transition: all 0.5s ease;
}

.table-container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 10px;
    text-align: center;
}
th {
    background: rgba(212,175,55,0.2);
    color: gold;
    font-weight: bold;
    text-shadow: 0 0 5px black;
}
tr:nth-child(even) { background: rgba(255,255,255,0.05); }
tr.winner { background: rgba(34,197,94,0.3); color: white; font-weight: bold; }

.fog {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    pointer-events:none;
    background: url('https://raw.githubusercontent.com/danielstuart14/CSS_FOG_ANIMATION/master/fog1.png') repeat-x;
    animation: fogMove 80s linear infinite;
    opacity: 0.15;
    z-index:-1;
}
@keyframes fogMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(-200vw); }
}

button.copy-btn {
    background: gold;
    color: black;
    font-weight: bold;
    padding: 5px 12px;
    border-radius: 6px;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="fog"></div>

<div class="hero">
    <h1>MYTHION</h1>
    <div id="countdown">Načítání...</div>
</div>

<div id="winning-number-box">?</div>

<div class="table-container">
    <h2 class="text-2xl text-yellow-400 text-center mb-4 font-cinzel">Guildová Loterie</h2>
    <table id="players-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Hráč</th>
                <th>Vsazeno</th>
                <th>Tip</th>
                <th>Rozdíl</th>
                <th>Stav</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div class="text-center">
        <button class="copy-btn" onclick="copyResults()">Kopírovat výsledky pro Discord</button>
    </div>
</div>

<script>
// CONFIG
const entryFee = 5000;
const drawDay = 5; // Pátek
const drawHour = 20;
const players = [
    {name:'Exsqueez', bet:null},
    {name:'Luxes', bet:null},
    {name:'Arny', bet:null},
    {name:'Suzu', bet:null},
    {name:'Vecty', bet:null},
    {name:'Cikynxd', bet:null},
    {name:'Kubiinho', bet:null},
    {name:'Tony101', bet:null},
    {name:'Artimik', bet:null},
    {name:'Adamekdave', bet:null},
    {name:'Sajmon', bet:null},
    {name:'DreimorE3', bet:null},
    {name:'Faceless', bet:null},
    {name:'Daenysh', bet:null}
];

let winningNumber = null;

// Helper
function getNextDrawDate() {
    const now = new Date();
    const today = now.getDay();
    let days = (drawDay - today + 7) % 7;
    const next = new Date(now);
    if(days===0 && now.getHours()>=drawHour) days=7;
    next.setDate(now.getDate()+days);
    next.setHours(drawHour,0,0,0);
    return next;
}

function updateCountdown() {
    const cdEl = document.getElementById('countdown');
    const interval = setInterval(() => {
        const now = new Date();
        const diff = getNextDrawDate() - now;
        if(diff <= 0) {
            clearInterval(interval);
            cdEl.textContent = "LOSOVÁNÍ PROBÍHÁ!";
            autoDraw();
            return;
        }
        const d = Math.floor(diff/(1000*60*60*24));
        const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
        const m = Math.floor((diff%(1000*60*60))/(1000*60));
        const s = Math.floor((diff%(1000*60))/1000);
        cdEl.textContent = `Zbývá: ${d}d ${h}h ${m}m ${s}s`;
    },1000);
}

function autoDraw() {
    winningNumber = Math.floor(Math.random()*100)+1;
    const numBox = document.getElementById('winning-number-box');
    let anim = 0;
    const animInterval = setInterval(()=>{
        numBox.textContent = Math.floor(Math.random()*100)+1;
        anim++;
        if(anim>20){
            clearInterval(animInterval);
            numBox.textContent = winningNumber;
            renderTable();
            launchConfetti();
        }
    },100);
}

function renderTable() {
    const tbody = document.querySelector('#players-table tbody');
    tbody.innerHTML = '';
    players.forEach((p,i)=>{
        const diff = p.bet!==null && winningNumber!==null ? Math.abs(p.bet-winningNumber) : '-';
        let status='Čekání';
        if(p.bet!==null) status='Vsazeno';
        if(p.bet===winningNumber) status='VÍTĚZ';

        const tr = document.createElement('tr');
        if(p.bet===winningNumber) tr.classList.add('winner');
        tr.innerHTML = `
            <td>${i+1}</td>
            <td>${p.name}</td>
            <td>${entryFee}</td>
            <td>${p.bet!==null?p.bet:'-'}</td>
            <td>${diff}</td>
            <td>${status}</td>
        `;
        tbody.appendChild(tr);
    });
}

function copyResults() {
    const winners = players.filter(p=>p.bet===winningNumber).map(p=>p.name).join(', ') || 'NIKDO';
    const text = `🎲 Mythion Loterie\nVítězné číslo: ${winningNumber}\nVítězové: ${winners}`;
    navigator.clipboard.writeText(text);
    alert('Zkopírováno do schránky!');
}

// CONFETTI
function launchConfetti(){
    confetti({particleCount:100,spread:360,origin:{y:0.5},colors:['#FFD700','#FFA500','#DAA520']});
}

// START
updateCountdown();
renderTable();

</script>

</body>
</html>
