<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythion Loterie</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>
body{
font-family:Arial;
background:#000;
color:white;
}

.card{
background:#111;
border:1px solid #444;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body class="p-10">

<h1 class="text-4xl mb-4">MYTHION LOTERIE</h1>

<div id="date-display" class="mb-4 text-yellow-400">
Načítání...
</div>

<div class="card mb-6">

<div class="text-sm text-gray-400">Vítězné číslo</div>
<div id="winning-number-display" class="text-5xl font-bold">
?
</div>

<div id="countdown-display" class="text-yellow-400 mt-2">
odpočet...
</div>

</div>

<div class="card">

<table class="w-full">

<thead>
<tr>
<th>#</th>
<th>Hráč</th>
<th>Tip</th>
</tr>
</thead>

<tbody id="lottery-table-body">
</tbody>

</table>

</div>

<script>

// konfigurace

const CONFIG={
winningNumber:null,
drawDay:5,
drawHour:20
}

// hráči

const players=[
{name:'Exsqueez',bet:137},
{name:'Luxes',bet:null},
{name:'Arny',bet:null},
{name:'Suzu',bet:13},
{name:'Vecty',bet:null},
{name:'Cikynxd',bet:null},
{name:'Kubiinho',bet:null},
{name:'Tony101',bet:null},
{name:'Artimik',bet:null},
{name:'Adamekdave',bet:null},
{name:'Sajmon',bet:null},
{name:'DreimorE3',bet:176},
{name:'Faceless',bet:67},
{name:'Daenysh',bet:145}
]

lucide.createIcons()

renderTable()

// tabulka

function renderTable(){

const tbody=document.getElementById("lottery-table-body")
tbody.innerHTML=""

players.forEach((p,i)=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.bet ?? "-"}</td>
`

tbody.appendChild(tr)

})

}

// datum losování

function getNextDraw(){

const now=new Date()
const today=now.getDay()

const diff=(CONFIG.drawDay-today+7)%7

const next=new Date()

next.setDate(now.getDate()+diff)
next.setHours(CONFIG.drawHour,0,0,0)

return next

}

const nextDraw=getNextDraw()

document.getElementById("date-display").textContent=
"Příští losování: "+nextDraw.toLocaleString("cs-CZ")

// odpočet

setInterval(()=>{

const now=new Date()
const diff=nextDraw-now

if(diff<0){
document.getElementById("countdown-display").textContent="LOSOVÁNÍ PROBÍHÁ"
return
}

const d=Math.floor(diff/86400000)
const h=Math.floor(diff/3600000)%24
const m=Math.floor(diff/60000)%60
const s=Math.floor(diff/1000)%60

document.getElementById("countdown-display").textContent=
`Zbývá ${d}d ${h}h ${m}m ${s}s`

},1000)


// AUTO LOSOVÁNÍ

const saved=localStorage.getItem("mythion_win")

if(saved){
CONFIG.winningNumber=parseInt(saved)
document.getElementById("winning-number-display").textContent=saved
}

checkDraw()

setInterval(checkDraw,30000)

function checkDraw(){

if(CONFIG.winningNumber!==null)return

const now=new Date()

if(now.getDay()===CONFIG.drawDay && now.getHours()>=CONFIG.drawHour){

const win=Math.floor(Math.random()*200)+1

CONFIG.winningNumber=win

localStorage.setItem("mythion_win",win)

document.getElementById("winning-number-display").textContent=win

launchConfetti()

}

}


// konfety

function launchConfetti(){

confetti({
particleCount:200,
spread:100
})

}

</script>

</body>
</html>
