<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythion Casino | Loterie</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
body {
    font-family: 'Inter', sans-serif;
    background: black;
    color: #f3f3f3;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.container {
    max-width: 900px;
    width: 100%;
    text-align: center;
}
h1 {
    font-family: 'Cinzel', serif;
    font-size: 4rem;
    color: gold;
    text-shadow: 0 0 20px gold;
    margin-bottom: 10px;
    animation: glow 2s infinite alternate;
}
@keyframes glow {
    0% { text-shadow: 0 0 10px gold; }
    100% { text-shadow: 0 0 30px gold; }
}
.card {
    background: rgba(20,20,20,0.85);
    border: 1px solid gold;
    border-radius: 15px;
    padding: 20px;
    margin: 15px 0;
    backdrop-filter: blur(8px);
}
.countdown {
    font-family: 'Inter', monospace;
    font-size: 1.5rem;
    margin: 10px 0;
    color: #ffd700;
    animation: pulse 1.5s infinite alternate;
}
@keyframes pulse {
    0% { text-shadow: 0 0 10px #ffd700; }
    100% { text-shadow: 0 0 25px #fff700; }
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}
th, td {
    padding: 8px;
    border: 1px solid #444;
    text-align: center;
}
th {
    background: rgba(255,215,0,0.2);
    color: gold;
}
td.winner {
    background: green;
    color: #fff;
    font-weight: bold;
    animation: winnerGlow 1s infinite alternate;
}
@keyframes winnerGlow {
    0% { box-shadow: 0 0 5px gold; }
    100% { box-shadow: 0 0 20px gold; }
}
.animated-number {
    display: inline-block;
    animation: numberAnim 2s infinite alternate;
}
@keyframes numberAnim {
    0% { transform: scale(1); color: #ffd700; }
    50% { transform: scale(1.3); color: #fff; }
    100% { transform: scale(1); color: #ffd700; }
}
</style>
</head>
<body>
<div class="container">
    <h1>Mythion Loterie</h1>
    <div class="card">
        <div>Odpočet do losování (Pátek 20:00):</div>
        <div id="countdown" class="countdown">Načítání...</div>
    </div>
    <div class="card">
        <div>Vítězné číslo:</div>
        <div id="winning-number" class="text-6xl my-3 animated-number">?</div>
    </div>
    <div class="card">
        <div>Seznam hráčů:</div>
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Hráč</th>
                    <th>Vsazeno (g)</th>
                    <th>Tip</th>
                    <th>Rozdíl</th>
                    <th>Stav</th>
                </tr>
            </thead>
            <tbody id="player-table">
                <!-- Naplní JS -->
            </tbody>
        </table>
    </div>
</div>

<script>
// =================== KONFIGURACE ===================
const entryFee = 5000;
const drawDay = 5; // Pátek
const drawHour = 20; // 20:00
let winningNumber = null; // bude vybráno automaticky
const players = [
    {name:'Exsqueez', bet: 0},
    {name:'Luxes', bet:0},
    {name:'Arny', bet:0},
    {name:'Suzu', bet:0},
    {name:'Vecty', bet:0},
    {name:'Cikynxd', bet:0}
];

// =================== FUNKCE ===================
function getNextDraw() {
    const now = new Date();
    const today = now.getDay();
    const daysUntil = (drawDay - today + 7) % 7;
    const nextDraw = new Date(now);
    nextDraw.setDate(now.getDate() + daysUntil);
    nextDraw.setHours(drawHour,0,0,0);
    if (daysUntil === 0 && now.getHours() >= drawHour) nextDraw.setDate(nextDraw.getDate() + 7);
    return nextDraw;
}

function updateCountdown() {
    const countdownEl = document.getElementById('countdown');
    const nextDraw = getNextDraw();
    const now = new Date();
    const diff = nextDraw - now;
    if (diff <= 0) {
        countdownEl.textContent = "Losování probíhá...";
        autoDraw();
        return;
    }
    const d = Math.floor(diff/1000/60/60/24);
    const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    const m = Math.floor((diff % (1000*60*60)) / (1000*60));
    const s = Math.floor((diff % (1000*60))/1000);
    countdownEl.textContent = `${d}d ${h}h ${m}m ${s}s`;
}

// =================== LOSOVÁNÍ ===================
function autoDraw() {
    if(winningNumber !== null) return;
    const animEl = document.getElementById('winning-number');
    let count = 0;
    const interval = setInterval(()=>{
        const rand = Math.floor(Math.random()*100)+1;
        animEl.textContent = rand;
        count++;
        if(count>30){ // 30 animací = vybráno
            clearInterval(interval);
            winningNumber = Math.floor(Math.random()*100)+1;
            animEl.textContent = winningNumber;
            updateTable();
            confetti({particleCount:100, spread:100, origin:{y:0.6}});
        }
    },50);
}

// =================== TABULKA ===================
function updateTable(){
    const tbody = document.getElementById('player-table');
    tbody.innerHTML='';
    players.forEach((p,i)=>{
        const diff = winningNumber ? Math.abs(p.bet-winningNumber) : '-';
        const status = p.bet===winningNumber?'VÍTĚZ':(p.bet? 'Zaplatil':'Čekání');
        const tr = document.createElement('tr');
        tr.innerHTML=`
            <td>${i+1}</td>
            <td>${p.name}</td>
            <td>${entryFee}</td>
            <td>${p.bet||'-'}</td>
            <td>${diff}</td>
            <td class="${status==='VÍTĚZ'?'winner':''}">${status}</td>
        `;
        tbody.appendChild(tr);
    });
}

// =================== INITIAL ===================
setInterval(updateCountdown,1000);
updateTable();
</script>
</body>
</html>
