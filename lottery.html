<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mythion Casino | Loterie</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55,0.2), transparent 70%),
              linear-gradient(180deg,#111,#000);
  color: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin:0;
}

.container {
  max-width: 800px;
  width: 90%;
  text-align: center;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.7);
  border: 2px solid rgba(212,175,55,0.4);
  border-radius: 15px;
  padding: 30px;
  box-shadow: 0 0 40px rgba(212,175,55,0.3);
}

h1 {
  font-family: 'Cinzel', serif;
  font-size: 3rem;
  color: gold;
  text-shadow: 0 0 20px gold;
  margin-bottom:10px;
}

#countdown {
  font-family: 'Courier New', monospace;
  font-size:1.2rem;
  color:#FFD700;
  margin-bottom:20px;
  animation: pulse 1.5s infinite alternate;
}

@keyframes pulse {
  from { text-shadow: 0 0 10px #FFD700; }
  to { text-shadow: 0 0 25px #FFD700; }
}

#winning-number {
  font-size: 5rem;
  color: #FFD700;
  text-shadow: 0 0 20px gold, 0 0 40px orange;
  margin:20px 0;
  min-height: 70px;
}

.table-container {
  overflow-x:auto;
  margin-top:20px;
}

table {
  width:100%;
  border-collapse:collapse;
  text-align:center;
}

th, td {
  padding:10px;
  border-bottom:1px solid rgba(255,215,0,0.2);
}

th {
  color: gold;
}

tr.winner td {
  background: rgba(255,215,0,0.2);
  font-weight:bold;
}

#jackpot {
  font-size:2rem;
  color:#FFD700;
  margin-bottom:10px;
}

button {
  background: gold;
  color:black;
  padding:10px 20px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

button:hover {
  background: orange;
}

</style>
</head>
<body>

<div class="container">
  <h1>Mythion Casino | Guild Loterie</h1>

  <div id="jackpot">Jackpot: <span id="jackpot-value">--</span> g</div>
  <div id="countdown">Načítání...</div>

  <div id="winning-number">?</div>

  <button id="draw-button">Spustit losování</button>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Hráč</th>
          <th>Vsazeno</th>
          <th>Tip</th>
          <th>Rozdíl</th>
          <th>Stav</th>
        </tr>
      </thead>
      <tbody id="players-table">
      </tbody>
    </table>
  </div>
</div>

<script>
// =================================
// KONFIGURACE
// =================================
const CONFIG = {
  entryFee: 5000,           // Cena tiketu
  drawDurationSec: 5        // délka animace losování
};

// Hráči
const players = [
  { name:'Exsqueez', bet: null },
  { name:'Luxes', bet: null },
  { name:'Arny', bet: null },
  { name:'Suzu', bet: null },
  { name:'Vecty', bet: null },
  { name:'Cikynxd', bet: null },
  { name:'Kubiinho', bet: null },
  { name:'Tony101', bet: null },
  { name:'Artimik', bet: null },
  { name:'Adamekdave', bet: null },
  { name:'Sajmon', bet: null },
  { name:'DreimorE3', bet: null },
  { name:'Faceless', bet: null },
  { name:'Daenysh', bet: null }
];

// Jackpot ručně
const jackpotValue = 100000;
document.getElementById('jackpot-value').textContent = jackpotValue.toLocaleString('cs-CZ');

// =================================
// FUNKCE
// =================================

// Inicializace tabulky
function renderTable(winningNumber=null) {
  const tbody = document.getElementById('players-table');
  tbody.innerHTML = '';
  players.forEach((p,i)=>{
    let diff='-';
    let status='Čekání';
    let trClass='';
    if(p.bet!==null && winningNumber!==null){
      const delta=Math.abs(p.bet-winningNumber);
      diff = delta===0?'JACKPOT!': delta<=5?`±${delta} (Těsně!)`:`±${delta}`;
      if(delta===0) { status='VÍTĚZ'; trClass='winner'; }
      else status='Zaplaceno';
    } else if(p.bet!==null) { status='Zaplaceno'; }

    const betDisplay = p.bet!==null?p.bet:'-';

    const tr = document.createElement('tr');
    if(trClass) tr.classList.add(trClass);
    tr.innerHTML=`
      <td>${i+1}</td>
      <td>${p.name}</td>
      <td>${CONFIG.entryFee.toLocaleString()}</td>
      <td>${betDisplay}</td>
      <td>${diff}</td>
      <td>${status}</td>
    `;
    tbody.appendChild(tr);
  });
}

// =================================
// ODPOČET + LOSOVÁNÍ
// =================================

let countdown = 10; // sekundy do losování
const countdownEl = document.getElementById('countdown');
const winningNumberEl = document.getElementById('winning-number');

function startCountdown(){
  const interval = setInterval(()=>{
    countdownEl.textContent = `Losování za ${countdown}s`;
    countdown--;
    if(countdown<0){
      clearInterval(interval);
      drawNumber();
    }
  },1000);
}

// Funkce losování
function drawNumber(){
  const duration = CONFIG.drawDurationSec * 1000;
  const start = Date.now();
  let lastNum=null;

  const anim = setInterval(()=>{
    const now = Date.now();
    if(now-start>=duration){
      clearInterval(anim);
      const winning = Math.floor(Math.random()*100)+1;
      winningNumberEl.textContent = winning;
      players.forEach(p=>{if(p.bet===null)p.bet=Math.floor(Math.random()*100)+1;});
      renderTable(winning);
      confetti({particleCount:150, spread: 120, origin:{y:0.6}});
      countdownEl.textContent='Losování dokončeno!';
      return;
    }
    const num = Math.floor(Math.random()*100)+1;
    if(num!==lastNum){
      winningNumberEl.textContent = num;
      lastNum=num;
    }
  },50);
}

document.getElementById('draw-button').addEventListener('click',()=>{
  // reset
  players.forEach(p=>p.bet=null);
  winningNumberEl.textContent='?';
  renderTable();
  countdown=10;
  startCountdown();
});

// =================================
// start tabulky
renderTable();

</script>
</body>
</html>
