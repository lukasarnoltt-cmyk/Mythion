<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYTHION Guild | Loterie</title>

<link rel="stylesheet" href="css/style_final_v8.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Uncial+Antiqua&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
/* --- Epic background & particles --- */
body {
  background: black;
  font-family: 'Cinzel', serif;
  color: white;
  overflow-x: hidden;
  position: relative;
}

#particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -1;
}

.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: gold;
  border-radius: 50%;
  opacity: 0.7;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1); opacity: 0; }
}

/* --- Content Styling --- */
section#lottery-section {
  padding: 120px 20px;
  text-align: center;
  min-height: 100vh;
  position: relative;
}

h1, h2 {
  color: gold;
  text-shadow: 0 0 20px gold;
  font-family: 'Cinzel', serif;
}

h2 {
  margin-bottom: 40px;
}

.back-btn {
  display: inline-block;
  margin: 20px auto;
  padding: 12px 25px;
  background: rgba(255,215,0,0.2);
  color: gold;
  font-weight: bold;
  border: 2px solid gold;
  border-radius: 10px;
  text-decoration: none;
  transition: 0.3s;
}

.back-btn:hover {
  background: gold;
  color: black;
}

/* --- Jackpot & Winning Number --- */
#jackpot {
  font-size: 2rem;
  color: gold;
  margin-bottom: 30px;
  text-shadow: 0 0 15px gold;
}

#winner-number {
  font-size: 5rem;
  color: gold;
  text-shadow: 0 0 30px gold;
  margin-bottom: 20px;
  animation: pulse 2s infinite alternate;
}

@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* --- Countdown --- */
#countdown {
  font-size: 2.5rem;
  margin-bottom: 30px;
  color: #fff;
  text-shadow: 0 0 10px gold;
}

/* --- Player Table --- */
#player-table {
  width: 90%;
  max-width: 900px;
  margin: 0 auto 50px;
  border-collapse: collapse;
}

#player-table th, #player-table td {
  border: 1px solid rgba(255,215,0,0.3);
  padding: 12px 15px;
  text-align: center;
}

#player-table th {
  background: rgba(255,215,0,0.2);
  color: gold;
  font-weight: bold;
}

#player-table td {
  color: #fff;
}

#player-table tr:hover {
  background: rgba(255,215,0,0.1);
  transform: scale(1.02);
  transition: 0.3s;
}

/* --- Iframe --- */
.lottery-iframe {
  width: 100%;
  height: 600px;
  border: 2px solid rgba(255,215,0,0.3);
  border-radius: 12px;
  margin-bottom: 40px;
}

/* --- Footer --- */
footer {
  background: #111;
  padding: 30px;
  text-align: center;
  color: #ccc;
}

/* --- Confetti button effect --- */
</style>
</head>
<body>

<div id="particles"></div>

<nav class="navbar">
  <div class="logo">MYTHION</div>
  <ul>
    <li><a href="index.html">Domů</a></li>
    <li><a href="lottery.html" class="active">Guild Loterie</a></li>
    <li><a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a></li>
  </ul>
</nav>

<section id="lottery-section">
  <h1>🎰 Guild Loterie</h1>
  <a href="index.html" class="back-btn">⏎ Zpět na hlavní</a>

  <div id="jackpot">💰 Aktuální Jackpot: 50,000 🪙</div>
  <div id="winner-number">?</div>
  <div id="countdown">Odpočet do pátečního losování: 00:00:00</div>

  <table id="player-table">
    <thead>
      <tr>
        <th>Hráč</th>
        <th>Číslo</th>
        <th>Sázka</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>Exsqueez</td><td>42</td><td>500 🪙</td></tr>
      <tr><td>Lukáš</td><td>7</td><td>300 🪙</td></tr>
      <tr><td>Arny</td><td>13</td><td>200 🪙</td></tr>
    </tbody>
  </table>

  <iframe src="https://exsqueez.github.io/Guild-Lottery/" class="lottery-iframe"></iframe>
</section>

<footer>
  &copy; 2026 Mythion Guild | <a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a>
</footer>

<script>
/* --- Particles --- */
const particleCount = 50;
const particleContainer = document.getElementById('particles');
for(let i=0;i<particleCount;i++){
  const p = document.createElement('div');
  p.classList.add('particle');
  p.style.left = Math.random()*100+'%';
  p.style.animationDuration = 5 + Math.random()*5+'s';
  p.style.width = 4+Math.random()*4+'px';
  p.style.height = 4+Math.random()*4+'px';
  particleContainer.appendChild(p);
}

/* --- Countdown to Friday 20:00 --- */
function updateCountdown(){
  const now = new Date();
  const day = now.getDay();
  const hour = now.getHours();
  const minute = now.getMinutes();
  const second = now.getSeconds();

  let friday = new Date();
  friday.setHours(20,0,0,0);
  const diffDay = (5 + 7 - day) % 7;
  friday.setDate(now.getDate() + diffDay);

  const diff = friday - now;
  const h = Math.floor(diff/1000/60/60);
  const m = Math.floor((diff/1000/60)%60);
  const s = Math.floor((diff/1000)%60);
  document.getElementById('countdown').innerText = `Odpočet do pátečního losování: ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

updateCountdown();
setInterval(updateCountdown,1000);

/* --- Winning Number animation --- */
function generateWinner(){
  const number = Math.floor(Math.random()*100)+1;
  document.getElementById('winner-number').innerText = number;
  confetti({
    particleCount:200,
    spread:120,
    origin:{y:0.6}
  });
}

// Uncomment this line if you want to test winner generation immediately
// generateWinner();

</script>

</body>
</html>
