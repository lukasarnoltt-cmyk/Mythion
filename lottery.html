<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Uncial+Antiqua&display=swap" rel="stylesheet">

.lottery-frame{
width:100%;
height:900px;

<body>

<nav class="navbar">
<div class="logo">MYTHION</div>
<ul>
<li><a href="index.html">Domů</a></li>
<li><a href="lottery.html">Guild Casino</a></li>

</ul>
</nav>

<section id="content-area">
<div class="content-section active">

<h2>🎰 Mythion Guild Casino</h2>

<!-- LOSOVÁNÍ -->

<div class="box">

<h3>Výherní číslo týdne</h3>

<div id="winningNumber" class="winning-number">?</div>

<button onclick="drawLottery()">Losovat číslo</button>

</div>

<!-- SÁZKY -->

<div class="box">

<h3>🎟 Sázky hráčů</h3>

<input id="betName" placeholder="Jméno">
<input id="betNumber" type="number" min="1" max="100" placeholder="Číslo">

<button onclick="addBet()">Přidat sázku</button>

<ul id="betList"></ul>

</div>

<!-- CASINO -->

<div class="box">

<h3>🎰 Guild Automat</h3>

<input id="playerName" placeholder="Jméno hráče">

<button onclick="loadPlayer()">Načíst hráče</button>

<div style="font-size:30px;color:gold">

Coins: <span id="playerCoins">0</span>

</div>

<div id="slotDisplay" class="slot">❓ ❓ ❓</div>

<button onclick="spinSlot()">Protočit (5 coinů)</button>

<div id="slotResult"></div>

</div>

<!-- HISTORIE -->

<div class="box">

<h3>🏆 Historie výher</h3>

<ul id="historyList"></ul>

</div>

<!-- LEADERBOARD -->

<div class="box">

<h3>👑 Top hráči</h3>

<ul id="leaderboard"></ul>

</div>

<!-- LOTERIE IFRAME -->

<iframe src="https://exsqueez.github.io/Guild-Lottery/" class="lottery-frame"></iframe>

</div>
</section>

<footer>

<p>&copy; 2026 Mythion Guild</p>

</footer>

<script>

/* DATA */

let bets=JSON.parse(localStorage.getItem("mythionBets"))||[];
let players=JSON.parse(localStorage.getItem("mythionPlayers"))||{};
let history=JSON.parse(localStorage.getItem("mythionHistory"))||[];

let currentPlayer=null;

function save(){

localStorage.setItem("mythionBets",JSON.stringify(bets));
localStorage.setItem("mythionPlayers",JSON.stringify(players));
localStorage.setItem("mythionHistory",JSON.stringify(history));

}

/* BET SYSTEM */

function addBet(){

let name=document.getElementById("betName").value;
let number=document.getElementById("betNumber").value;

if(!name||!number)return;

bets.push({name:name,number:Number(number)});

renderBets();
save();

}

function renderBets(){

let list=document.getElementById("betList");
list.innerHTML="";

bets.forEach(b=>{

let li=document.createElement("li");

li.innerText=b.name+" → "+b.number;

list.appendChild(li);

});

}

/* LOTTERY */

function drawLottery(){

let num=Math.floor(Math.random()*100)+1;

document.getElementById("winningNumber").innerText=num;

let winner="Nikdo";

bets.forEach(b=>{
if(b.number===num){
winner=b.name;
}
});

history.unshift({number:num,winner:winner});

if(winner!=="Nikdo"){

confetti({particleCount:200,spread:120});

bets=[];

}

renderHistory();
renderBets();
save();

}

function renderHistory(){

let list=document.getElementById("historyList");
list.innerHTML="";

history.forEach(h=>{

let li=document.createElement("li");

li.innerText="Číslo "+h.number+" | vítěz: "+h.winner;

list.appendChild(li);

});

}

/* CASINO */

const symbols=["🐉","🪙","⭐","💀","🔥"];

function loadPlayer(){

let name=document.getElementById("playerName").value;

if(!players[name]){

players[name]={coins:20};

}

currentPlayer=name;

updateCoins();
renderLeaderboard();
save();

}

function updateCoins(){

if(!currentPlayer)return;

document.getElementById("playerCoins").innerText=
players[currentPlayer].coins;

}

function spinSlot(){

if(!currentPlayer)return;

if(players[currentPlayer].coins<5){

document.getElementById("slotResult").innerText="Nemáš coin!";
return;

}

players[currentPlayer].coins-=5;

let display=document.getElementById("slotDisplay");

let spins=0;

let interval=setInterval(()=>{

let a=symbols[Math.floor(Math.random()*symbols.length)];
let b=symbols[Math.floor(Math.random()*symbols.length)];
let c=symbols[Math.floor(Math.random()*symbols.length)];

display.innerText=a+" "+b+" "+c;

spins++;

if(spins>20){

clearInterval(interval);

checkWin(a,b,c);

}

},100);

}

function checkWin(a,b,c){

let reward=0;

if(a===b&&b===c){

if(a==="🐉")reward=100;
if(a==="🪙")reward=50;
if(a==="⭐")reward=200;

}

if(reward>0){

players[currentPlayer].coins+=reward;

confetti({particleCount:150,spread:100});

document.getElementById("slotResult").innerText=
"🎉 Výhra "+reward+" coinů";

}else{

document.getElementById("slotResult").innerText="Nic";

}

updateCoins();
renderLeaderboard();
save();

}

/* LEADERBOARD */

function renderLeaderboard(){

let list=document.getElementById("leaderboard");
list.innerHTML="";

let sorted=Object.entries(players)
.sort((a,b)=>b[1].coins-a[1].coins);

sorted.forEach(p=>{

let li=document.createElement("li");

li.innerText=p[0]+" — "+p[1].coins+" coinů";

list.appendChild(li);

});

}

/* INIT */

renderBets();
renderHistory();
renderLeaderboard();

</script>

</body>
</html>
