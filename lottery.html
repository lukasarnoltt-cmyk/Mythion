<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Mythion Lottery</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#050505;
color:white;
font-family:Arial;
text-align:center;
}

h1{
font-size:60px;
color:gold;
margin-top:40px;
text-shadow:0 0 20px gold;
}

.countdown{
font-size:20px;
margin-top:10px;
color:#ffd700;
}

.number{
font-size:80px;
margin:40px;
font-weight:bold;
text-shadow:0 0 30px gold;
}

table{
margin:auto;
margin-top:40px;
border-collapse:collapse;
width:600px;
}

td,th{
padding:12px;
border-bottom:1px solid #333;
}

th{
color:gold;
}

</style>
</head>

<body>

<h1>MYTHION</h1>

<div id="countdown" class="countdown">
Načítání odpočtu...
</div>

<div class="number" id="winningNumber">
?
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Hráč</th>
<th>Tip</th>
<th>Stav</th>
</tr>
</thead>

<tbody id="playersTable"></tbody>

</table>

<script>

const drawDay = 5
const drawHour = 20

let winningNumber = null

const players = [

{name:"Exsqueez",bet:37},
{name:"Luxes",bet:12},
{name:"Arny",bet:55},
{name:"Suzu",bet:13},
{name:"Vecty",bet:77},
{name:"Cikynxd",bet:88},
{name:"Kubiinho",bet:92},
{name:"Tony101",bet:44},
{name:"Artimik",bet:61},
{name:"Adamekdave",bet:5},
{name:"Sajmon",bet:26},
{name:"DreimorE3",bet:73},
{name:"Faceless",bet:67},
{name:"Daenysh",bet:45}

]

function nextDraw(){

const now = new Date()

let days = (drawDay - now.getDay() + 7) % 7

if(days === 0 && now.getHours() >= drawHour){
days = 7
}

const draw = new Date()

draw.setDate(now.getDate() + days)
draw.setHours(drawHour,0,0,0)

return draw

}

function updateCountdown(){

const el = document.getElementById("countdown")

setInterval(()=>{

const diff = nextDraw() - new Date()

const d = Math.floor(diff / 86400000)
const h = Math.floor(diff / 3600000) % 24
const m = Math.floor(diff / 60000) % 60
const s = Math.floor(diff / 1000) % 60

if(diff > 0){
el.innerText = "Losování za: " + d+"d "+h+"h "+m+"m "+s+"s"
}

if(diff <= 0 && winningNumber === null){
drawNumber()
}

},1000)

}

function drawNumber(){

const display = document.getElementById("winningNumber")

let rolls = 0

const anim = setInterval(()=>{

display.innerText = Math.floor(Math.random()*100)+1

rolls++

if(rolls > 30){

clearInterval(anim)

winningNumber = Math.floor(Math.random()*100)+1

display.innerText = winningNumber

renderPlayers()

}

},80)

}

function renderPlayers(){

const body = document.getElementById("playersTable")

body.innerHTML = ""

players.forEach((p,i)=>{

let status = "Čeká"

if(winningNumber !== null){

if(p.bet === winningNumber){
status = "🏆 VÍTĚZ"
}
else{
status = "Prohrál"
}

}

body.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.bet}</td>
<td>${status}</td>
</tr>
`

})

}

renderPlayers()

updateCountdown()

</script>

</body>
</html>
