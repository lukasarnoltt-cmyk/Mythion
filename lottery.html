<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYTHION Guild | Loterie</title>

<link rel="stylesheet" href="css/style_final_v8.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Uncial+Antiqua&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body { background:#050505; color:#fff; font-family:'Cinzel', serif; }
.navbar { display:flex; justify-content:space-between; padding:15px; background:#111; }
.navbar ul { list-style:none; display:flex; gap:15px; margin:0; padding:0; }
.navbar a { color:gold; text-decoration:none; font-weight:bold; }
.navbar a.active { text-decoration:underline; }

.content-section { max-width:900px; margin:40px auto; text-align:center; }
.back-btn { display:inline-block; margin:20px auto; padding:10px 20px; border:1px solid gold; border-radius:8px; background:rgba(255,215,0,0.2); color:gold; text-decoration:none; transition:0.3s; }
.back-btn:hover { background:rgba(255,215,0,0.4); color:#fff; }

.lottery-frame { width:100%; height:500px; border:2px solid rgba(255,215,0,0.3); border-radius:12px; box-shadow:0 0 20px rgba(255,215,0,0.2); margin-top:20px; }

.winning-box { margin:30px 0; }
.winning-number { font-size:60px; color:gold; text-shadow:0 0 20px gold; }

#jackpot { font-size:24px; color:gold; margin-bottom:20px; }

#countdown { font-size:20px; margin-bottom:30px; }

table { width:100%; border-collapse: collapse; margin-top:20px; }
th, td { border:1px solid gold; padding:8px; color:#fff; }
th { background:rgba(255,215,0,0.2); }

</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">MYTHION</div>
  <ul>
    <li><a href="index.html">Domů</a></li>
    <li><a href="lottery.html" class="active">Guild Loterie</a></li>
    <li><a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a></li>
  </ul>
</nav>

<section class="content-section">
  <h2>🎰 Guild Loterie</h2>

  <div style="text-align:center;">
    <a href="index.html" class="back-btn">⏎ Zpět na hlavní</a>
  </div>

  <div id="jackpot">💰 Aktuální jackpot: 80,000 🪙</div>
  <div id="countdown">⏳ Odpočet do pátečního losování: --:--:--</div>

  <div class="winning-box">
      <h3>Výherní číslo týdne</h3>
      <div id="winningNumber" class="winning-number">?</div>
      <button id="generateBtn" style="padding:10px 20px; margin-top:10px; border:none; border-radius:8px; background:gold; color:#000; font-weight:bold; cursor:pointer;">Generovat výherní číslo</button>
  </div>

  <h3>Seznam hráčů a jejich čísel</h3>
  <table>
    <thead>
      <tr>
        <th>Jméno</th>
        <th>Vsazené číslo</th>
        <th>Vsazená částka 🪙</th>
      </tr>
    </thead>
    <tbody id="playersTable">
      <tr><td>Exsqueez</td><td>42</td><td>500</td></tr>
      <tr><td>Arny</td><td>7</td><td>300</td></tr>
      <!-- sem dopisuješ hráče ručně -->
    </tbody>
  </table>

  <!-- Iframe loterie / vizuální -->
  <iframe src="https://exsqueez.github.io/Guild-Lottery/" 
          class="lottery-frame"
          frameborder="0"
          scrolling="yes">
  </iframe>

</section>

<footer style="text-align:center; margin:40px 0;">
  <p>&copy; 2026 Mythion Guild | <a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a></p>
</footer>

<script>
// ---------- GENEROVÁNÍ VÝHERNÍHO ČÍSLA ----------
function generateNumber(){
  let number = Math.floor(Math.random()*100)+1;
  document.getElementById("winningNumber").innerText = number;

  // Confetti
  confetti({particleCount:200, spread:120, origin:{y:0.6}});

  // Ulož do localStorage, aby číslo zůstalo
  localStorage.setItem("mythionLotteryNumber",number);
}

// ---------- ODPOČET DO PÁTKU ----------
function updateCountdown(){
  const now = new Date();
  let nextFriday = new Date();
  nextFriday.setDate(now.getDate() + (5 - now.getDay() + 7) % 7); // příští pátek
  nextFriday.setHours(20,0,0,0); // 20:00

  let diff = nextFriday - now;

  if(diff<0) diff=0;

  let h = Math.floor(diff/1000/60/60);
  let m = Math.floor((diff/1000/60)%60);
  let s = Math.floor((diff/1000)%60);

  document.getElementById("countdown").innerText = `⏳ Odpočet do pátečního losování: ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

setInterval(updateCountdown,1000);

// ---------- Načtení uloženého čísla ----------
let saved = localStorage.getItem("mythionLotteryNumber");
if(saved){
  document.getElementById("winningNumber").innerText = saved;
}

// ---------- Tlačítko pro ruční generování ----------
document.getElementById("generateBtn").addEventListener("click", generateNumber);
</script>

</body>
</html>
