<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYTHION Guild | Loterie</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
/* --- Styl stránky --- */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cinzel', serif; background:black; color:white; overflow-x:hidden; }
.navbar { position:fixed; top:0; width:100%; display:flex; justify-content:space-between; align-items:center; padding:20px 40px; background: rgba(0,0,0,0.7); backdrop-filter:blur(10px); z-index:999; }
.navbar .logo { color: gold; font-size:1.8rem; font-weight:bold; }
.navbar ul { list-style:none; display:flex; gap:30px; }
.navbar ul li a { text-decoration:none; color:white; transition:0.3s; }
.navbar ul li a:hover, .navbar ul li a.active { color: gold; }

#content-area { padding:120px 20px 60px 20px; background:#0a0a0a; min-height:70vh; max-width:1200px; margin:auto; }
h2 { font-family:'Cinzel', serif; color: gold; text-align:center; margin-bottom:30px; font-size:3rem; text-shadow:0 0 15px gold; }
.winning-box { text-align:center; margin-bottom:30px; }
.winning-number { font-size:60px; color:gold; font-family:'Cinzel', serif; text-shadow:0 0 20px gold; }

.back-btn { display:inline-block; margin:0 auto 20px auto; padding:10px 20px; background: rgba(255,215,0,0.2); color: gold; font-weight:bold; border:1px solid gold; border-radius:8px; text-decoration:none; transition:0.3s; }
.back-btn:hover { background: rgba(255,215,0,0.4); color:#fff; }

.stat-box { background: rgba(0,0,0,0.6); padding:20px 30px; border-radius:12px; text-align:center; backdrop-filter:blur(6px); border:1px solid rgba(255,215,0,0.3); margin-bottom:20px; }
.stat-box h3 { font-size:28px; color: gold; }
.stat-box p { margin-top:5px; color:white; font-weight:500; }

table { width:100%; border-collapse: collapse; margin-top:30px; background: rgba(0,0,0,0.6); border:1px solid gold; border-radius:12px; overflow:hidden; }
th, td { padding:15px; text-align:center; border-bottom:1px solid rgba(255,215,0,0.2); }
th { background: rgba(255,215,0,0.1); color: gold; }
td { color:white; }

footer { background:#111; padding:30px; text-align:center; margin-top:50px; }
</style>

</head>
<body>

<nav class="navbar">
  <div class="logo">MYTHION</div>
  <ul>
    <li><a href="index.html">Domů</a></li>
    <li><a href="lottery.html" class="active">Guild Loterie</a></li>
    <li><a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a></li>
  </ul>
</nav>

<section id="content-area">
  <div class="content-section">

    <h2>🎰 Guild Loterie</h2>

    <div style="text-align:center;">
      <a href="index.html" class="back-btn">⏎ Zpět na hlavní</a>
    </div>

    <!-- Výherní číslo -->
    <div class="winning-box">
      <h3>Výherní číslo týdne</h3>
      <div id="winningNumber" class="winning-number">?</div>
    </div>

    <!-- Jackpot -->
    <div class="stat-box">
      <h3>Aktuální Jackpot</h3>
      <p id="jackpotDisplay">50,000 🪙</p>
    </div>

    <!-- Tabulka hráčů -->
    <table id="playersTable">
      <thead>
        <tr>
          <th>Hráč</th>
          <th>Číslo</th>
          <th>Sázenka</th>
        </tr>
      </thead>
      <tbody>
        <!-- Zde ručně doplňuj hráče -->
        <tr><td>Exsqueez</td><td>42</td><td>100 🪙</td></tr>
        <tr><td>Lukáš</td><td>17</td><td>50 🪙</td></tr>
      </tbody>
    </table>

  </div>
</section>

<footer>
  <p>&copy; 2026 Mythion Guild | 
     <a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a>
  </p>
</footer>

<script>
// Funkce pro generování výherního čísla
function generateNumber(){
  let number = Math.floor(Math.random() * 100) + 1;
  document.getElementById("winningNumber").innerText = number;
  confetti({ particleCount:200, spread:120, origin:{y:0.6} });
  localStorage.setItem("mythionLotteryNumber", number);
}

// Spustí se každý pátek 20:00
function checkFriday(){
  let now = new Date();
  if(now.getDay() === 5 && now.getHours() === 20 && now.getMinutes() === 0){
    generateNumber();
  }
}

// Načtení uloženého čísla
let saved = localStorage.getItem("mythionLotteryNumber");
if(saved){
  document.getElementById("winningNumber").innerText = saved;
}

// Kontrola každou minutu
setInterval(checkFriday, 60000);
</script>

</body>
</html>
