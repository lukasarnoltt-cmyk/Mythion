<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYTHION Guild | Loterie</title>

<link rel="stylesheet" href="css/style_final_v8.css">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Uncial+Antiqua&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body { background:#050505; color:#fff; }
.content-section h2 { text-align:center; color:gold; margin-bottom:20px; font-family:'Cinzel',serif; text-shadow:0 0 15px gold; }
.lottery-container { max-width:900px; margin:0 auto; text-align:center; padding:20px; background:rgba(0,0,0,0.6); border-radius:12px; border:2px solid rgba(255,215,0,0.3); }
.back-btn { display:inline-block;margin:10px auto;padding:10px 20px;background:rgba(255,215,0,0.2);color:gold;font-weight:bold;border:1px solid gold;border-radius:8px;text-decoration:none;transition:0.3s; }
.back-btn:hover { background:rgba(255,215,0,0.4);color:#fff; }
#winningNumber { font-size:60px; color:gold; text-shadow:0 0 20px gold; margin:10px 0; }
#countdown { font-size:30px; margin:20px 0; color:#facc15; }
#jackpot { font-size:36px; margin:10px 0; color:lime; }
.history { margin-top:20px; text-align:left; max-height:150px; overflow-y:auto; background:rgba(0,0,0,0.3); padding:10px; border-radius:8px; }
.history h3 { margin-top:0; color:gold; text-align:center; }
.history ul { list-style:none; padding-left:10px; }
.history li { margin-bottom:5px; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">MYTHION</div>
  <ul>
    <li><a href="index.html">Domů</a></li>
    <li><a href="lottery.html" class="active">Guild Loterie</a></li>
    <li><a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a></li>
  </ul>
</nav>

<section id="content-area">
  <div class="content-section active">

    <h2>🎰 Guild Loterie</h2>

    <div style="text-align:center;">
      <a href="index.html" class="back-btn">⏎ Zpět na hlavní</a>
    </div>

    <div class="lottery-container">

      <div id="jackpot">Jackpot: 50,000 🪙</div>
      <div id="countdown">Odpočet do losování: --:--:--</div>

      <div>
        <h3>Výherní číslo týdne</h3>
        <div id="winningNumber">?</div>
      </div>

      <div class="history">
        <h3>Historie vítězů</h3>
        <ul id="winnerHistory">
          <!-- Zde se automaticky doplní -->
        </ul>
      </div>

    </div>
  </div>
</section>

<footer>
  <p>&copy; 2026 Mythion Guild |
     <a href="https://discord.gg/8MEktvx93N" target="_blank">Discord</a>
  </p>
</footer>

<script>
// ============================
// KONFIGURACE
// ============================
const jackpotKey = "mythionLotteryJackpot";
const winningKey = "mythionLotteryNumber";
const historyKey = "mythionLotteryHistory";
const baseJackpot = 50000; // start jackpotu
const fridayHour = 20; // 20:00 pátek
const fridayMinute = 0;

// ============================
// Inicializace
// ============================
let jackpot = localStorage.getItem(jackpotKey);
if(!jackpot) jackpot = baseJackpot;
document.getElementById("jackpot").innerText = `Jackpot: ${parseInt(jackpot).toLocaleString()} 🪙`;

let savedNumber = localStorage.getItem(winningKey);
if(savedNumber) document.getElementById("winningNumber").innerText = savedNumber;

let history = JSON.parse(localStorage.getItem(historyKey)) || [];
updateHistory();

// ============================
// Funkce
// ============================

// Countdown do pátku 20:00
function updateCountdown(){
  const now = new Date();
  let nextFriday = new Date();
  nextFriday.setDate(now.getDate() + (5 - now.getDay() + 7) % 7);
  nextFriday.setHours(fridayHour, fridayMinute, 0, 0);
  const diff = nextFriday - now;
  if(diff <= 0) return;

  let h = Math.floor(diff/1000/60/60);
  let m = Math.floor(diff/1000/60) % 60;
  let s = Math.floor(diff/1000) % 60;
  document.getElementById("countdown").innerText = `Odpočet do losování: ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

// Losování
function drawWinner(){
  const winner = Math.floor(Math.random()*100)+1;
  document.getElementById("winningNumber").innerText = winner;
  confetti({particleCount:200,spread:120,origin:{y:0.6}});
  localStorage.setItem(winningKey,winner);

  // Přidání do historie
  const entry = `Výherní číslo: ${winner} (Jackpot ${parseInt(jackpot).toLocaleString()} 🪙)`;
  history.unshift(entry);
  if(history.length>10) history.pop();
  localStorage.setItem(historyKey,JSON.stringify(history));
  updateHistory();

  // Reset jackpot
  jackpot = baseJackpot;
  localStorage.setItem(jackpotKey,jackpot);
  document.getElementById("jackpot").innerText = `Jackpot: ${parseInt(jackpot).toLocaleString()} 🪙`;
}

function updateHistory(){
  const ul = document.getElementById("winnerHistory");
  ul.innerHTML = "";
  history.forEach(item=>{
    const li = document.createElement("li");
    li.innerText = item;
    ul.appendChild(li);
  });
}

// ============================
// Automatické losování každý pátek 20:00
// ============================
setInterval(()=>{
  const now = new Date();
  if(now.getDay()===5 && now.getHours()===fridayHour && now.getMinutes()===fridayMinute){
    drawWinner();
  }
},60000);

// ============================
// Aktualizace countdown
// ============================
setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
